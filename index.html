<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #141921;
            --accent: #60a5fa;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: rgba(255,255,255,0.06);
            --header-h: 50px; /* VEELGI VÄIKSEM ÜLEMINE RIBA */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 1. ÜLEMINE RIBA - KOMPAKTNE */
        header {
            height: var(--header-h);
            background: rgba(11, 14, 20, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            border-bottom: 1px solid rgba(96, 165, 250, 0.3);
            position: fixed;
            top: 0; width: 100%; z-index: 100;
        }

        h1 { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .clock { font-size: 1.4rem; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }

        .layout {
            display: flex;
            height: calc(100vh - var(--header-h));
            margin-top: var(--header-h);
            padding: 12px;
            gap: 12px;
        }

        /* 2. VASAK PANEEL - VÄIKSEM FONT */
        .sidebar {
            width: 25%;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 10px;
            background: rgba(255,255,255,0.02);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }

        .scroll-container { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-content { padding: 8px; display: flex; flex-direction: column; gap: 8px; }

        .list-item {
            background: rgba(255,255,255,0.02);
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .list-item.active {
            background: rgba(96, 165, 250, 0.1);
            border-color: rgba(96, 165, 250, 0.3);
            transform: scale(1.02);
        }

        .list-thumb {
            width: 50px; height: 50px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }

        .list-text-content { overflow: hidden; display: flex; flex-direction: column; gap: 1px; }
        .list-date { font-size: 0.6rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .list-title { font-size: 0.75rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-loc { font-size: 0.65rem; color: var(--text-muted); }

        /* 3. PAREM PANEEL - SUUREMAD PILDID */
        .featured {
            width: 75%;
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .feat-bg-blur {
            position: absolute; inset: 0;
            filter: blur(50px) brightness(0.2);
            object-fit: cover;
            transform: scale(1.1);
            width: 100%; height: 100%;
            z-index: 1;
        }

        .feat-surface {
            position: absolute; inset: 0;
            z-index: 2;
            display: flex;
            padding: 20px;
            gap: 20px;
            background: linear-gradient(135deg, rgba(11,14,20,0.95) 0%, rgba(11,14,20,0.8) 100%);
        }

        .feat-info {
            flex: 1; /* Tekst võtab vähem ruumi */
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .feat-poster-area {
            flex: 1.6; /* Pilt võtab rohkem ruumi (ca 62%) */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* MAKSIMAALNE PLAKAT */
        .feat-poster-main {
            width: 100%;
            height: 85%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feat-poster-main img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .feat-date { font-size: 0.9rem; font-weight: 800; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        .feat-title { font-size: 1.6rem; font-weight: 900; line-height: 1.1; margin-bottom: 10px; color: #fff; }
        .feat-loc { font-size: 1rem; color: #e2e8f0; font-weight: 600; margin-bottom: 15px; }
        .feat-desc { font-size: 0.85rem; line-height: 1.5; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 10; -webkit-box-orient: vertical; overflow: hidden; }

        /* 4. VÄIKSEM QR-KAART */
        .action-block {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .qr-card {
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .qr-label { font-size: 0.45rem; font-weight: 800; text-transform: uppercase; color: #fff; text-align: center; }
        .qr-target { background: #fff; padding: 2px; border-radius: 3px; line-height: 0; }

        .status-msg { font-size: 1.5rem; text-align: center; margin-top: 40vh; color: var(--text-muted); width: 100%; }
        #featured-inner { width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease; }
    </style>
</head>
<body>

<header>
    <h1>Elva Valla Kultuur</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<div id="loader" class="status-msg">Uuendan andmeid...</div>

<div class="layout" id="main-ui" style="display:none;">
    <div class="sidebar">
        <div class="sidebar-header">Tulevased sündmused</div>
        <div class="scroll-container" id="scroll-container">
            <div class="scroll-content" id="scroll-list"></div>
        </div>
    </div>

    <div class="featured">
        <div id="featured-inner"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const DISPLAY_MS = 20000;

    let allEvents = [];
    let activeIdx = -1;
    let autoAdvanceTimer = null;

    const PLACEHOLDER = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect width="100%" height="100%" fill="#141921"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#60a5fa" font-family="Arial" font-size="50" font-weight="700">Elva Kultuur</text></svg>');

    function escapeHtml(v) { return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    
    function normalizeEvent(raw) {
        if (!raw || !raw.title) return null;
        return {
            title: String(raw.title).trim(),
            date: String(raw.date || "Täpsustamisel").trim(),
            loc: String(raw.loc || "Elva vald").trim(),
            desc: String(raw.desc || "").trim(),
            img: (raw.img && raw.img.length > 5) ? raw.img : "",
            url: raw.url || "https://elvakultuur.ee",
            startIso: raw.startIso || ""
        };
    }

    async function fetchEvents() {
        const proxies = [
            SCRIPT_URL,
            `https://api.allorigins.win/get?url=${encodeURIComponent(SCRIPT_URL)}&cachebuster=${Date.now()}`
        ];

        for (const url of proxies) {
            try {
                const res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) continue;
                let data = await (url.includes('allorigins') ? res.json() : res.json());
                if (url.includes('allorigins')) data = JSON.parse(data.contents);
                
                const list = (Array.isArray(data) ? data : (data.events || data.data || []))
                    .map(normalizeEvent).filter(Boolean);
                
                if (list.length > 0) return list;
            } catch (e) { console.warn("Laadimine ebaõnnestus allikast:", url); }
        }
        throw new Error("Andmeid ei leitud.");
    }

    function updateClock() {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", { hour: "2-digit", minute: "2-digit" });
    }
    setInterval(updateClock, 1000); updateClock();

    function renderList() {
        const list = document.getElementById("scroll-list");
        list.innerHTML = allEvents.map((ev, i) => `
            <div class="list-item" id="ev-${i}">
                <img src="${ev.img || PLACEHOLDER}" class="list-thumb" onerror="this.src='${PLACEHOLDER}'">
                <div class="list-text-content">
                    <div class="list-date">${escapeHtml(ev.date)}</div>
                    <div class="list-title">${escapeHtml(ev.title)}</div>
                    <div class="list-loc">📍 ${escapeHtml(ev.loc)}</div>
                </div>
            </div>
        `).join('');
    }

    function switchFeatured(idx) {
        if (idx === activeIdx || !allEvents[idx]) return;
        activeIdx = idx;
        const ev = allEvents[idx];

        document.querySelectorAll(".list-item").forEach(el => el.classList.remove("active"));
        document.getElementById(`ev-${idx}`)?.classList.add('active');

        const inner = document.getElementById("featured-inner");
        inner.style.opacity = 0;

        setTimeout(() => {
            const poster = ev.img || PLACEHOLDER;
            inner.innerHTML = `
                <img src="${poster}" class="feat-bg-blur" onerror="this.src='${PLACEHOLDER}'">
                <div class="feat-surface">
                    <div class="feat-info">
                        <div class="feat-date">${escapeHtml(ev.date)}</div>
                        <h2 class="feat-title">${escapeHtml(ev.title)}</h2>
                        <div class="feat-loc">📍 ${escapeHtml(ev.loc)}</div>
                        <div class="feat-desc">${escapeHtml(ev.desc || "Lisainfo saamiseks skaneeri QR-kood.")}</div>
                    </div>
                    <div class="feat-poster-area">
                        <div class="feat-poster-main">
                            <img src="${poster}" alt="" onerror="this.src='${PLACEHOLDER}'">
                        </div>
                        <div class="action-block">
                            <div class="qr-card">
                                <div class="qr-label">INFO JA PILETID</div>
                                <div class="qr-target" id="qr-box"></div>
                            </div>
                        </div>
                    </div>
                </div>`;

            new QRCode(document.getElementById("qr-box"), {
                text: ev.url, width: 55, height: 55, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M
            });
            inner.style.opacity = 1;
        }, 250);
    }

    function autoCycle() {
        const next = (activeIdx + 1) % allEvents.length;
        switchFeatured(next);
        const container = document.getElementById("scroll-container");
        const item = document.getElementById(`ev-${next}`);
        if (item) container.scrollTo({ top: item.offsetTop - 100, behavior: "smooth" });
    }

    async function init() {
        try {
            allEvents = await fetchEvents();
            if (allEvents.length > 0) {
                document.getElementById("loader").style.display = "none";
                document.getElementById("main-ui").style.display = "flex";
                renderList();
                switchFeatured(0);
                setInterval(autoCycle, DISPLAY_MS);
            } else {
                document.getElementById("loader").textContent = "Sündmusi ei leitud.";
            }
        } catch (e) {
            document.getElementById("loader").innerHTML = `<span style="color:#f87171">Andmete viga.</span><br><small>${e.message}</small>`;
        }
    }

    init();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

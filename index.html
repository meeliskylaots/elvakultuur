<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b1016;
            --card-bg: #131922;
            --text-main: #d7dee7;
            --text-muted: #8e98a4;
            --accent: #69aefc;
            --border-faint: rgba(255,255,255,0.05);
            --header-h: 60px;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        header {
            background: rgba(11, 16, 22, 0.9);
            backdrop-filter: blur(10px);
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(105, 174, 252, 0.25);
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-h);
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: -0.01em;
        }

        .clock {
            font-size: 1.55rem;
            font-weight: 800;
            color: var(--accent);
        }

        .layout {
            display: flex;
            height: calc(100vh - var(--header-h));
            margin-top: var(--header-h);
            padding: 14px;
            gap: 14px;
        }

        .sidebar {
            width: 28%;
            background: rgba(19, 25, 34, 0.78);
            border-radius: 18px;
            border: 1px solid var(--border-faint);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 12px 14px;
            font-weight: 800;
            font-size: 0.76rem;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-faint);
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .scroll-container::-webkit-scrollbar { display: none; }

        .scroll-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list-item {
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .list-item.active {
            background: rgba(105, 174, 252, 0.08);
            border-color: rgba(105, 174, 252, 0.22);
        }

        .list-thumb {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #000;
        }

        .list-text {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .list-date {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            line-height: 1.2;
        }

        .list-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .list-loc {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.2;
        }

        .featured {
            width: 72%;
            background: #000;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-faint);
        }

        #featured-inner {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.35s ease;
            position: relative;
            z-index: 2;
        }

        .feat-bg-blur {
            position: absolute;
            inset: 0;
            filter: blur(60px) brightness(0.2);
            object-fit: cover;
            width: 100%;
            height: 100%;
            z-index: 1;
            transform: scale(1.15);
        }

        .feat-surface {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 28px;
            padding: 28px 32px;
            background: linear-gradient(to bottom, rgba(11,16,22,0.55) 0%, rgba(11,16,22,0.92) 100%);
        }

        .feat-info-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-width: 56%;
        }

        .feat-side {
            width: 34%;
            min-width: 250px;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .feat-poster-wrap {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .poster-img {
            width: 100%;
            max-width: 320px;
            max-height: 350px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .feat-date {
            color: var(--accent);
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .feat-title {
            color: #fff;
            font-size: 2.05rem;
            font-weight: 900;
            line-height: 1.05;
            margin: 0 0 12px 0;
            letter-spacing: -0.03em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .feat-loc {
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 14px;
            line-height: 1.3;
        }

        .feat-desc {
            color: var(--text-main);
            opacity: 0.9;
            font-size: 0.98rem;
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 8;
            -webkit-box-orient: vertical;
            overflow: hidden;
            max-width: 95%;
        }

        .qr-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 6px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .qr-label {
            font-size: 0.48rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #d9e2eb;
            line-height: 1.1;
            text-align: center;
            opacity: 0.85;
        }

        .qr-canvas {
            background: #fff;
            padding: 3px;
            border-radius: 4px;
            line-height: 0;
        }

        .status-msg {
            font-size: 1.8rem;
            text-align: center;
            margin-top: 40vh;
            color: var(--text-muted);
            width: 100%;
        }

        @media (max-width: 1200px) {
            .feat-surface {
                gap: 22px;
                padding: 24px 26px;
            }

            .feat-title {
                font-size: 1.75rem;
            }

            .feat-desc {
                font-size: 0.92rem;
                -webkit-line-clamp: 7;
            }

            .poster-img {
                max-width: 280px;
                max-height: 310px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Elva Valla Kultuur</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<div id="loader" class="status-msg">Laen sündmusi...</div>

<div class="layout" id="main-ui" style="display:none;">
    <aside class="sidebar">
        <div class="sidebar-header">Tulevased sündmused</div>
        <div class="scroll-container" id="scroll-container">
            <div class="scroll-content" id="scroll-list"></div>
        </div>
    </aside>

    <main class="featured" id="featured-area">
        <div id="featured-inner"></div>
    </main>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const DISPLAY_MS = 20000;

    let allEvents = [];
    let activeIdx = -1;
    let autoAdvanceTimer = null;

    const PLACEHOLDER = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect width="100%" height="100%" fill="#131922"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#69aefc" font-family="Arial" font-size="60" font-weight="700">Elva Kultuur</text></svg>');

    function escapeHtml(v) {
        return String(v ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    async function fetchEvents() {
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(SCRIPT_URL)}&cache=${Date.now()}`;
        const res = await fetch(url);
        const json = await res.json();
        const data = JSON.parse(json.contents);
        return (Array.isArray(data) ? data : data.events || []).filter(e => e.title);
    }

    function updateClock() {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    setInterval(updateClock, 1000);
    updateClock();

    function renderList() {
        const list = document.getElementById("scroll-list");
        list.innerHTML = allEvents.map((ev, i) => `
            <div class="list-item" id="ev-${i}">
                <img src="${ev.img || PLACEHOLDER}" class="list-thumb" onerror="this.src='${PLACEHOLDER}'">
                <div class="list-text">
                    <div class="list-date">${escapeHtml(ev.date)}</div>
                    <div class="list-title">${escapeHtml(ev.title)}</div>
                    <div class="list-loc">📍 ${escapeHtml(ev.loc || "Elva vald")}</div>
                </div>
            </div>
        `).join('');
    }

    function switchFeatured(idx) {
        if (idx === activeIdx || !allEvents[idx]) return;
        activeIdx = idx;
        const ev = allEvents[idx];

        document.querySelectorAll(".list-item").forEach(el => el.classList.remove("active"));
        document.getElementById(`ev-${idx}`)?.classList.add("active");

        const inner = document.getElementById("featured-inner");
        inner.style.opacity = 0;

        setTimeout(() => {
            const posterSrc = ev.img || PLACEHOLDER;

            inner.innerHTML = `
                <img src="${posterSrc}" class="feat-bg-blur">
                <div class="feat-surface">
                    <div class="feat-info-wrap">
                        <div class="feat-date">${escapeHtml(ev.date)}</div>
                        <h2 class="feat-title">${escapeHtml(ev.title)}</h2>
                        <div class="feat-loc">📍 ${escapeHtml(ev.loc || "Elva vald")}</div>
                        <div class="feat-desc">${escapeHtml(ev.desc || "Lisainfo saamiseks skaneeri QR-kood.")}</div>
                    </div>

                    <div class="feat-side">
                        <div class="feat-poster-wrap">
                            <img src="${posterSrc}" class="poster-img" onerror="this.src='${PLACEHOLDER}'">
                        </div>

                        <div class="qr-box">
                            <div class="qr-label">Info</div>
                            <div class="qr-canvas" id="qr-code"></div>
                        </div>
                    </div>
                </div>
            `;

            new QRCode(document.getElementById("qr-code"), {
                text: ev.url || "https://elvakultuur.ee",
                width: 56,
                height: 56,
                colorDark: "#000",
                colorLight: "#fff",
                correctLevel: QRCode.CorrectLevel.M
            });

            inner.style.opacity = 1;
        }, 180);
    }

    function autoCycle() {
        const next = (activeIdx + 1) % allEvents.length;
        switchFeatured(next);

        const container = document.getElementById("scroll-container");
        const item = document.getElementById(`ev-${next}`);
        if (item) {
            container.scrollTo({ top: item.offsetTop - 100, behavior: "smooth" });
        }
    }

    async function init() {
        try {
            allEvents = await fetchEvents();
            if (allEvents.length > 0) {
                document.getElementById("loader").style.display = "none";
                document.getElementById("main-ui").style.display = "flex";
                renderList();
                switchFeatured(0);
                autoAdvanceTimer = setInterval(autoCycle, DISPLAY_MS);
            } else {
                document.getElementById("loader").textContent = "Sündmusi ei leitud.";
            }
        } catch (e) {
            document.getElementById("loader").innerHTML = `<span style="color:#f87171">Viga andmete laadimisel.</span>`;
        }
    }

    init();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

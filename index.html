<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --elva-blue: #1d71d4;
            --bg-black: #000000;
            --card-black: #080808;
            --text-white: #ffffff;
            --accent-green: #22c55e;
            --border: rgba(255, 255, 255, 0.15);
            
            --header-h: 12vh;
            --ticker-h: 15vh;
            --safe-area: 5vw;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-black);
            color: var(--text-white);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 var(--safe-area);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: brightness(0.12) blur(80px);
            transition: background-image 1.2s ease-in-out;
            transform: scale(1.2);
        }

        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 2vh;
        }

        .header-left { display: flex; align-items: center; gap: 1.5vw; }
        .elva-logo {
            width: 3.5vw; height: 3.5vw; background: var(--elva-blue);
            border-radius: 20%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 2vw;
        }
        .header-title { font-size: 1.6vw; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .clock-section { text-align: right; }
        .clock { font-size: 3.5vw; font-weight: 900; line-height: 1; }
        .date-today { font-size: 1.2vw; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

        .app-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2vh 0;
            gap: 2vh;
            min-height: 0;
        }

        .hero {
            flex: 1;
            background: var(--card-black);
            border: 2px solid var(--border);
            border-radius: 2vw;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,1);
        }

        .progress-bar {
            position: absolute; top: 0; left: 0; height: 1vh;
            background: var(--elva-blue); width: 0; z-index: 10;
        }

        /* Sujuv üleminek sisu vahetumisel */
        #hero-inner { 
            display: flex; 
            width: 100%; 
            height: 100%; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-info {
            flex: 1;
            padding: 4vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-date-tag {
            background: var(--elva-blue);
            padding: 0.8vw 2vw;
            border-radius: 50px;
            font-size: 1.3vw;
            font-weight: 800;
            margin-bottom: 2.5vh;
            display: inline-block;
            align-self: flex-start;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .hero-title {
            font-size: 3vw;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2vh;
            color: #ffffff;
        }

        .hero-loc {
            font-size: 1.8vw;
            font-weight: 800;
            color: var(--accent-green);
            margin-bottom: 2vh;
        }

        .hero-desc {
            font-size: 1.5vw;
            line-height: 1.5;
            color: #cbd5e1;
            font-weight: 700;
            max-width: 95%;
        }

        .hero-visual {
            flex: 0 0 40%;
            padding: 4vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 1.5vw;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .hero-image { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .bottom-section {
            height: var(--ticker-h);
            display: flex;
            gap: 2vw;
            padding-bottom: 4vh;
            align-items: stretch;
        }

        .ticker-scroll {
            flex: 1;
            display: flex;
            gap: 1.5vw;
            overflow: hidden;
        }

        .event-card {
            flex: 0 0 22vw;
            height: 100%;
            background: #111;
            border: 2px solid var(--border);
            border-radius: 1.5vw;
            display: flex;
            align-items: center;
            padding: 0.8vw;
            gap: 1vw;
            transition: all 0.4s ease;
        }

        .event-card.active {
            border: 5px solid var(--elva-blue);
            background: rgba(29, 113, 212, 0.4);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(29, 113, 212, 0.5);
        }

        .event-card-img { width: 4.5vw; height: 4.5vw; border-radius: 0.8vw; object-fit: cover; }
        
        .event-card-info {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.2vw;
        }

        .event-card-date {
            font-size: 0.9vw;
            color: var(--elva-blue);
            font-weight: 800;
            text-transform: uppercase;
        }

        .event-card-title {
            font-size: 1vw;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .qr-area {
            width: 24vw; 
            background: var(--card-black);
            border: 2px solid var(--border); 
            border-radius: 2vw;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0.8vw 1.5vw;
            gap: 1vw;
        }
        .qr-text { font-size: 1vw; font-weight: 900; text-align: right; line-height: 1.2; color: #fff; flex: 1; }
        
        .qr-box { 
            background: #fff; 
            padding: 0.4vw; 
            border-radius: 0.8vw; 
            height: calc(var(--ticker-h) - 6vh); 
            width: calc(var(--ticker-h) - 6vh);
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        #qr-target img, #qr-target canvas {
            max-width: 100%;
            max-height: 100%;
        }

        @keyframes progress { from { width: 0; } to { width: 100%; } }
        .loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; font-size: 4vw; font-weight: 900; color: var(--elva-blue); }
    </style>
</head>
<body>

<div id="ambient-bg"></div>
<div id="loader" class="loader">ELVA VALD</div>

<header>
    <div class="header-left">
        <div class="elva-logo">E</div>
        <h1 class="header-title">Kultuuriekraan</h1>
    </div>
    <div class="clock-section">
        <div class="clock" id="clock">00:00</div>
        <div class="date-today" id="today-date">...</div>
    </div>
</header>

<main class="app-content" id="app-main" style="visibility: hidden;">
    <section class="hero">
        <div class="progress-bar" id="progress-bar"></div>
        <div id="hero-inner"></div>
    </section>

    <div class="bottom-section">
        <div class="ticker-scroll" id="ticker-scroll"></div>
        <div class="qr-area">
            <div class="qr-text">LÄHEMALT<br>& PILETID</div>
            <div class="qr-box" id="qr-target"></div>
        </div>
    </div>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const ROTATE_INTERVAL = 20000; // 20 sekundit
    
    let events = [];
    let currentIndex = 0;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('et-EE', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('today-date').textContent = now.toLocaleDateString('et-EE', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function formatIsoDate(isoString) {
        if (!isoString || typeof isoString !== 'string' || !isoString.includes('T')) return isoString;
        try {
            const d = new Date(isoString);
            if (isNaN(d.getTime())) return isoString;
            
            const days = ['Pühapäev', 'Esmaspäev', 'Teisipäev', 'Kolmapäev', 'Neljapäev', 'Reede', 'Laupäev'];
            const months = ['jaanuar', 'veebruar', 'märts', 'aprill', 'mai', 'juuni', 'juuli', 'august', 'september', 'oktoober', 'november', 'detsember'];
            
            const hours = d.getHours().toString().padStart(2, '0');
            const minutes = d.getMinutes().toString().padStart(2, '0');
            
            return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]} | kell ${hours}:${minutes}`;
        } catch (e) {
            return isoString;
        }
    }

    function getCleanDate(ev) {
        if (ev.startIso) return formatIsoDate(ev.startIso);
        return ev.dateText || ev.date || "Kuupäev täpsustamisel";
    }

    async function loadData() {
        try {
            const res = await fetch(`${SCRIPT_URL}?format=json&t=${Date.now()}`);
            const data = await res.json();
            if (data.ok) {
                const now = new Date();
                const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const endOfNextMonth = new Date(now.getFullYear(), now.getMonth() + 2, 0, 23, 59, 59);

                events = (data.events || [])
                    .map(ev => ({
                        ...ev,
                        _timestamp: ev.startIso ? new Date(ev.startIso).getTime() : 0
                    }))
                    .filter(ev => {
                        if (!ev._timestamp) return true;
                        return ev._timestamp >= todayStart.getTime() && ev._timestamp <= endOfNextMonth.getTime();
                    })
                    .sort((a, b) => a._timestamp - b._timestamp);

                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-main').style.visibility = 'visible';
                
                if (events.length > 0) {
                    renderTicker();
                    showEvent(0);
                    
                    if (window.rotationTimer) clearInterval(window.rotationTimer);
                    window.rotationTimer = setInterval(() => {
                        currentIndex = (currentIndex + 1) % events.length;
                        showEvent(currentIndex);
                    }, ROTATE_INTERVAL);
                } else {
                    document.getElementById('loader').innerText = "HETKEL ÜRITUSI EI OLE";
                    document.getElementById('loader').style.display = 'flex';
                }
            }
        } catch (e) { console.error("Viga laadimisel:", e); }
    }

    function renderTicker() {
        const t = document.getElementById('ticker-scroll');
        if (!t) return;
        
        t.innerHTML = events.map((ev, i) => {
            const fullDate = getCleanDate(ev);
            let displayDate = fullDate;
            if (fullDate.includes(',')) {
                const parts = fullDate.split(',');
                displayDate = parts[1] ? parts[1].split('|')[0].trim() : parts[0];
            }
            
            return `
                <div class="event-card" id="card-${i}">
                    <img src="${ev.img || ev.pilt}" class="event-card-img" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="event-card-info">
                        <div class="event-card-date">${displayDate}</div>
                        <div class="event-card-title">${ev.title || "Üritus"}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function showEvent(idx) {
        if (!events || events.length === 0) return;
        const ev = events[idx];
        const inner = document.getElementById('hero-inner');
        const pb = document.getElementById('progress-bar');
        
        // Alustame hajutamist ja liigutamist välja
        inner.style.opacity = 0;
        inner.style.transform = 'translateY(20px)';

        setTimeout(() => {
            document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.getElementById(`card-${idx}`);
            if (activeCard) {
                activeCard.classList.add('active');
                activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            pb.style.animation = 'none';
            void pb.offsetWidth;
            pb.style.animation = `progress ${ROTATE_INTERVAL}ms linear forwards`;
            
            if (ev.img || ev.pilt) {
                document.getElementById('ambient-bg').style.backgroundImage = `url('${ev.img || ev.pilt}')`;
            }

            inner.innerHTML = `
                <div class="hero-info">
                    <div class="hero-date-tag">${getCleanDate(ev)}</div>
                    <h2 class="hero-title">${ev.title || "Üritus"}</h2>
                    <div class="hero-loc">📍 ${ev.loc || ev.asutus || "Elva vald"}</div>
                    <div class="hero-desc">${ev.desc || ev.description || ""}</div>
                </div>
                <div class="hero-visual">
                    <div class="image-wrapper">
                        <img src="${ev.img || ev.pilt}" class="hero-image" onerror="this.src='https://via.placeholder.com/150'">
                    </div>
                </div>
            `;

            const qrTarget = document.getElementById("qr-target");
            if (qrTarget) {
                qrTarget.innerHTML = "";
                const size = qrTarget.offsetWidth; 
                new QRCode(qrTarget, { 
                    text: ev.url || "https://elva.ee", 
                    width: size, 
                    height: size, 
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M 
                });
            }

            // Toome sisu sujuvalt sisse
            inner.style.opacity = 1;
            inner.style.transform = 'translateY(0)';
        }, 400); // Pool üleminekuajast ootame enne sisu vahetust
    }

    loadData();
    setInterval(loadData, 3600000);
</script>
</body>
</html>

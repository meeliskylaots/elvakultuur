<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* ELVA VALD AMETLIKUD VÄRVID (VAPP JA LIPP) */
            --elva-azure: #005aa3;   /* Vapi sinine */
            --elva-green: #009640;   /* Lipu roheline */
            --elva-white: #ffffff;   /* Hõbedane/valge */
            
            --bg-color: #080b0f;
            --card-bg: #11161d;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: var(--elva-azure);
            --border-faint: rgba(255,255,255,0.05);
            --header-h: 65px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(0, 90, 163, 0.12), transparent 35%),
                radial-gradient(circle at 0% 100%, rgba(0, 150, 64, 0.08), transparent 35%);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        header {
            background: rgba(11, 14, 20, 0.98);
            backdrop-filter: blur(15px);
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; width: 100%; height: var(--header-h);
            z-index: 100;
        }

        header::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to right, 
                var(--elva-white) 33.3%, 
                var(--elva-azure) 33.3%, 
                var(--elva-azure) 66.6%, 
                var(--elva-green) 66.6%);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .elva-vapp {
            width: 40px;
            height: 48px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        h1 {
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .clock {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--elva-white);
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 15px rgba(0, 90, 163, 0.5);
        }

        .layout {
            display: flex;
            height: calc(100vh - var(--header-h));
            margin-top: var(--header-h);
            padding: 15px;
            gap: 15px;
        }

        .sidebar {
            width: 28%;
            background: rgba(17, 22, 29, 0.85);
            border-radius: 16px;
            border: 1px solid var(--border-faint);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .sidebar-header {
            padding: 15px;
            background: rgba(255,255,255,0.02);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-faint);
            letter-spacing: 1px;
        }

        .scroll-container { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-content { padding: 10px; display: flex; flex-direction: column; gap: 10px; }

        .list-item {
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .list-item.active {
            background: rgba(0, 90, 163, 0.15);
            border-color: rgba(0, 90, 163, 0.4);
            transform: translateX(5px);
        }

        .list-thumb {
            width: 55px; height: 55px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #000;
            border: 1px solid var(--border-faint);
        }

        .list-text { overflow: hidden; display: flex; flex-direction: column; gap: 2px; }
        .list-date { font-size: 0.6rem; font-weight: 800; color: var(--elva-azure); text-transform: uppercase; }
        .list-title { font-size: 0.85rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-loc { font-size: 0.7rem; color: var(--text-muted); }

        .featured {
            width: 72%;
            background: #000;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-faint);
            box-shadow: 0 12px 48px rgba(0,0,0,0.5);
        }

        #featured-inner {
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease;
            position: relative;
            z-index: 2;
        }

        .feat-bg-blur {
            position: absolute; inset: 0;
            filter: blur(60px) brightness(0.15);
            object-fit: cover;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .feat-surface {
            width: 100%; height: 100%;
            display: flex;
            padding: 40px;
            gap: 40px;
            background: linear-gradient(135deg, rgba(8, 11, 15, 0.4) 0%, rgba(8, 11, 15, 0.95) 100%);
        }

        .feat-surface.portrait { flex-direction: row; align-items: center; }
        .feat-surface.landscape { flex-direction: column; }

        .feat-poster-wrap { display: flex; align-items: center; justify-content: center; }
        .portrait .feat-poster-wrap { height: 100%; width: 48%; }
        .landscape .feat-poster-wrap { width: 100%; height: 58%; }

        .feat-info-wrap { display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .portrait .feat-info-wrap { flex: 1; }
        .landscape .feat-info-wrap { width: 100%; flex: 1; padding-top: 20px; }

        .poster-img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .feat-date { color: var(--elva-azure); font-size: 1.1rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .feat-title { color: #fff; font-size: 2.4rem; font-weight: 900; line-height: 1.1; margin-bottom: 15px; letter-spacing: -0.02em; }
        .feat-loc { color: var(--elva-green); font-size: 1.2rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
        .feat-desc { color: var(--text-main); opacity: 0.9; font-size: 1.05rem; line-height: 1.6; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }
        
        .landscape .feat-desc { -webkit-line-clamp: 5; }
        .portrait .feat-desc { -webkit-line-clamp: 12; }

        .feat-footer {
            margin-top: auto;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding-top: 20px;
        }

        .qr-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--elva-azure);
            padding: 10px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(0, 90, 163, 0.2);
        }
        .qr-label { font-size: 0.55rem; font-weight: 800; text-transform: uppercase; color: #fff; opacity: 0.8; }
        .qr-canvas { background: #fff; padding: 4px; border-radius: 6px; line-height: 0; }

        .status-msg { font-size: 1.8rem; text-align: center; margin-top: 40vh; color: var(--text-muted); width: 100%; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <svg class="elva-vapp" viewBox="0 0 100 120">
            <path fill="#005aa3" d="M10,0 h80 v70 c0,30 -40,50 -40,50 c0,0 -40,-20 -40,-50 Z" />
            <g fill="#ffffff">
                <path d="M50 20 L62 45 L53 45 L68 75 L55 75 L70 95 L30 95 L45 75 L32 75 L47 45 L38 45 Z" />
                <path transform="translate(-25, 15) scale(0.75)" d="M50 20 L62 45 L53 45 L68 75 L55 75 L70 95 L30 95 L45 75 L32 75 L47 45 L38 45 Z" opacity="0.9" />
                <path transform="translate(25, 15) scale(0.75)" d="M50 20 L62 45 L53 45 L68 75 L55 75 L70 95 L30 95 L45 75 L32 75 L47 45 L38 45 Z" opacity="0.9" />
            </g>
        </svg>
        <h1>Elva Valla Kultuur</h1>
    </div>
    <div class="clock" id="clock">00:00</div>
</header>

<div id="loader" class="status-msg">Uuendan Elva sündmusi...</div>

<div class="layout" id="main-ui" style="display:none;">
    <aside class="sidebar">
        <div class="sidebar-header">Tulevased sündmused</div>
        <div class="scroll-container" id="scroll-container">
            <div class="scroll-content" id="scroll-list"></div>
        </div>
    </aside>

    <main class="featured" id="featured-area">
        <div id="featured-inner"></div>
    </main>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const DISPLAY_MS = 20000;

    let allEvents = [];
    let activeIdx = -1;
    let autoAdvanceTimer = null;

    const PLACEHOLDER = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect width="100%" height="100%" fill="#11161d"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#005aa3" font-family="Arial" font-size="60" font-weight="700">Elva Vald</text></svg>');

    function escapeHtml(v) { return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

    /**
     * TÄIUSTATUD ANDMETE LAADIMINE
     * Kontrollib vastuse sisu tüüpi ja proovib alternatiivseid proksi-teenuseid.
     */
    async function fetchEvents() {
        const encodedUrl = encodeURIComponent(SCRIPT_URL);
        const proxies = [
            `https://api.allorigins.win/get?url=${encodedUrl}&timestamp=${Date.now()}`,
            `https://corsproxy.io/?${encodedUrl}`,
            SCRIPT_URL // Otsepäring brauserist (töötab vaid teatud CORS lubadega)
        ];

        for (const url of proxies) {
            try {
                const res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) continue;

                let data;
                if (url.includes('allorigins')) {
                    const json = await res.json();
                    const contents = json.contents;
                    // Kontrollime, kas contents on JSON string
                    if (contents && contents.trim().startsWith('{') || contents.trim().startsWith('[')) {
                        data = JSON.parse(contents);
                    } else {
                        console.warn("AllOrigins tagastas vigase sisu (tõenäoliselt HTML veateade).");
                        continue;
                    }
                } else {
                    const text = await res.text();
                    // Kontrollime, kas tekst on JSON
                    if (text && text.trim().startsWith('{') || text.trim().startsWith('[')) {
                        data = JSON.parse(text);
                    } else {
                        console.warn("Proksi tagastas andmete asemel HTML-i.");
                        continue;
                    }
                }

                const events = (Array.isArray(data) ? data : (data.events || data.data || []))
                    .filter(e => e && e.title);

                if (events.length > 0) return events;
            } catch (e) {
                console.warn(`Viga laadimisel allikast ${url}:`, e);
            }
        }
        throw new Error("Andmeid ei õnnestunud ühestki allikast laadida (tõenäoliselt Google Scripti viga).");
    }

    function updateClock() {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", { hour: "2-digit", minute: "2-digit" });
    }
    setInterval(updateClock, 1000); updateClock();

    function renderList() {
        const list = document.getElementById("scroll-list");
        list.innerHTML = allEvents.map((ev, i) => `
            <div class="list-item" id="ev-${i}">
                <img src="${ev.img || PLACEHOLDER}" class="list-thumb" onerror="this.src='${PLACEHOLDER}'">
                <div class="list-text">
                    <div class="list-date">${escapeHtml(ev.date)}</div>
                    <div class="list-title">${escapeHtml(ev.title)}</div>
                    <div class="list-loc">📍 ${escapeHtml(ev.loc || "Elva vald")}</div>
                </div>
            </div>
        `).join('');
    }

    function switchFeatured(idx) {
        if (idx === activeIdx || !allEvents[idx]) return;
        activeIdx = idx;
        const ev = allEvents[idx];

        document.querySelectorAll(".list-item").forEach(el => el.classList.remove("active"));
        const listEl = document.getElementById(`ev-${idx}`);
        if (listEl) listEl.classList.add('active');

        const inner = document.getElementById("featured-inner");
        inner.style.opacity = 0;

        setTimeout(() => {
            const posterSrc = ev.img || PLACEHOLDER;
            
            inner.innerHTML = `
                <img src="${posterSrc}" class="feat-bg-blur">
                <div class="feat-surface" id="feat-surface">
                    <div class="feat-poster-wrap">
                        <img src="${posterSrc}" class="poster-img" id="main-poster" onerror="this.src='${PLACEHOLDER}'">
                    </div>
                    <div class="feat-info-wrap">
                        <div class="feat-date">${escapeHtml(ev.date)}</div>
                        <h2 class="feat-title">${escapeHtml(ev.title)}</h2>
                        <div class="feat-loc">📍 ${escapeHtml(ev.loc || "Elva vald")}</div>
                        <div class="feat-desc">${escapeHtml(ev.desc || "Lisainfo saamiseks skaneeri QR-kood.")}</div>
                        
                        <div class="feat-footer">
                            <div class="qr-box">
                                <div class="qr-label">INFO JA PILETID</div>
                                <div class="qr-canvas" id="qr-code"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const img = new Image();
            img.src = posterSrc;
            img.onload = () => {
                const surface = document.getElementById('feat-surface');
                if (!surface) return;
                
                if (img.naturalWidth > img.naturalHeight) {
                    surface.classList.add('landscape');
                } else {
                    surface.classList.add('portrait');
                }
                
                new QRCode(document.getElementById("qr-code"), {
                    text: ev.url || "https://elvakultuur.ee",
                    width: 70, height: 70, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M
                });
                
                inner.style.opacity = 1;
            };
            img.onerror = () => {
                const surface = document.getElementById('feat-surface');
                if (surface) {
                    surface.classList.add('portrait');
                    inner.style.opacity = 1;
                }
            };
        }, 150);
    }

    function autoCycle() {
        if (!allEvents.length) return;
        const next = (activeIdx + 1) % allEvents.length;
        switchFeatured(next);
        const container = document.getElementById("scroll-container");
        const item = document.getElementById(`ev-${next}`);
        if (item && container) container.scrollTo({ top: item.offsetTop - 100, behavior: "smooth" });
    }

    async function init() {
        const loader = document.getElementById("loader");
        try {
            allEvents = await fetchEvents();
            if (allEvents.length > 0) {
                loader.style.display = "none";
                document.getElementById("main-ui").style.display = "flex";
                renderList();
                switchFeatured(0);
                autoAdvanceTimer = setInterval(autoCycle, DISPLAY_MS);
            } else {
                loader.textContent = "Sündmusi ei leitud.";
            }
        } catch (e) {
            console.error("Viga:", e);
            loader.innerHTML = `<span style="color:#f87171">Viga andmete laadimisel.</span><br><small style="font-size:0.8rem; opacity:0.7;">${e.message}</small>`;
        }
    }

    init();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

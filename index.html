<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border-color: #30363d;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        header {
            background-color: rgba(13, 17, 23, 0.98);
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            position: fixed;
            top: 0;
            width: 100%;
            height: 76px;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-weight: 900;
            font-size: 1.85rem;
            text-transform: uppercase;
            color: #ffffff;
        }

        .clock {
            font-size: 2.15rem;
            font-weight: 700;
            color: var(--accent);
        }

        .layout {
            display: flex;
            height: calc(100vh - 76px);
            margin-top: 76px;
            padding: 18px;
            gap: 18px;
        }

        .sidebar {
            width: 30%;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .sidebar-header {
            padding: 14px;
            background: #10141a;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            position: relative;
            scrollbar-width: none;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }

        .scroll-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list-item {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 12px;
            border-left: 5px solid transparent;
            transition: all 0.35s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 94px;
        }

        .list-item.active {
            background: rgba(88, 166, 255, 0.15);
            border-left-color: var(--accent);
            transform: scale(1.02);
        }

        .list-thumb {
            width: 74px;
            height: 74px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .list-text-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
            min-width: 0;
        }

        .list-date {
            font-size: 0.72rem;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .list-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-loc {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.25;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .featured {
            width: 70%;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }

        .feat-bg-blur {
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: blur(60px) brightness(0.2);
            object-fit: cover;
            transform: scale(1.2);
            width: 100%;
            height: 100%;
        }

        .feat-poster-main {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 250px;
        }

        .feat-poster-main img {
            max-width: 72%;
            max-height: 72%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .feat-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 3;
            padding: 22px 30px 26px 30px;
            background: linear-gradient(to top, rgba(13,17,23,1) 0%, rgba(13,17,23,0.98) 82%, rgba(13,17,23,0.1) 100%);
        }

        .feat-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 16px;
        }

        .feat-text-wrap {
            flex: 1;
            min-width: 0;
            max-width: calc(100% - 120px);
        }

        .feat-date {
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 6px;
            text-transform: uppercase;
            line-height: 1.15;
        }

        .feat-title {
            font-size: 1.7rem;
            margin: 0 0 6px 0;
            font-weight: 900;
            line-height: 1.08;
            color: #ffffff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .feat-loc {
            font-size: 0.95rem;
            color: #e6edf3;
            margin-bottom: 10px;
            font-weight: 600;
            line-height: 1.3;
        }

        .feat-desc {
            font-size: 0.92rem;
            line-height: 1.45;
            opacity: 0.95;
            color: #c9d1d9;
            display: -webkit-box;
            -webkit-line-clamp: 7;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: 4px;
            max-width: 100%;
        }

        .qr-card {
            background: rgba(33, 38, 45, 0.95);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            flex-shrink: 0;
            margin-bottom: 4px;
        }

        .qr-label {
            font-size: 0.62rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.15;
        }

        .qr-target {
            background: white;
            padding: 5px;
            border-radius: 6px;
        }

        .status-msg {
            font-size: 2rem;
            text-align: center;
            margin-top: 35vh;
            color: var(--text-muted);
            width: 100%;
            padding: 0 40px;
        }

        #featured-inner {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.45s ease;
        }

        @media (max-width: 1200px) {
            .sidebar { width: 32%; }
            .featured { width: 68%; }
            .feat-title { font-size: 1.45rem; }
            .feat-desc { -webkit-line-clamp: 6; }
            .feat-poster-main img {
                max-width: 68%;
                max-height: 68%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Elva Valla Kultuur</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<div id="loader" class="status-msg">Laen Kultuuriakna sündmusi...</div>

<div class="layout" id="main-ui" style="display:none;">
    <div class="sidebar">
        <div class="sidebar-header">Tulevased sündmused</div>
        <div class="scroll-container" id="scroll-container">
            <div class="scroll-content" id="scroll-list"></div>
        </div>
    </div>

    <div class="featured">
        <div id="featured-inner"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const DEFAULT_TARGET_URL = "https://kultuuriaken.tartu.ee/et/syndmused?regions=788";
    const DISPLAY_MS = 20000;

    let allEvents = [];
    let activeIdx = -1;
    let autoAdvanceTimer = null;

    const PLACEHOLDER_IMG =
        "data:image/svg+xml;charset=UTF-8," +
        encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
                <rect width="100%" height="100%" fill="#161b22"/>
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
                      fill="#58a6ff" font-family="Arial, sans-serif"
                      font-size="56" font-weight="700">
                    Kultuurisündmus
                </text>
            </svg>
        `);

    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function normalizeText(value) {
        return String(value ?? "").replace(/\s+/g, " ").trim();
    }

    function truncate(text, max = 900) {
        const clean = normalizeText(text);
        if (!clean) return "";
        return clean.length > max ? clean.slice(0, max).trim() + "..." : clean;
    }

    function normalizeUrl(url) {
        const value = normalizeText(url);
        if (!value) return "";
        if (/^https?:\/\//i.test(value)) return value;
        if (value.startsWith("//")) return "https:" + value;
        if (value.startsWith("/")) return "https://kultuuriaken.tartu.ee" + value;
        return value;
    }

    function safeJsonParse(input) {
        if (input == null) return null;
        if (typeof input === "object") return input;
        const text = String(input).trim();
        if (!text) return null;
        try { return JSON.parse(text); } catch (err) { return null; }
    }

    function extractEventsArray(data) {
        if (Array.isArray(data)) return data;
        if (Array.isArray(data?.events)) return data.events;
        if (Array.isArray(data?.data)) return data.data;
        if (Array.isArray(data?.items)) return data.items;
        if (Array.isArray(data?.results)) return data.results;
        return [];
    }

    function normalizeEvent(raw) {
        if (!raw || typeof raw !== "object") return null;

        const title = normalizeText(raw.title);
        if (!title) return null;

        const date = normalizeText(raw.date || "Täpsustamisel");
        const loc = normalizeText(raw.loc || "Elva vald");
        const desc = truncate(raw.desc || "");
        const img = normalizeUrl(raw.img || "");
        const url = normalizeUrl(raw.url || DEFAULT_TARGET_URL);
        const startIso = normalizeText(raw.startIso || "");

        return { title, date, loc, desc, img, url, startIso };
    }

    async function fetchWithTimeout(url, timeout = 12000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeout);
        try {
            return await fetch(url, {
                method: "GET",
                cache: "no-store",
                signal: controller.signal
            });
        } finally {
            clearTimeout(timer);
        }
    }

    async function fetchEventsRobustly() {
        const encodedUrl = encodeURIComponent(SCRIPT_URL);
        const attempts = [
            { type: "direct-json", url: SCRIPT_URL },
            { type: "allorigins", url: `https://api.allorigins.win/get?url=${encodedUrl}` },
            { type: "plain-text", url: `https://corsproxy.io/?${encodedUrl}` }
        ];

        for (const attempt of attempts) {
            try {
                const res = await fetchWithTimeout(attempt.url, 12000);
                if (!res.ok) continue;

                let parsed = null;

                if (attempt.type === "allorigins") {
                    const wrapper = await res.json();
                    parsed = safeJsonParse(wrapper?.contents);
                } else {
                    const text = await res.text();
                    parsed = safeJsonParse(text);
                }

                const events = extractEventsArray(parsed)
                    .map(normalizeEvent)
                    .filter(Boolean)
                    .sort((a, b) => {
                        if (!a.startIso || !b.startIso) return 0;
                        return new Date(a.startIso) - new Date(b.startIso);
                    });

                if (events.length > 0) return events;
            } catch (err) {}
        }

        throw new Error("Andmeid ei õnnestunud laadida.");
    }

    function updateClock() {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    setInterval(updateClock, 1000);
    updateClock();

    function renderList() {
        const list = document.getElementById("scroll-list");
        list.innerHTML = "";

        allEvents.forEach((ev, i) => {
            const item = document.createElement("div");
            item.className = "list-item";
            item.id = `ev-${i}`;

            const thumb = document.createElement("img");
            thumb.className = "list-thumb";
            thumb.src = ev.img || PLACEHOLDER_IMG;
            thumb.onerror = function () { this.src = PLACEHOLDER_IMG; };

            const textWrap = `
                <div class="list-text-content">
                    <div class="list-date">${escapeHtml(ev.date)}</div>
                    <div class="list-title">${escapeHtml(ev.title)}</div>
                    <div class="list-loc">📍 ${escapeHtml(ev.loc)}</div>
                </div>
            `;

            item.appendChild(thumb);
            item.insertAdjacentHTML("beforeend", textWrap);
            list.appendChild(item);
        });
    }

    function switchFeatured(idx) {
        if (idx === activeIdx || !allEvents[idx]) return;

        activeIdx = idx;
        const ev = allEvents[idx];

        document.querySelectorAll(".list-item").forEach(el => el.classList.remove("active"));
        document.getElementById(`ev-${idx}`)?.classList.add("active");

        const inner = document.getElementById("featured-inner");
        inner.style.opacity = 0;

        setTimeout(() => {
            const poster = escapeHtml(ev.img || PLACEHOLDER_IMG);

            inner.innerHTML = `
                <img src="${poster}" class="feat-bg-blur" alt="">
                <div class="feat-poster-main">
                    <img src="${poster}" alt="${escapeHtml(ev.title)}">
                </div>
                <div class="feat-overlay">
                    <div class="feat-content">
                        <div class="feat-text-wrap">
                            <div class="feat-date">${escapeHtml(ev.date)}</div>
                            <h2 class="feat-title">${escapeHtml(ev.title)}</h2>
                            <div class="feat-loc">📍 ${escapeHtml(ev.loc)}</div>
                            <div class="feat-desc">${escapeHtml(ev.desc || "Vaata lisainfot QR-koodist.")}</div>
                        </div>
                        <div class="qr-card">
                            <div class="qr-label">INFO JA<br>PILETID</div>
                            <div class="qr-target" id="qr-box"></div>
                        </div>
                    </div>
                </div>
            `;

            inner.querySelectorAll("img").forEach(img => {
                img.onerror = function () { this.src = PLACEHOLDER_IMG; };
            });

            const qrBox = document.getElementById("qr-box");
            qrBox.innerHTML = "";

            new QRCode(qrBox, {
                text: ev.url || DEFAULT_TARGET_URL,
                width: 86,
                height: 86,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });

            inner.style.opacity = 1;
        }, 250);
    }

    function centerActiveItem(idx) {
        const container = document.getElementById("scroll-container");
        const item = document.getElementById(`ev-${idx}`);
        if (!container || !item) return;

        const targetTop = item.offsetTop - (container.clientHeight / 2) + (item.offsetHeight / 2);
        container.scrollTo({
            top: Math.max(0, targetTop),
            behavior: "smooth"
        });
    }

    function startAutoAdvance() {
        if (autoAdvanceTimer) clearInterval(autoAdvanceTimer);
        if (!allEvents.length) return;

        centerActiveItem(0);

        if (allEvents.length === 1) return;

        autoAdvanceTimer = setInterval(() => {
            const nextIdx = (activeIdx + 1) % allEvents.length;
            switchFeatured(nextIdx);
            centerActiveItem(nextIdx);
        }, DISPLAY_MS);
    }

    async function init() {
        const loader = document.getElementById("loader");
        const mainUi = document.getElementById("main-ui");

        try {
            allEvents = await fetchEventsRobustly();

            if (allEvents.length > 0) {
                loader.style.display = "none";
                mainUi.style.display = "flex";
                renderList();
                switchFeatured(0);
                startAutoAdvance();
            } else {
                loader.textContent = "Sündmusi ei leitud.";
            }
        } catch (e) {
            loader.innerHTML = `<span style="color:#ff6b6b">Viga laadimisel.</span>`;
        }
    }

    init();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

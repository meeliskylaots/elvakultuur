<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>
    <!-- Teegid: QRCode genereerimiseks ja Fondid disaini jaoks -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Disaini märgid (Tokens) */
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --card-hover: #21262d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border-color: #30363d;
            --transition-speed: 0.4s;
            --radius: 20px;
        }
        
        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Päis */
        header {
            background-color: rgba(13, 17, 23, 0.98);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            position: fixed;
            top: 0;
            width: 100%;
            height: 90px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        
        h1 { margin: 0; font-weight: 900; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 1px; color: #ffffff; }
        .clock { font-size: 2.8rem; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
        
        /* Põhilaotus */
        .layout {
            display: flex;
            height: calc(100vh - 90px);
            margin-top: 90px;
            padding: 25px;
            gap: 25px;
        }
        
        /* Vasak paneel: Nimekiri */
        .sidebar {
            width: 35%;
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .sidebar-header {
            padding: 20px;
            background: #10141a;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 1px;
        }

        .scroll-container {
            flex: 1;
            overflow-y: hidden;
            position: relative;
        }

        .scroll-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .list-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            border-left: 5px solid transparent;
            transition: transform var(--transition-speed), background var(--transition-speed), border var(--transition-speed);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 18px;
            cursor: pointer;
        }

        .list-item.active {
            background: rgba(88, 166, 255, 0.12);
            border-left-color: var(--accent);
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .list-thumb {
            width: 85px;
            height: 85px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .list-text-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow: hidden;
        }

        .list-date { font-size: 0.9rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .list-title { font-size: 1.2rem; font-weight: 700; color: #fff; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-loc { font-size: 0.85rem; color: var(--text-muted); }

        /* Parem paneel: Hero vaade */
        .featured {
            width: 65%;
            background: #000;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }
        
        .feat-bg-blur {
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: blur(60px) brightness(0.25);
            object-fit: cover;
            transform: scale(1.15);
            width: 100%;
            height: 100%;
            transition: opacity 0.8s ease;
        }

        .feat-poster-container {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 230px; 
        }

        .feat-poster-container img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .feat-overlay {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            z-index: 3;
            padding: 50px 60px;
            background: linear-gradient(to top, 
                rgba(13,17,23,1) 0%, 
                rgba(13,17,23,0.95) 70%, 
                rgba(13,17,23,0) 100%);
        }

        .feat-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 40px;
        }
        
        .feat-text-wrap { flex: 1; min-width: 0; }
        .feat-date { color: var(--accent); font-size: 2rem; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .feat-title { font-size: 3.2rem; margin: 0 0 15px 0; font-weight: 900; line-height: 1.1; color: #ffffff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .feat-loc { font-size: 1.6rem; color: #e6edf3; margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .feat-desc { font-size: 1.3rem; line-height: 1.5; opacity: 0.85; color: #c9d1d9; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .qr-card {
            background: rgba(33, 38, 45, 0.95);
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        
        .qr-label { font-size: 0.8rem; font-weight: 900; color: white; text-transform: uppercase; text-align: center; line-height: 1.2; }
        .qr-target { background: white; padding: 8px; border-radius: 8px; }

        /* Olekuteated */
        .status-msg { font-size: 2.2rem; text-align: center; margin-top: 35vh; color: var(--text-muted); width: 100%; padding: 0 50px; font-weight: 600; }
        .error-accent { color: #ff6b6b; display: block; margin-bottom: 10px; }
        
        #featured-inner { width: 100%; height: 100%; opacity: 0; transition: opacity 0.6s ease; }
    </style>
</head>
<body>

    <header>
        <h1>Elva Valla Kultuur</h1>
        <div class="clock" id="clock">00:00</div>
    </header>

    <main>
        <div id="loader" class="status-msg">Uuendan sündmuste voogu Google Apps Scriptist...</div>

        <div class="layout" id="main-ui" style="display: none;">
            <aside class="sidebar">
                <div class="sidebar-header">Tulevased sündmused</div>
                <div class="scroll-container" id="scroll-container">
                    <div class="scroll-content" id="scroll-list"></div>
                </div>
            </aside>

            <section class="featured" aria-label="Fookuses olev sündmus">
                <div id="featured-inner"></div>
            </section>
        </div>
    </main>

    <script>
        /**
         * KONFIGURATSIOON
         * Siia läheb sinu Google Apps Scripti "Web App" URL
         */
        const CONFIG = {
            SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec",
            REFRESH_INTERVAL: 30 * 60 * 1000, 
            SCROLL_SPEED: 28, 
            PLACEHOLDER_IMG: "https://dummyimage.com/1200x800/161b22/58a6ff.png&text=Elva+Kultuur",
            PROXIES: [
                url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                url => `https://corsproxy.io/?${encodeURIComponent(url)}`
            ]
        };

        /**
         * RAKENDUSE OLEK
         */
        const state = {
            events: [],
            activeIdx: -1,
            isScrolling: true,
            scrollY: 0,
            lastTs: 0
        };

        /**
         * ABIFUNKTSIOONID
         */
        const updateClock = () => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('et-EE', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
        };

        /**
         * ANDMETE PÄRIMINE
         */
        async function fetchEventsFromScript() {
            for (const proxyFn of CONFIG.PROXIES) {
                try {
                    const proxyUrl = proxyFn(CONFIG.SCRIPT_URL);
                    const res = await fetch(proxyUrl);
                    if (!res.ok) continue;

                    const data = await res.json();
                    // AllOrigins pakib sisu sisse, teised võivad anda otse
                    const rawContent = data.contents || data;
                    const parsed = typeof rawContent === 'string' ? JSON.parse(rawContent) : rawContent;
                    
                    if (parsed && parsed.ok && Array.isArray(parsed.events)) {
                        return parsed.events;
                    }
                } catch (e) {
                    console.warn("Proxy viga, proovin järgmist...");
                }
            }
            throw new Error("Andmete laadimine Google Scriptist ebaõnnestus.");
        }

        /**
         * KASUTAJALIIDESE UUENDAMINE
         */
        function renderSidebar() {
            const list = document.getElementById('scroll-list');
            list.innerHTML = state.events.map((ev, i) => `
                <div class="list-item" id="ev-${i}" onclick="state.activeIdx = ${i}; updateFeatured();">
                    <img src="${ev.img || 'https://dummyimage.com/150x150/161b22/58a6ff.png&text=+'}" 
                         class="list-thumb" 
                         alt="" 
                         onerror="this.src='https://dummyimage.com/150x150/161b22/58a6ff.png&text=+'">
                    <div class="list-text-content">
                        <div class="list-date">${ev.date || 'Täpsustamisel'}</div>
                        <div class="list-title">${ev.title}</div>
                        <div class="list-loc">📍 ${ev.loc || 'Elva vald'}</div>
                    </div>
                </div>
            `).join('');
        }

        function updateFeatured() {
            const idx = state.activeIdx;
            const ev = state.events[idx];
            if (!ev) return;

            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`ev-${idx}`)?.classList.add('active');

            const container = document.getElementById('featured-inner');
            container.style.opacity = 0;

            setTimeout(() => {
                const poster = ev.img || CONFIG.PLACEHOLDER_IMG;
                
                container.innerHTML = `
                    <img src="${poster}" class="feat-bg-blur" alt="" onerror="this.src='${CONFIG.PLACEHOLDER_IMG}'">
                    <div class="feat-poster-container">
                        <img src="${poster}" alt="Sündmuse plakat" onerror="this.src='${CONFIG.PLACEHOLDER_IMG}'">
                    </div>
                    <div class="feat-overlay">
                        <div class="feat-content">
                            <div class="feat-text-wrap">
                                <div class="feat-date">${ev.date || 'Täpsustamisel'}</div>
                                <h2 class="feat-title">${ev.title}</h2>
                                <div class="feat-loc">📍 ${ev.loc || 'Elva vald'}</div>
                                <div class="feat-desc">${ev.desc || 'Lisainfo saamiseks skaneeri QR-kood.'}</div>
                            </div>
                            <div class="qr-card">
                                <div class="qr-label">SKANEERI<br>LISAINFOKS</div>
                                <div class="qr-target" id="qr-code"></div>
                            </div>
                        </div>
                    </div>
                `;

                new QRCode(document.getElementById('qr-code'), {
                    text: ev.url || "https://kultuuriaken.tartu.ee",
                    width: 120,
                    height: 120,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });

                container.style.opacity = 1;
            }, 300);
        }

        /**
         * ANIMATSIOONID JA KERIMINE
         */
        function animate(ts) {
            if (!state.isScrolling) return;
            
            const container = document.getElementById('scroll-container');
            if (!container) return;

            if (!state.lastTs) state.lastTs = ts;
            const dt = (ts - state.lastTs) / 1000;
            state.lastTs = ts;

            state.scrollY += CONFIG.SCROLL_SPEED * dt;
            container.scrollTop = state.scrollY;

            const mid = container.scrollTop + (container.clientHeight / 2);
            const items = document.querySelectorAll('.list-item');
            
            let closestIdx = 0;
            let minDist = Infinity;

            items.forEach((it, i) => {
                const dist = Math.abs((it.offsetTop + it.offsetHeight / 2) - mid);
                if (dist < minDist) {
                    minDist = dist;
                    closestIdx = i;
                }
            });

            if (closestIdx !== state.activeIdx && closestIdx < state.events.length) {
                state.activeIdx = closestIdx;
                updateFeatured();
            }

            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 2) {
                state.isScrolling = false;
                setTimeout(() => {
                    container.scrollTo({ top: 0, behavior: 'smooth' });
                    state.scrollY = 0;
                    state.lastTs = 0;
                    setTimeout(() => {
                        state.isScrolling = true;
                        requestAnimationFrame(animate);
                    }, 2500);
                }, 4000);
                return;
            }

            requestAnimationFrame(animate);
        }

        /**
         * RAKENDUSE KÄIVITAMINE
         */
        async function init() {
            const loader = document.getElementById('loader');
            updateClock();
            setInterval(updateClock, 1000);

            try {
                const events = await fetchEventsFromScript();
                state.events = events;

                if (state.events.length > 0) {
                    loader.style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                    renderSidebar();
                    state.activeIdx = 0;
                    updateFeatured();
                    requestAnimationFrame(animate);
                } else {
                    loader.innerHTML = "Google tabelis pole aktiivseid sündmusi.<br><small style='font-size:1.2rem; opacity:0.6'>Lisa sündmusi tabelisse või käivita impordi funktsioon.</small>";
                }
            } catch (e) {
                loader.innerHTML = `
                    <span class="error-accent">Andmete pärimine ebaõnnestus</span>
                    <small style='font-size:1rem; opacity:0.6'>Veendu, et Google Script on avaldatud kui "Web App" ja ligipääs on "Anyone".<br>${e.message}</small>
                `;
            }
        }

        window.onload = init;
        setInterval(() => window.location.reload(), CONFIG.REFRESH_INTERVAL);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --elva-blue: #1d71d4;
            --bg-black: #000000;
            --card-black: #080808;
            --text-white: #ffffff;
            --accent-green: #22c55e;
            --border: rgba(255, 255, 255, 0.15);
            --header-h: 12vh;
            --ticker-h: 15vh;
            --safe-area: 5vw;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-black);
            color: var(--text-white);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 var(--safe-area);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        #ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: brightness(0.15) blur(80px);
            transition: background-image 1.5s ease-in-out;
            transform: scale(1.2);
        }

        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 2vh;
        }

        .header-left { display: flex; align-items: center; gap: 1.5vw; }
        .elva-logo {
            width: 3.5vw; height: 3.5vw; background: var(--elva-blue);
            border-radius: 20%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 2vw;
        }
        .header-title { font-size: 1.6vw; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .clock-section { text-align: right; }
        .clock { font-size: 3.8vw; font-weight: 900; line-height: 1; }
        .date-today { font-size: 1.3vw; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-top: 5px; }

        .app-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2vh 0;
            gap: 2vh;
            min-height: 0;
        }

        .hero {
            flex: 1;
            background: var(--card-black);
            border: 2px solid var(--border);
            border-radius: 2vw;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
        }

        .progress-bar {
            position: absolute; top: 0; left: 0; height: 1vh;
            background: var(--elva-blue); width: 0; z-index: 10;
        }

        #hero-inner { 
            display: flex; 
            width: 100%; 
            height: 100%; 
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }

        .hero-info {
            flex: 1;
            padding: 4vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .hero-date-tag {
            background: var(--elva-blue);
            padding: 0.8vw 2vw;
            border-radius: 50px;
            font-size: 1.3vw;
            font-weight: 800;
            margin-bottom: 2.5vh;
            display: inline-block;
            align-self: flex-start;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .hero-title {
            font-size: 3.2vw;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2vh;
            color: #ffffff;
            word-wrap: break-word;
        }

        .hero-loc {
            font-size: 1.8vw;
            font-weight: 800;
            color: var(--accent-green);
            margin-bottom: 2vh;
        }

        .hero-desc {
            font-size: 1.5vw;
            line-height: 1.5;
            color: #cbd5e1;
            font-weight: 600;
            max-width: 95%;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-visual {
            flex: 0 0 42%;
            padding: 4vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 1.8vw;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .hero-image { width: 100%; height: 100%; object-fit: contain; background: #050505; }

        .bottom-section {
            height: var(--ticker-h);
            display: flex;
            gap: 2vw;
            padding-bottom: 4vh;
            align-items: stretch;
            min-height: 0;
        }

        .ticker-scroll {
            flex: 1;
            display: flex;
            gap: 1.5vw;
            overflow-x: auto;
            scrollbar-width: none; 
            scroll-behavior: smooth;
        }
        .ticker-scroll::-webkit-scrollbar { display: none; }

        .event-card {
            flex: 0 0 24vw;
            height: 100%;
            background: #0a0a0a;
            border: 2px solid var(--border);
            border-radius: 1.4vw;
            display: flex;
            align-items: center;
            padding: 1vw;
            gap: 1.2vw;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .event-card.active {
            border: 4px solid var(--elva-blue);
            background: rgba(29, 113, 212, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(29, 113, 212, 0.3);
        }

        .event-card-img { width: 4.5vw; height: 4.5vw; border-radius: 0.8vw; object-fit: cover; background: #222; }
        
        .event-card-info {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.3vw;
            flex: 1;
        }

        .event-card-date {
            font-size: 0.85vw;
            color: var(--elva-blue);
            font-weight: 800;
            text-transform: uppercase;
        }

        .event-card-title {
            font-size: 1.05vw;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .qr-area {
            width: 25vw; 
            background: var(--card-black);
            border: 2px solid var(--border); 
            border-radius: 2vw;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0.8vw 2vw;
            gap: 1.5vw;
        }
        .qr-text { font-size: 1vw; font-weight: 900; text-align: right; line-height: 1.2; color: #fff; flex: 1; letter-spacing: 0.5px; }
        
        .qr-box { 
            background: #fff; 
            padding: 0.5vw; 
            border-radius: 1vw; 
            height: 6vw; 
            width: 6vw;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #qr-target img, #qr-target canvas {
            max-width: 100%;
            max-height: 100%;
        }

        @keyframes progress { from { width: 0; } to { width: 100%; } }
        .loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; font-size: 3vw; font-weight: 900; color: var(--elva-blue); flex-direction: column; }
        .error-details { font-size: 1.2vw; color: #64748b; margin-top: 2vh; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

<div id="ambient-bg"></div>
<div id="loader" class="loader">
    LAEN ANDMEID...
    <div id="loader-error" class="error-details">Ootan Kultuuriakna värskeid sündmusi</div>
</div>

<header>
    <div class="header-left">
        <div class="elva-logo">E</div>
        <h1 class="header-title">Kultuuriekraan</h1>
    </div>
    <div class="clock-section">
        <div class="clock" id="clock">00:00</div>
        <div class="date-today" id="today-date">...</div>
    </div>
</header>

<main class="app-content" id="app-main" style="visibility: hidden;">
    <section class="hero">
        <div class="progress-bar" id="progress-bar"></div>
        <div id="hero-inner"></div>
    </section>

    <div class="bottom-section">
        <div class="ticker-scroll" id="ticker-scroll"></div>
        <div class="qr-area">
            <div class="qr-text">LÄHEMALT<br>& PILETID</div>
            <div class="qr-box" id="qr-target"></div>
        </div>
    </div>
</main>

<script>
    // Sinu Google Apps Scripti link
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const ROTATE_INTERVAL = 15000; // Sündmus vahetub iga 15 sek järel
    
    let events = [];
    let currentIndex = 0;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('et-EE', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('today-date').textContent = now.toLocaleDateString('et-EE', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function formatIsoDate(isoString) {
        if (!isoString) return "Kuupäev puudub";
        let cleanIso = isoString.replace('Z', '').split('+')[0];
        const d = new Date(cleanIso);
        if (isNaN(d.getTime())) return isoString;
        const days = ['Pühapäev', 'Esmaspäev', 'Teisipäev', 'Kolmapäev', 'Neljapäev', 'Reede', 'Laupäev'];
        const months = ['jaanuar', 'veebruar', 'märts', 'aprill', 'mai', 'juuni', 'juuli', 'august', 'september', 'oktoober', 'november', 'detsember'];
        return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]} | kell ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    async function loadData() {
        try {
            const res = await fetch(`${SCRIPT_URL}?format=json&t=${Date.now()}`);
            const text = await res.text();
            
            if (text.trim().startsWith('<')) {
                throw new Error("Google Script ei tagastanud JSON andmeid.");
            }
            
            const data = JSON.parse(text);
            if (data.ok && data.events && data.events.length > 0) {
                events = data.events;
            } else {
                events = [];
            }
        } catch (e) { 
            console.error("Viga laadimisel:", e); 
            events = []; 
        }
        processData();
    }

    function processData() {
        const loader = document.getElementById('loader');
        const appMain = document.getElementById('app-main');
        
        if (events && events.length > 0) {
            loader.style.display = 'none';
            appMain.style.visibility = 'visible';
            renderTicker();
            showEvent(0);
            
            if (window.rotationTimer) clearInterval(window.rotationTimer);
            window.rotationTimer = setInterval(() => {
                currentIndex = (currentIndex + 1) % events.length;
                showEvent(currentIndex);
            }, ROTATE_INTERVAL);
        } else {
            appMain.style.visibility = 'hidden';
            loader.innerHTML = `
                <div>HETKEL ÜRITUSI EI OLE</div>
                <div class="error-details">Kultuuriaknas Elva valla sündmused hetkel puuduvad.</div>
            `;
            loader.style.display = 'flex';
        }
    }

    function renderTicker() {
        const t = document.getElementById('ticker-scroll');
        t.innerHTML = events.map((ev, i) => {
            let cleanIso = (ev.startIso || "").replace('Z', '').split('+')[0];
            const date = new Date(cleanIso);
            const displayDate = date.toLocaleDateString('et-EE', { day: 'numeric', month: 'short' });
            const displayTime = date.toLocaleTimeString('et-EE', { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="event-card" id="card-${i}" onclick="currentIndex=${i}; showEvent(${i})">
                    <img src="${ev.img || ''}" class="event-card-img" onerror="this.style.visibility='hidden'">
                    <div class="event-card-info">
                        <div class="event-card-date">${displayDate} · ${displayTime}</div>
                        <div class="event-card-title">${ev.title || "Üritus"}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function showEvent(idx) {
        if (!events || events.length === 0) return;
        const ev = events[idx];
        const inner = document.getElementById('hero-inner');
        const pb = document.getElementById('progress-bar');
        
        inner.style.opacity = 0;
        inner.style.transform = 'translateY(15px)';

        setTimeout(() => {
            document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.getElementById(`card-${idx}`);
            if (activeCard) {
                activeCard.classList.add('active');
                activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            pb.style.animation = 'none';
            void pb.offsetWidth;
            pb.style.animation = `progress ${ROTATE_INTERVAL}ms linear forwards`;
            
            if (ev.img) {
                document.getElementById('ambient-bg').style.backgroundImage = `url('${ev.img}')`;
            } else {
                document.getElementById('ambient-bg').style.backgroundImage = 'none';
            }

            inner.innerHTML = `
                <div class="hero-info">
                    <div class="hero-date-tag">${formatIsoDate(ev.startIso)}</div>
                    <h2 class="hero-title">${ev.title || "Pealkiri puudub"}</h2>
                    <div class="hero-loc">📍 ${ev.loc || "Elva vald"}</div>
                    <div class="hero-desc">${ev.desc || ""}</div>
                </div>
                <div class="hero-visual">
                    <div class="image-wrapper">
                        <img src="${ev.img || ''}" class="hero-image" onerror="this.style.display='none'">
                    </div>
                </div>
            `;

            const qrTarget = document.getElementById("qr-target");
            if (qrTarget) {
                qrTarget.innerHTML = "";
                new QRCode(qrTarget, { 
                    text: ev.url || "https://kultuuriaken.tartu.ee", 
                    width: 150, 
                    height: 150, 
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M 
                });
            }

            inner.style.opacity = 1;
            inner.style.transform = 'translateY(0)';
        }, 300);
    }

    loadData();
    setInterval(loadData, 1800000); 
</script>
</body>
</html>

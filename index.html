<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b1016;
            --card-bg: #131922;
            --panel-bg: rgba(19, 25, 34, 0.92);
            --text-main: #d7dee7;
            --text-muted: #8e98a4;
            --accent: #69aefc;
            --border-soft: rgba(255,255,255,0.08);
            --border-faint: rgba(255,255,255,0.05);
        }

        * { box-sizing: border-box; }

        body {
            background:
                radial-gradient(circle at 70% 35%, rgba(74, 129, 255, 0.10), transparent 28%),
                radial-gradient(circle at 30% 70%, rgba(255, 90, 90, 0.05), transparent 22%),
                var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        header {
            background: rgba(11, 16, 22, 0.88);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(105, 174, 252, 0.35);
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            color: #ffffff;
        }

        .clock {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.02em;
        }

        .layout {
            display: flex;
            height: calc(100vh - 60px);
            margin-top: 60px;
            padding: 15px;
            gap: 15px;
        }

        /* VASAK PANEEL - Väiksem font */
        .sidebar {
            width: 30%;
            background: rgba(19, 25, 34, 0.72);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--border-faint);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 12px 16px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border-faint);
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #dce5ef;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            position: relative;
            scrollbar-width: none;
        }

        .scroll-container::-webkit-scrollbar { display: none; }

        .scroll-content {
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .list-item {
            background: rgba(255,255,255,0.02);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 80px;
        }

        .list-item.active {
            background: rgba(105, 174, 252, 0.08);
            border-color: rgba(105, 174, 252, 0.25);
        }

        .list-thumb {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .list-text-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
            min-width: 0;
        }

        .list-date {
            font-size: 0.65rem;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
        }

        .list-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-loc {
            font-size: 0.68rem;
            color: var(--text-muted);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
        }

        /* PAREM PANEEL - Suuremad pildid, väiksem font */
        .featured {
            width: 70%;
            border-radius: 22px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-faint);
            background: #0c1219;
        }

        .feat-bg-blur {
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: blur(60px) brightness(0.2);
            object-fit: cover;
            transform: scale(1.1);
        }

        .feat-surface {
            position: absolute;
            inset: 0;
            z-index: 2;
            padding: 30px;
            background: linear-gradient(to top, rgba(11,16,22,0.96) 0%, rgba(11,16,22,0.85) 60%, rgba(11,16,22,0.6) 100%);
            display: flex;
            gap: 30px;
        }

        .feat-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .feat-side {
            width: 320px; /* Suurendatud küljepaneel pildi jaoks */
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .feat-poster-wrap {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feat-poster-main img {
            max-width: 100%;
            max-height: 420px; /* Suurendatud pildi kõrgus */
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .feat-date {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .feat-title {
            font-size: 1.7rem; /* Vähendatud pealkiri */
            margin: 0 0 10px 0;
            font-weight: 900;
            line-height: 1.1;
            color: #ffffff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: -0.02em;
        }

        .feat-loc {
            font-size: 0.9rem;
            color: #eef3f8;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .feat-desc {
            font-size: 0.88rem; /* Vähendatud kirjeldus */
            line-height: 1.5;
            opacity: 0.9;
            color: #d4dbe4;
            display: -webkit-box;
            -webkit-line-clamp: 10;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .qr-card {
            background: rgba(255,255,255,0.03);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .qr-label {
            font-size: 0.5rem;
            font-weight: 800;
            color: #d9e2eb;
            text-transform: uppercase;
            text-align: center;
        }

        .qr-target {
            background: white;
            padding: 3px;
            border-radius: 4px;
        }

        .status-msg {
            font-size: 2rem;
            text-align: center;
            margin-top: 35vh;
            color: var(--text-muted);
            width: 100%;
            padding: 0 40px;
        }

        #featured-inner {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.45s ease;
        }
    </style>
</head>
<body>

<header>
    <h1>Elva Valla Kultuur</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<div id="loader" class="status-msg">Laen sündmusi...</div>

<div class="layout" id="main-ui" style="display:none;">
    <div class="sidebar">
        <div class="sidebar-header">Tulevased sündmused</div>
        <div class="scroll-container" id="scroll-container">
            <div class="scroll-content" id="scroll-list"></div>
        </div>
    </div>

    <div class="featured">
        <div id="featured-inner"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const DEFAULT_TARGET_URL = "https://kultuuriaken.tartu.ee/et/syndmused?regions=788";
    const DISPLAY_MS = 20000;

    let allEvents = [];
    let activeIdx = -1;
    let autoAdvanceTimer = null;

    const PLACEHOLDER_IMG =
        "data:image/svg+xml;charset=UTF-8," +
        encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
                <rect width="100%" height="100%" fill="#161b22"/>
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
                      fill="#58a6ff" font-family="Arial, sans-serif"
                      font-size="56" font-weight="700">
                    Kultuurisündmus
                </text>
            </svg>
        `);

    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function normalizeText(value) {
        return String(value ?? "").replace(/\s+/g, " ").trim();
    }

    function truncate(text, max = 1200) {
        const clean = normalizeText(text);
        if (!clean) return "";
        return clean.length > max ? clean.slice(0, max).trim() + "..." : clean;
    }

    function normalizeUrl(url) {
        const value = normalizeText(url);
        if (!value) return "";
        if (/^https?:\/\//i.test(value)) return value;
        if (value.startsWith("//")) return "https:" + value;
        if (value.startsWith("/")) return "https://kultuuriaken.tartu.ee" + value;
        return value;
    }

    function safeJsonParse(input) {
        if (input == null) return null;
        if (typeof input === "object") return input;
        const text = String(input).trim();
        if (!text) return null;
        try { return JSON.parse(text); } catch (err) { return null; }
    }

    function extractEventsArray(data) {
        if (Array.isArray(data)) return data;
        if (Array.isArray(data?.events)) return data.events;
        if (Array.isArray(data?.data)) return data.data;
        return [];
    }

    function normalizeEvent(raw) {
        if (!raw || typeof raw !== "object") return null;
        const title = normalizeText(raw.title);
        if (!title) return null;
        const date = normalizeText(raw.date || "Täpsustamisel");
        const loc = normalizeText(raw.loc || "Elva vald");
        const desc = truncate(raw.desc || "");
        const img = normalizeUrl(raw.img || "");
        const url = normalizeUrl(raw.url || DEFAULT_TARGET_URL);
        const startIso = normalizeText(raw.startIso || "");
        return { title, date, loc, desc, img, url, startIso };
    }

    async function fetchWithTimeout(url, timeout = 12000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeout);
        try {
            return await fetch(url, { method: "GET", cache: "no-store", signal: controller.signal });
        } finally { clearTimeout(timer); }
    }

    async function fetchEventsRobustly() {
        const encodedUrl = encodeURIComponent(SCRIPT_URL);
        const attempts = [
            { type: "direct", url: SCRIPT_URL },
            { type: "allorigins", url: `https://api.allorigins.win/get?url=${encodedUrl}` }
        ];

        for (const attempt of attempts) {
            try {
                const res = await fetchWithTimeout(attempt.url, 12000);
                if (!res.ok) continue;
                let body = attempt.type === "allorigins" ? await res.json() : safeJsonParse(await res.text());
                let data = attempt.type === "allorigins" ? safeJsonParse(body?.contents) : body;
                
                const events = extractEventsArray(data)
                    .map(normalizeEvent)
                    .filter(Boolean)
                    .sort((a, b) => (a.startIso && b.startIso) ? new Date(a.startIso) - new Date(b.startIso) : 0);

                if (events.length > 0) return events;
            } catch (err) {}
        }
        throw new Error("Viga andmete laadimisel.");
    }

    function updateClock() {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", {
            hour: "2-digit", minute: "2-digit"
        });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function renderList() {
        const list = document.getElementById("scroll-list");
        list.innerHTML = "";
        allEvents.forEach((ev, i) => {
            const item = document.createElement("div");
            item.className = "list-item";
            item.id = `ev-${i}`;
            const thumb = document.createElement("img");
            thumb.className = "list-thumb";
            thumb.src = ev.img || PLACEHOLDER_IMG;
            thumb.onerror = function() { this.src = PLACEHOLDER_IMG; };
            const textWrap = `<div class="list-text-content"><div class="list-date">${escapeHtml(ev.date)}</div><div class="list-title">${escapeHtml(ev.title)}</div><div class="list-loc">📍 ${escapeHtml(ev.loc)}</div></div>`;
            item.appendChild(thumb);
            item.insertAdjacentHTML('beforeend', textWrap);
            list.appendChild(item);
        });
    }

    function switchFeatured(idx) {
        if (idx === activeIdx || !allEvents[idx]) return;
        activeIdx = idx;
        const ev = allEvents[idx];
        document.querySelectorAll(".list-item").forEach(el => el.classList.remove("active"));
        document.getElementById(`ev-${idx}`)?.classList.add("active");
        const inner = document.getElementById("featured-inner");
        inner.style.opacity = 0;

        setTimeout(() => {
            const poster = escapeHtml(ev.img || PLACEHOLDER_IMG);
            inner.innerHTML = `
                <img src="${poster}" class="feat-bg-blur" alt="">
                <div class="feat-surface">
                    <div class="feat-main">
                        <div class="feat-date">${escapeHtml(ev.date)}</div>
                        <h2 class="feat-title">${escapeHtml(ev.title)}</h2>
                        <div class="feat-loc">📍 ${escapeHtml(ev.loc)}</div>
                        <div class="feat-desc">${escapeHtml(ev.desc || "Vaata lisainfot QR-koodist.")}</div>
                    </div>
                    <div class="feat-side">
                        <div class="feat-poster-wrap">
                            <div class="feat-poster-main">
                                <img src="${poster}" alt="${escapeHtml(ev.title)}">
                            </div>
                        </div>
                        <div class="qr-card">
                            <div class="qr-label">INFO JA<br>PILETID</div>
                            <div class="qr-target" id="qr-box"></div>
                        </div>
                    </div>
                </div>`;

            inner.querySelectorAll("img").forEach(img => {
                img.onerror = function() { this.src = PLACEHOLDER_IMG; };
            });

            new QRCode(document.getElementById("qr-box"), {
                text: ev.url || DEFAULT_TARGET_URL,
                width: 60, height: 60, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.M
            });
            inner.style.opacity = 1;
        }, 250);
    }

    function centerActiveItem(idx) {
        const container = document.getElementById("scroll-container");
        const item = document.getElementById(`ev-${idx}`);
        if (!container || !item) return;
        const targetTop = item.offsetTop - (container.clientHeight / 2) + (item.offsetHeight / 2);
        container.scrollTo({ top: Math.max(0, targetTop), behavior: "smooth" });
    }

    function startAutoAdvance() {
        if (autoAdvanceTimer) clearInterval(autoAdvanceTimer);
        autoAdvanceTimer = setInterval(() => {
            const nextIdx = (activeIdx + 1) % allEvents.length;
            switchFeatured(nextIdx);
            centerActiveItem(nextIdx);
        }, DISPLAY_MS);
    }

    async function init() {
        const loader = document.getElementById("loader");
        const mainUi = document.getElementById("main-ui");
        try {
            allEvents = await fetchEventsRobustly();
            if (allEvents.length > 0) {
                loader.style.display = "none";
                mainUi.style.display = "flex";
                renderList();
                switchFeatured(0);
                startAutoAdvance();
            } else {
                loader.textContent = "Sündmusi ei leitud.";
            }
        } catch (e) {
            loader.innerHTML = `<span style="color:#ff6b6b">Viga laadimisel.</span>`;
        }
    }

    init();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

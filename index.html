<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border-color: #30363d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        header {
            background-color: rgba(13, 17, 23, 0.98);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            position: fixed;
            top: 0;
            width: 100%;
            height: 90px;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
            color: #ffffff;
        }

        .clock {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .layout {
            display: flex;
            height: calc(100vh - 90px);
            margin-top: 90px;
            padding: 25px;
            gap: 25px;
        }

        .sidebar {
            width: 35%;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .sidebar-header {
            padding: 20px;
            background: #10141a;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
        }

        .scroll-container {
            flex: 1;
            overflow-y: hidden;
            position: relative;
            scroll-behavior: auto;
        }

        .scroll-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            border-left: 5px solid transparent;
            transition: all 0.35s ease;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
        }

        .list-item.active {
            background: rgba(88, 166, 255, 0.15);
            border-left-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .list-thumb {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .list-text-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
            min-width: 0;
        }

        .list-date {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
        }

        .list-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-loc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .featured {
            width: 65%;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }

        .feat-bg-blur {
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: blur(60px) brightness(0.2);
            object-fit: cover;
            transform: scale(1.2);
            width: 100%;
            height: 100%;
        }

        .feat-poster-main {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 220px;
        }

        .feat-poster-main img {
            max-width: 95%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .feat-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 3;
            padding: 40px 50px;
            background: linear-gradient(to top, rgba(13,17,23,1) 0%, rgba(13,17,23,0.95) 75%, rgba(13,17,23,0) 100%);
        }

        .feat-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 30px;
        }

        .feat-text-wrap {
            flex: 1;
            min-width: 0;
        }

        .feat-date {
            color: var(--accent);
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .feat-title {
            font-size: 2.8rem;
            margin: 0 0 12px 0;
            font-weight: 900;
            line-height: 1.1;
            color: #ffffff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .feat-loc {
            font-size: 1.4rem;
            color: #e6edf3;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .feat-desc {
            font-size: 1.2rem;
            line-height: 1.4;
            opacity: 0.85;
            color: #c9d1d9;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .qr-card {
            background: rgba(33, 38, 45, 0.95);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }

        .qr-label {
            font-size: 0.75rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            text-align: center;
        }

        .qr-target {
            background: white;
            padding: 6px;
            border-radius: 6px;
        }

        .status-msg {
            font-size: 2rem;
            text-align: center;
            margin-top: 35vh;
            color: var(--text-muted);
            width: 100%;
            padding: 0 40px;
        }

        #featured-inner {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.45s ease;
        }
    </style>
</head>
<body>

    <header>
        <h1>Elva Valla Kultuur</h1>
        <div class="clock" id="clock">00:00</div>
    </header>

    <div id="loader" class="status-msg">Laen andmeid Kultuuriaknast...</div>

    <div class="layout" id="main-ui" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">Sündmuste voog</div>
            <div class="scroll-container" id="scroll-container">
                <div class="scroll-content" id="scroll-list"></div>
            </div>
        </div>

        <div class="featured">
            <div id="featured-inner"></div>
        </div>
    </div>

    <script>
        const KULTUURIAKEN_URL = "https://kultuuriaken.tartu.ee/et/syndmused?categories=1%7C2%7C3%7C4%7C5%7C6%7C7%7C8%7C9%7C10%7C11%7C12%7C13%7C14%7C15%7C16%7C59%7C60%7C61%7C62%7C63%7C64%7C65%7C17%7C18%7C19%7C20%7C21%7C22%7C85%7C23%7C35%7C87%7C88%7C24&starting_time=4&regions=788";
        const BASE_URL = "https://kultuuriaken.tartu.ee";
        const DETAIL_PATH_RE = /\/et\/syndmus\//i;
        const SCROLL_SPEED = 26;

        const PLACEHOLDER_IMG =
            "data:image/svg+xml;charset=UTF-8," +
            encodeURIComponent(`
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
                    <rect width="100%" height="100%" fill="#161b22"/>
                    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
                          fill="#58a6ff" font-family="Arial, sans-serif"
                          font-size="56" font-weight="700">
                        Kultuurisündmus
                    </text>
                </svg>
            `);

        let allEvents = [];
        let activeIdx = -1;
        let isScrolling = true;
        let scrollY = 0;
        let lastTs = 0;

        function normalizeText(value) {
            return (value || "").replace(/\s+/g, " ").trim();
        }

        function multilineText(el) {
            return (el?.textContent || "")
                .split("\n")
                .map(s => s.replace(/\s+/g, " ").trim())
                .filter(Boolean);
        }

        function truncate(text, max = 180) {
            if (!text) return "";
            return text.length > max ? text.slice(0, max).trim() + "..." : text;
        }

        function toAbsoluteUrl(url) {
            if (!url) return "";
            if (url.startsWith("//")) return "https:" + url;
            if (url.startsWith("/")) return BASE_URL + url;
            return url;
        }

        async function fetchWithTimeout(url, timeout = 12000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);

            try {
                const res = await fetch(url, {
                    signal: controller.signal,
                    cache: "no-store"
                });
                return res;
            } finally {
                clearTimeout(timer);
            }
        }

        async function getHtml(url) {
            const encoded = encodeURIComponent(url);
            const proxies = [
                `https://corsproxy.io/?${encoded}`,
                `https://api.allorigins.win/get?url=${encoded}`,
                `https://api.codetabs.com/v1/proxy?quest=${encoded}`
            ];

            for (const proxyUrl of proxies) {
                try {
                    const res = await fetchWithTimeout(proxyUrl, 12000);
                    if (!res.ok) continue;

                    let html = "";

                    if (proxyUrl.includes("allorigins")) {
                        const json = await res.json();
                        html = json?.contents || "";
                    } else {
                        html = await res.text();
                    }

                    if (html && html.length > 2000 && html.includes("/et/syndmus/")) {
                        return html;
                    }
                } catch (err) {
                }
            }

            throw new Error("Andmete laadimine ebaõnnestus kõigi proxy'de kaudu.");
        }

        function updateClock() {
            document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", {
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        setInterval(updateClock, 1000);
        updateClock();

        function getBestImage(container) {
            if (!container) return "";

            const source = container.querySelector("source[srcset]");
            if (source?.getAttribute("srcset")) {
                const srcset = source.getAttribute("srcset");
                const last = srcset.split(",").pop()?.trim().split(" ")[0];
                if (last) return toAbsoluteUrl(last);
            }

            const img = container.querySelector("img");
            if (!img) return "";

            let src =
                img.getAttribute("data-src") ||
                img.getAttribute("data-lazy-src") ||
                img.getAttribute("src") ||
                "";

            if (!src && img.getAttribute("srcset")) {
                src = img.getAttribute("srcset").split(",").pop()?.trim().split(" ")[0] || "";
            }

            src = toAbsoluteUrl(src);

            if (!src || src.startsWith("data:") || src.endsWith(".svg")) {
                return "";
            }

            return src;
        }

        function getCardContainer(anchor) {
            return (
                anchor.closest("article, li, .views-row, .node, .event-item, .grid__item") ||
                anchor.closest("div")
            );
        }

        function looksLikeDate(line) {
            return /\d{1,2}\.\s*[a-zA-ZäöüõÄÖÜÕ]+/i.test(line);
        }

        function looksLikePrice(line) {
            return /(tasuta|€)/i.test(line);
        }

        function extractEventFromAnchor(anchor) {
            const title = normalizeText(anchor?.textContent);
            const url = toAbsoluteUrl(anchor?.getAttribute("href"));

            if (!title || title.length < 3 || !DETAIL_PATH_RE.test(url)) {
                return null;
            }

            const container = getCardContainer(anchor);
            const lines = multilineText(container);
            const filtered = lines.filter(line => line !== title);

            const date =
                filtered.find(line => looksLikeDate(line)) ||
                "Kuupäev täpsustamisel";

            const loc =
                filtered.find(line =>
                    line !== date &&
                    !looksLikePrice(line) &&
                    !looksLikeDate(line) &&
                    line.length >= 2 &&
                    line.length <= 60
                ) || "Elva vald";

            const desc =
                filtered.find(line =>
                    line !== date &&
                    line !== loc &&
                    !looksLikePrice(line) &&
                    !looksLikeDate(line) &&
                    line.length > 40
                ) || "";

            const img = getBestImage(container);

            return {
                title,
                date,
                loc,
                desc: truncate(desc, 180),
                img,
                url
            };
        }

        function parseEvents(doc) {
            const anchors = Array.from(doc.querySelectorAll('a[href*="/syndmus/"]'));
            const seen = new Set();
            const events = [];

            for (const anchor of anchors) {
                const ev = extractEventFromAnchor(anchor);
                if (!ev) continue;
                if (seen.has(ev.url)) continue;

                seen.add(ev.url);
                events.push(ev);
            }

            return events;
        }

        function renderList() {
            const list = document.getElementById("scroll-list");
            list.innerHTML = "";

            allEvents.forEach((ev, i) => {
                const item = document.createElement("div");
                item.className = "list-item";
                item.id = `ev-${i}`;

                const thumb = ev.img || PLACEHOLDER_IMG;

                item.innerHTML = `
                    <img src="${thumb}" class="list-thumb" alt="" onerror="this.src='${PLACEHOLDER_IMG}'">
                    <div class="list-text-content">
                        <div class="list-date">${ev.date}</div>
                        <div class="list-title">${ev.title}</div>
                        <div class="list-loc">📍 ${ev.loc}</div>
                    </div>
                `;

                list.appendChild(item);
            });
        }

        function switchFeatured(idx) {
            if (idx === activeIdx || !allEvents[idx]) return;

            activeIdx = idx;
            const ev = allEvents[idx];

            document.querySelectorAll(".list-item").forEach(el => el.classList.remove("active"));
            document.getElementById(`ev-${idx}`)?.classList.add("active");

            const inner = document.getElementById("featured-inner");
            inner.style.opacity = 0;

            setTimeout(() => {
                const poster = ev.img || PLACEHOLDER_IMG;
                const target = ev.url || BASE_URL;

                inner.innerHTML = `
                    <img src="${poster}" class="feat-bg-blur" alt="" onerror="this.src='${PLACEHOLDER_IMG}'">
                    <div class="feat-poster-main">
                        <img src="${poster}" alt="Plakat" onerror="this.src='${PLACEHOLDER_IMG}'">
                    </div>
                    <div class="feat-overlay">
                        <div class="feat-content">
                            <div class="feat-text-wrap">
                                <div class="feat-date">${ev.date}</div>
                                <h2 class="feat-title">${ev.title}</h2>
                                <div class="feat-loc">📍 ${ev.loc}</div>
                                <div class="feat-desc">${ev.desc || "Vaata lisainfot QR-koodist."}</div>
                            </div>
                            <div class="qr-card">
                                <div class="qr-label">INFO JA<br>PILETID</div>
                                <div class="qr-target" id="qr-box"></div>
                            </div>
                        </div>
                    </div>
                `;

                const qrBox = document.getElementById("qr-box");
                qrBox.innerHTML = "";

                new QRCode(qrBox, {
                    text: target,
                    width: 120,
                    height: 120,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });

                inner.style.opacity = 1;
            }, 250);
        }

        function animateScroll(ts) {
            if (!isScrolling) return;

            const container = document.getElementById("scroll-container");
            if (!container) return;

            if (container.scrollHeight <= container.clientHeight + 4) {
                switchFeatured(0);
                requestAnimationFrame(animateScroll);
                return;
            }

            if (!lastTs) lastTs = ts;
            const dt = (ts - lastTs) / 1000;
            lastTs = ts;

            scrollY += SCROLL_SPEED * dt;
            container.scrollTop = scrollY;

            const mid = container.scrollTop + container.clientHeight / 2;
            const items = document.querySelectorAll(".list-item");

            let bestIdx = 0;
            let bestDist = Infinity;

            items.forEach((it, i) => {
                const center = it.offsetTop + it.offsetHeight / 2;
                const dist = Math.abs(center - mid);
                if (dist < bestDist) {
                    bestDist = dist;
                    bestIdx = i;
                }
            });

            switchFeatured(bestIdx);

            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 2) {
                isScrolling = false;

                setTimeout(() => {
                    container.scrollTo({ top: 0, behavior: "smooth" });
                    scrollY = 0;
                    lastTs = 0;

                    setTimeout(() => {
                        isScrolling = true;
                        requestAnimationFrame(animateScroll);
                    }, 1800);
                }, 3500);

                return;
            }

            requestAnimationFrame(animateScroll);
        }

        async function init() {
            const loader = document.getElementById("loader");
            const mainUi = document.getElementById("main-ui");

            try {
                const html = await getHtml(KULTUURIAKEN_URL);
                const doc = new DOMParser().parseFromString(html, "text/html");

                allEvents = parseEvents(doc)
                    .filter(ev => ev.title && ev.url)
                    .slice(0, 60);

                if (!allEvents.length) {
                    loader.textContent = "Hetkel sündmusi ei leitud. Kontrolli allikat või filtreid.";
                    return;
                }

                loader.style.display = "none";
                mainUi.style.display = "flex";

                renderList();
                switchFeatured(0);
                requestAnimationFrame(animateScroll);
            } catch (err) {
                console.error(err);
                loader.textContent = "Viga andmete laadimisel Kultuuriaknast.";
            }
        }

        init();
        setInterval(() => window.location.reload(), 30 * 60 * 1000);
    </script>

</body>
</html>

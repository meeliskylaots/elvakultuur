<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --elva-blue: #1d71d4;
            --bg-black: #000000;
            --card-black: #0a0a0a; /* Süsimust teleri jaoks, et tekst ei kaoks ära */
            --text-white: #ffffff;
            --accent-green: #22c55e;
            --border: rgba(255, 255, 255, 0.2);
            
            --header-h: 10vh;
            --ticker-h: 16vh;
            --safe-area: 4vw;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-black);
            color: var(--text-white);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 var(--safe-area);
        }

        /* Taust on teleris väga tume, et mitte häirida */
        #ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: brightness(0.12) blur(60px);
            transform: scale(1.2);
            transition: background-image 1s ease-in-out;
        }

        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--border);
        }

        .header-left { display: flex; align-items: center; gap: 1.5vw; }
        .elva-logo {
            width: 3.5vw; height: 3.5vw; background: var(--elva-blue);
            border-radius: 20%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 2vw;
        }
        .header-title { font-size: 1.8vw; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .clock-section { text-align: right; }
        .clock { font-size: 3.2vw; font-weight: 900; line-height: 1; }
        .date-today { font-size: 1.2vw; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

        .app-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 3vh 0;
            gap: 3vh;
            min-height: 0;
        }

        .hero {
            flex: 1;
            background: var(--card-black);
            border: 2px solid var(--border);
            border-radius: 2.5vw;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        .progress-bar {
            position: absolute; top: 0; left: 0; height: 0.8vh;
            background: var(--elva-blue); width: 0; z-index: 10;
        }

        #hero-inner { display: flex; width: 100%; height: 100%; transition: opacity 0.4s ease-in-out; }

        .hero-info {
            flex: 0 0 55%; 
            padding: 4vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-date-tag {
            background: var(--elva-blue);
            padding: 0.6vw 1.5vw;
            border-radius: 50px;
            font-size: 1.2vw;
            font-weight: 800;
            margin-bottom: 2vh;
            display: inline-block;
            align-self: flex-start;
            text-transform: uppercase;
        }

        .hero-title {
            font-size: clamp(2rem, 3.8vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2vh;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.8);
        }

        .hero-loc {
            font-size: 1.8vw;
            font-weight: 800;
            color: var(--accent-green);
            margin-bottom: 2vh;
        }

        .hero-desc {
            font-size: 1.5vw;
            line-height: 1.5;
            color: #e2e8f0;
            font-weight: 700; 
            max-width: 90%;
        }

        .hero-visual {
            flex: 0 0 45%;
            padding: 3vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 2vw;
            overflow: hidden;
            border: 4px solid #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }

        .hero-image { width: 100%; height: 100%; object-fit: contain; }

        .bottom-section {
            height: var(--ticker-h);
            display: flex;
            gap: 2vw;
            padding-bottom: 3vh;
        }

        .ticker-scroll {
            flex: 1;
            display: flex;
            gap: 1.5vw;
            overflow: hidden;
        }

        .event-card {
            flex: 0 0 25vw;
            height: 10vh;
            background: #111;
            border: 2px solid var(--border);
            border-radius: 1.5vw;
            display: flex;
            align-items: center;
            padding: 1vw;
            gap: 1vw;
            transition: all 0.3s ease;
        }

        .event-card.active {
            border-color: var(--elva-blue);
            background: rgba(29, 113, 212, 0.4);
            transform: scale(1.03);
        }

        .event-card-img { width: 5vw; height: 5vw; border-radius: 0.8vw; object-fit: cover; }
        .event-card-title { font-size: 1.1vw; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .qr-area {
            width: 25vw; background: var(--card-black);
            border: 2px solid var(--border); border-radius: 2vw;
            display: flex; align-items: center; justify-content: space-between;
            padding: 1vw 2vw;
        }
        .qr-text { font-size: 1vw; font-weight: 900; text-align: right; line-height: 1.2; }
        .qr-box { background: #fff; padding: 0.5vw; border-radius: 1vw; width: 6vw; height: 6vw; display: flex; align-items: center; justify-content: center; }

        @keyframes progress { from { width: 0; } to { width: 100%; } }
        .loader { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; font-size: 4vw; font-weight: 900; color: var(--elva-blue); }
    </style>
</head>
<body>

<div id="ambient-bg"></div>
<div id="loader" class="loader">ELVA VALD</div>

<header>
    <div class="header-left">
        <div class="elva-logo">E</div>
        <h1 class="header-title">Elva Vald</h1>
    </div>
    <div class="clock-section">
        <div class="clock" id="clock">00:00</div>
        <div class="date-today" id="today-date">...</div>
    </div>
</header>

<main class="app-content" id="app-main" style="visibility: hidden;">
    <section class="hero">
        <div class="progress-bar" id="progress-bar"></div>
        <div id="hero-inner"></div>
    </section>

    <div class="bottom-section">
        <div class="ticker-scroll" id="ticker-scroll"></div>
        <div class="qr-area">
            <div class="qr-text">LÄHEMALT<br>& PILETID</div>
            <div id="qr-target" class="qr-box"></div>
        </div>
    </div>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const ROTATE_INTERVAL = 20000;
    
    let events = [];
    let currentIndex = 0;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('et-EE', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('today-date').textContent = now.toLocaleDateString('et-EE', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function loadData() {
        try {
            const res = await fetch(`${SCRIPT_URL}?format=json&t=${Date.now()}`);
            const data = await res.json();
            if (data.ok && Array.isArray(data.events)) {
                events = data.events;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-main').style.visibility = 'visible';
                renderTicker();
                showEvent(0);
                setInterval(() => {
                    if (events.length > 0) {
                        currentIndex = (currentIndex + 1) % events.length;
                        showEvent(currentIndex);
                    }
                }, ROTATE_INTERVAL);
            } else {
                document.getElementById('loader').textContent = "SÜNDMUSI EI LEITUD";
            }
        } catch (e) { 
            console.error(e); 
            document.getElementById('loader').textContent = "ANDMETE VIGA";
        }
    }

    function renderTicker() {
        const t = document.getElementById('ticker-scroll');
        t.innerHTML = events.map((ev, i) => {
            // Parandatud: Lisatud kontroll ja fallback väärtused, et vältida split() viga
            const dateStr = String(ev.dateText || ev.date || "Kuupäev puudub");
            const displayDate = dateStr.includes(',') ? dateStr.split(',')[0] : dateStr;
            
            return `
                <div class="event-card" id="card-${i}">
                    <img src="${ev.img || ev.pilt || ''}" class="event-card-img" onerror="this.src='https://via.placeholder.com/150?text=ELVA'">
                    <div style="overflow:hidden">
                        <div style="font-size:0.8vw; color:var(--elva-blue); font-weight:800">${displayDate}</div>
                        <div class="event-card-title">${ev.title || "Pealkiri puudub"}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function showEvent(idx) {
        if (!events[idx]) return;
        const ev = events[idx];
        const inner = document.getElementById('hero-inner');
        const pb = document.getElementById('progress-bar');
        
        document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${idx}`)?.classList.add('active');

        pb.style.animation = 'none';
        void pb.offsetWidth;
        pb.style.animation = `progress ${ROTATE_INTERVAL}ms linear forwards`;
        
        const imageUrl = ev.img || ev.pilt || '';
        document.getElementById('ambient-bg').style.backgroundImage = imageUrl ? `url('${imageUrl}')` : 'none';

        inner.style.opacity = 0;
        
        setTimeout(() => {
            inner.innerHTML = `
                <div class="hero-info">
                    <div class="hero-date-tag">${ev.dateText || ev.date || "KUUPÄEV TÄPSUSTAMISEL"}</div>
                    <h2 class="hero-title">${ev.title || "Pealkiri puudub"}</h2>
                    <div class="hero-loc">📍 ${ev.loc || ev.asutus || "Elva vald"}</div>
                    <div class="hero-desc">${ev.desc || ev.description || ""}</div>
                </div>
                <div class="hero-visual">
                    <div class="image-wrapper">
                        <img src="${imageUrl}" class="hero-image" onerror="this.src='https://via.placeholder.com/600?text=ELVA'">
                    </div>
                </div>
            `;
            inner.style.opacity = 1;

            const qr = document.getElementById("qr-target");
            qr.innerHTML = "";
            new QRCode(qr, { 
                text: ev.url || "https://elva.ee", 
                width: 256, 
                height: 256, 
                correctLevel: QRCode.CorrectLevel.H 
            });
        }, 200);
    }

    loadData();
    // Värskenda lehte iga tunni järel
    setInterval(() => window.location.reload(), 3600000);
</script>
</body>
</html>

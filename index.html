<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <title>Elva kultuuriekraan</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg2: #111827;
      --card: rgba(17, 24, 39, 0.92);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --border: rgba(255,255,255,0.08);
      --accent: #22c55e;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .wrap {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
    }

    .title {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.05;
      margin: 0;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 18px;
      color: var(--muted);
    }

    .clockbox {
      text-align: right;
      min-width: 260px;
    }

    .clock {
      font-size: 44px;
      font-weight: 800;
      line-height: 1;
    }

    .date {
      margin-top: 8px;
      font-size: 18px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: 1fr;
      gap: 18px;
      min-height: 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      min-height: 0;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .image,
    .image-placeholder {
      width: 100%;
      height: 100%;
      min-height: 200px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      background: #0b1220;
    }

    .image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      color: rgba(255,255,255,0.3);
      background: linear-gradient(135deg, #0b1220, #1e293b);
    }

    .content {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .badge {
      display: inline-block;
      width: fit-content;
      background: rgba(34, 197, 94, 0.14);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.24);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .event-title {
      font-size: 30px;
      line-height: 1.15;
      font-weight: 800;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta {
      display: grid;
      gap: 8px;
      font-size: 18px;
      color: var(--muted);
    }

    .desc {
      margin-top: 6px;
      font-size: 17px;
      line-height: 1.45;
      color: #e5e7eb;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 18px;
    }

    .pager {
      font-weight: 700;
    }

    .empty-state,
    .error-state {
      height: 100%;
      display: grid;
      place-items: center;
      background: rgba(17, 24, 39, 0.9);
      border-radius: 24px;
      border: 1px solid var(--border);
      text-align: center;
      padding: 30px;
      font-size: 28px;
    }

    .error-state {
      color: #fecaca;
    }

    @media (max-width: 1400px) {
      .title { font-size: 36px; }
      .clock { font-size: 36px; }
      .card { grid-template-columns: 150px 1fr; }
      .event-title { font-size: 24px; }
      .meta { font-size: 16px; }
      .desc { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="title">Elva valla sündmused</h1>
        <div class="subtitle">Järgmise 30 päeva sündmused Kultuuriaknast</div>
      </div>
      <div class="clockbox">
        <div class="clock" id="clock">--:--</div>
        <div class="date" id="today">--</div>
      </div>
    </div>

    <div id="main"></div>

    <div class="footer">
      <div id="updatedAt">Uuendan andmeid...</div>
      <div class="pager" id="pager"></div>
    </div>
  </div>

  <script>
    const CONFIG_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec';
    const PAGE_SIZE = 4;
    const PAGE_SWITCH_MS = 12000;
    const REFRESH_MS = 5 * 60 * 1000;

    const state = {
      events: [],
      page: 0,
      updatedAt: null,
      error: ''
    };

    function buildApiUrl(forceRefresh) {
      const url = new URL(CONFIG_SCRIPT_URL);
      url.searchParams.set('format', 'json');
      url.searchParams.set('t', Date.now());

      if (forceRefresh) {
        url.searchParams.set('refresh', '1');
      } else {
        url.searchParams.delete('refresh');
      }

      return url.toString();
    }

    async function loadEvents(forceRefresh = false) {
      try {
        const res = await fetch(buildApiUrl(forceRefresh), { cache: 'no-store' });
        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error('Vastus ei olnud JSON');
        }

        if (!data.ok) {
          throw new Error(data.error || 'Andmete laadimine ebaõnnestus');
        }

        state.events = Array.isArray(data.events) ? data.events : [];
        state.updatedAt = data.updatedAt || null;
        state.page = 0;
        state.error = '';
        render();
      } catch (err) {
        state.error = err.message || 'Andmete laadimine ebaõnnestus';
        render();
      }
    }

    function render() {
      const main = document.getElementById('main');
      const pager = document.getElementById('pager');
      const updatedAt = document.getElementById('updatedAt');

      if (state.updatedAt) {
        const dt = new Date(state.updatedAt);
        updatedAt.textContent = `Andmed uuendatud ${formatDateTime(dt)}`;
      }

      if (state.error) {
        main.innerHTML = `<div class="error-state">Viga: ${escapeHtml(state.error)}</div>`;
        pager.textContent = '';
        return;
      }

      if (!state.events.length) {
        main.innerHTML = `<div class="empty-state">Järgmise 30 päeva jooksul sündmusi ei leitud.</div>`;
        pager.textContent = '';
        return;
      }

      const totalPages = Math.ceil(state.events.length / PAGE_SIZE);
      const start = (state.page % totalPages) * PAGE_SIZE;
      const items = state.events.slice(start, start + PAGE_SIZE);

      main.innerHTML = `
        <div class="grid">
          ${items.map(renderCard).join('')}
        </div>
      `;

      pager.textContent = `Leht ${state.page + 1} / ${totalPages} · Sündmusi ${state.events.length}`;
    }

    function renderCard(event) {
      const start = new Date(event.startIso);
      const end = event.endIso ? new Date(event.endIso) : null;

      const imageHtml = event.img
        ? `<div class="image"><img src="${escapeAttr(event.img)}" alt="" loading="eager" referrerpolicy="no-referrer" onerror="this.parentNode.outerHTML='<div class=&quot;image-placeholder&quot;>♪</div>'"></div>`
        : `<div class="image-placeholder">♪</div>`;

      return `
        <article class="card">
          ${imageHtml}
          <div class="content">
            <div class="badge">${escapeHtml(getBadgeText(start))}</div>
            <h2 class="event-title">${escapeHtml(event.title || '')}</h2>
            <div class="meta">
              <div>${escapeHtml(formatEventTime(start, end))}</div>
              <div>${escapeHtml(event.loc || 'Elva vald')}</div>
            </div>
            <div class="desc">${escapeHtml(trimText(event.desc || '', 260))}</div>
          </div>
        </article>
      `;
    }

    function nextPage() {
      if (!state.events.length) return;

      const totalPages = Math.ceil(state.events.length / PAGE_SIZE);
      if (totalPages <= 1) return;

      state.page = (state.page + 1) % totalPages;
      render();
    }

    function updateClock() {
      const now = new Date();

      document.getElementById('clock').textContent =
        now.toLocaleTimeString('et-EE', {
          hour: '2-digit',
          minute: '2-digit'
        });

      document.getElementById('today').textContent =
        now.toLocaleDateString('et-EE', {
          weekday: 'long',
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        });
    }

    function formatDateTime(date) {
      return date.toLocaleDateString('et-EE', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      }) + ' ' + date.toLocaleTimeString('et-EE', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatEventTime(start, end) {
      const startDate = start.toLocaleDateString('et-EE', {
        weekday: 'short',
        day: 'numeric',
        month: 'long'
      });

      const startTime = start.toLocaleTimeString('et-EE', {
        hour: '2-digit',
        minute: '2-digit'
      });

      if (!end || isSameMinute(start, end)) {
        return `${startDate} · ${startTime}`;
      }

      const endDate = end.toLocaleDateString('et-EE', {
        day: 'numeric',
        month: 'long'
      });

      const endTime = end.toLocaleTimeString('et-EE', {
        hour: '2-digit',
        minute: '2-digit'
      });

      return `${startDate} · ${startTime} – ${endDate} · ${endTime}`;
    }

    function getBadgeText(start) {
      const now = new Date();
      const startDay = new Date(start.getFullYear(), start.getMonth(), start.getDate());
      const nowDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diffDays = Math.round((startDay.getTime() - nowDay.getTime()) / 86400000);

      if (diffDays <= 0) return 'Täna';
      if (diffDays === 1) return 'Homme';
      return `${diffDays} päeva pärast`;
    }

    function isSameMinute(a, b) {
      return Math.abs(a.getTime() - b.getTime()) < 60000;
    }

    function trimText(text, maxLen) {
      const s = String(text || '').replace(/\s+/g, ' ').trim();
      return s.length > maxLen ? s.slice(0, maxLen - 1) + '…' : s;
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    updateClock();
    loadEvents(true);

    setInterval(updateClock, 1000);
    setInterval(nextPage, PAGE_SWITCH_MS);
    setInterval(() => loadEvents(false), REFRESH_MS);
  </script>
</body>
</html>

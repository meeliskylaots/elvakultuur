<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --elva-blue: #1d71d4;
            --elva-blue-rgb: 29, 113, 212;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
            --header-h: 90px;
            --ticker-h: 130px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Ambient Background Effect */
        #ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.3);
            transition: background-image 1.5s ease-in-out;
            transform: scale(1.1);
        }

        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .elva-logo-stub {
            width: 50px;
            height: 50px;
            background: var(--elva-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(var(--elva-blue-rgb), 0.4);
        }

        .header-title {
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 30px;
            text-align: right;
        }

        .clock-box {
            display: flex;
            flex-direction: column;
        }

        .clock {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1;
        }

        .date-today {
            font-size: 0.9rem;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .app-content {
            flex: 1;
            padding: 20px 50px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            min-height: 0;
            z-index: 5;
        }

        .hero {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--border);
            min-height: 0;
            position: relative;
            display: flex;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background: var(--elva-blue);
            width: 0;
            z-index: 100;
            box-shadow: 0 0 15px rgba(var(--elva-blue-rgb), 0.6);
        }

        #hero-inner {
            display: flex;
            width: 100%;
            height: 100%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hero-info {
            flex: 1.1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            min-width: 0;
            justify-content: center;
        }

        .hero-date-tag {
            display: inline-block;
            background: rgba(var(--elva-blue-rgb), 0.2);
            color: #60a5fa;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 25px;
            align-self: flex-start;
            border: 1px solid rgba(var(--elva-blue-rgb), 0.3);
            text-transform: uppercase;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-loc {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .hero-desc-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .hero-desc {
            font-size: 1.3rem;
            line-height: 1.7;
            color: #e2e8f0;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding-bottom: 100px;
            white-space: pre-wrap;
        }

        .hero-visual {
            flex: 0.9;
            position: relative;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .bottom-section {
            height: var(--ticker-h);
            display: flex;
            gap: 25px;
            padding-bottom: 20px;
            align-items: center;
            flex-shrink: 0;
        }

        .ticker-area {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .ticker-scroll {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 10px 0;
            scroll-behavior: smooth;
        }

        .ticker-scroll::-webkit-scrollbar { display: none; }

        .event-card {
            flex: 0 0 340px;
            height: 100px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .event-card.active {
            border-color: var(--elva-blue);
            background: rgba(var(--elva-blue-rgb), 0.2);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .event-card-img {
            width: 76px;
            height: 76px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .event-card-info {
            flex: 1;
            overflow: hidden;
        }

        .event-card-date {
            font-size: 0.75rem;
            font-weight: 800;
            color: #60a5fa;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .event-card-title {
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .qr-area {
            width: 280px;
            height: 110px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 15px 20px;
            gap: 20px;
            flex-shrink: 0;
        }

        .qr-text {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.4;
            color: #fff;
            text-align: right;
            flex: 1;
        }

        .qr-code-box {
            background: #fff;
            padding: 8px;
            border-radius: 12px;
            display: flex;
            min-width: 80px;
            min-height: 80px;
            align-items: center;
            justify-content: center;
        }

        .loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 1000;
            gap: 20px;
        }

        .loader-text {
            font-weight: 200;
            letter-spacing: 15px;
            font-size: 1.5rem;
            color: #fff;
            margin-left: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes scrollDescription {
            0% { transform: translateY(0); }
            15% { transform: translateY(0); }
            85% { transform: translateY(var(--scroll-dist)); }
            100% { transform: translateY(var(--scroll-dist)); }
        }

        @keyframes progress {
            0% { width: 0; }
            100% { width: 100%; }
        }

        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SVG Icon for location */
        .icon-pin { width: 1.2rem; height: 1.2rem; fill: currentColor; }
    </style>
</head>
<body>

<div id="ambient-bg"></div>

<div id="loader" class="loader">
    <div class="elva-logo-stub">E</div>
    <div class="loader-text">KULTUURIEKRAAN</div>
</div>

<header>
    <div class="header-left">
        <div class="elva-logo-stub">E</div>
        <h1 class="header-title">Elva Vald</h1>
    </div>
    <div class="header-right">
        <div class="clock-box">
            <div class="clock" id="clock">00:00</div>
            <div class="date-today" id="today-date">...</div>
        </div>
    </div>
</header>

<main class="app-content" id="app-main" style="visibility: hidden;">
    <section class="hero">
        <div class="progress-bar" id="progress-bar"></div>
        <div id="hero-inner">
            <!-- Content injected here -->
        </div>
    </section>

    <div class="bottom-section">
        <div class="ticker-area">
            <div class="ticker-scroll" id="ticker-scroll"></div>
        </div>

        <div class="qr-area">
            <div class="qr-text">Loe lähemalt<br>ja osta pilet</div>
            <div class="qr-code-box" id="qr-target"></div>
        </div>
    </div>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const ROTATE_INTERVAL = 25000;
    const PLACEHOLDER = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect width="100%" height="100%" fill="#0a0c10"/><text x="50%" y="50%" font-family="Arial" font-size="40" fill="#1d71d4" text-anchor="middle">ELVA</text></svg>')}`;

    let events = [];
    let currentIndex = 0;
    let rotateHandle = null;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('et-EE', {
            hour: '2-digit',
            minute: '2-digit'
        });
        
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('today-date').textContent = now.toLocaleDateString('et-EE', options);
    }

    setInterval(updateClock, 1000);
    updateClock();

    function escapeHtml(text) {
        return String(text ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatEstonianDate(isoString, fallback) {
        if (!isoString) return fallback;
        try {
            const d = new Date(isoString);
            if (isNaN(d.getTime())) return fallback;
            const days = ['Pühapäev', 'Esmaspäev', 'Teisipäev', 'Kolmapäev', 'Neljapäev', 'Reede', 'Laupäev'];
            const months = ['jaanuar', 'veebruar', 'märts', 'aprill', 'mai', 'juuni', 'juuli', 'august', 'september', 'oktoober', 'november', 'detsember'];
            const hours = d.getHours().toString().padStart(2, '0');
            const minutes = d.getMinutes().toString().padStart(2, '0');
            return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]} | kell ${hours}:${minutes}`;
        } catch (e) {
            return fallback;
        }
    }

    async function loadData() {
        const loader = document.getElementById('loader');
        try {
            const ts = Date.now();
            const url = `${SCRIPT_URL}?format=json&t=${ts}`;
            const res = await fetch(url, { cache: 'no-store' });
            const data = await res.json();

            if (data.ok && Array.isArray(data.events) && data.events.length > 0) {
                events = data.events
                    .filter(e => e && e.title)
                    .map(e => ({
                        title: e.title,
                        date: e.dateText || formatEstonianDate(e.startIso, e.date || "KUUPÄEV TÄPSUSTAMISEL"),
                        loc: e.loc || e.asutus || "Elva vald",
                        desc: e.desc || e.description || "Täpsem info Elva valla sündmustekalendris.",
                        img: e.img || e.pilt || PLACEHOLDER,
                        url: e.url || "https://elva.ee"
                    }));

                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
                
                document.getElementById('app-main').style.visibility = 'visible';
                renderTicker();
                showEvent(0);

                if (rotateHandle) clearInterval(rotateHandle);
                rotateHandle = setInterval(nextEvent, ROTATE_INTERVAL);
            } else {
                document.querySelector('.loader-text').textContent = "ÜHTEGI SÜNDMUST EI LEITUD";
            }
        } catch (err) {
            console.error("Laadimisviga:", err);
            document.querySelector('.loader-text').textContent = "SIDEVIGA";
        }
    }

    function renderTicker() {
        const ticker = document.getElementById('ticker-scroll');
        ticker.innerHTML = events.map((ev, i) => `
            <div class="event-card" id="card-${i}" onclick="showEvent(${i})">
                <img src="${escapeHtml(ev.img)}" class="event-card-img" onerror="this.src='${PLACEHOLDER}'">
                <div class="event-card-info">
                    <div class="event-card-date">${escapeHtml(ev.date.split('|')[0].trim())}</div>
                    <div class="event-card-title">${escapeHtml(ev.title)}</div>
                </div>
            </div>
        `).join('');
    }

    function showEvent(index) {
        currentIndex = index;
        const ev = events[index];
        const inner = document.getElementById('hero-inner');
        const progressBar = document.getElementById('progress-bar');
        const ambient = document.getElementById('ambient-bg');

        // Update active UI
        document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
        const card = document.getElementById(`card-${index}`);
        if (card) {
            card.classList.add('active');
            const ticker = document.getElementById('ticker-scroll');
            const targetLeft = card.offsetLeft - (ticker.clientWidth / 2) + (card.clientWidth / 2);
            ticker.scrollTo({ left: Math.max(0, targetLeft), behavior: 'smooth' });
        }

        // Reset progress bar
        progressBar.style.animation = 'none';
        void progressBar.offsetWidth;
        progressBar.style.animation = `progress ${ROTATE_INTERVAL}ms linear forwards`;

        // Update Background
        ambient.style.backgroundImage = `url('${ev.img}')`;

        inner.style.opacity = 0;
        inner.style.transform = 'translateY(10px)';

        setTimeout(() => {
            inner.innerHTML = `
                <div class="hero-info fade-in">
                    <div class="hero-date-tag">${escapeHtml(ev.date)}</div>
                    <h2 class="hero-title">${escapeHtml(ev.title)}</h2>
                    <div class="hero-loc">
                        <svg class="icon-pin" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        ${escapeHtml(ev.loc)}
                    </div>
                    <div class="hero-desc-container">
                        <div class="hero-desc" id="hero-desc">${escapeHtml(ev.desc)}</div>
                    </div>
                </div>
                <div class="hero-visual fade-in" style="animation-delay: 0.1s">
                    <div class="image-wrapper">
                        <img src="${escapeHtml(ev.img)}" class="hero-image" onerror="this.src='${PLACEHOLDER}'">
                    </div>
                </div>
            `;

            // QR Code
            const qrTarget = document.getElementById("qr-target");
            qrTarget.innerHTML = "";
            new QRCode(qrTarget, {
                text: ev.url,
                width: 80,
                height: 80,
                colorDark: "#000",
                colorLight: "#fff",
                correctLevel: QRCode.CorrectLevel.M
            });

            // Handle description scrolling
            setTimeout(() => {
                const d = document.getElementById('hero-desc');
                if (!d) return;
                const dist = d.parentElement.clientHeight - d.scrollHeight - 40;
                if (dist < 0) {
                    d.style.setProperty('--scroll-dist', `${dist}px`);
                    d.style.animation = `scrollDescription ${ROTATE_INTERVAL}ms linear infinite alternate`;
                }
            }, 1000);

            inner.style.opacity = 1;
            inner.style.transform = 'translateY(0)';
        }, 300);
    }

    function nextEvent() {
        if (events.length === 0) return;
        currentIndex = (currentIndex + 1) % events.length;
        showEvent(currentIndex);
    }

    // Initialize
    loadData();

    // Full refresh every 30 minutes to stay fresh
    setInterval(() => {
        if (document.hidden) return; // Don't refresh if not visible
        window.location.reload();
    }, 30 * 60 * 1000);
</script>
</body>
</html>

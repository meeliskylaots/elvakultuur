<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            /* ELVA VALD AMETLIKUD VÄRVID */
            --elva-azure: #005aa3;
            --elva-green: #009640;
            --elva-white: #ffffff;
            
            --bg: #040608;
            --panel: #111821;
            --text: #ffffff;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --border: rgba(255,255,255,0.1);
            
            --header-h: 60px;
            --ticker-h: 180px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ÜLEMINE RIBA */
        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: transparent;
            position: relative;
        }

        header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 40px;
            right: 40px;
            height: 2px;
            background: linear-gradient(to right, 
                var(--elva-azure) 0%, 
                var(--elva-azure) 45%, 
                var(--elva-green) 55%, 
                var(--elva-green) 100%);
            opacity: 0.8;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .elva-vapp { width: 30px; height: 36px; filter: drop-shadow(0 0 10px rgba(0,90,163,0.5)); }
        
        h1 {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }

        .clock {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        /* PÕHIOSA */
        .app-content {
            flex: 1;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        .hero {
            flex: 1;
            position: relative;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            min-height: 0;
        }

        #hero-inner {
            display: flex;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease;
        }

        .hero-info {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
        }

        .hero-date {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text);
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero-title {
            font-size: 3.2rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .hero-loc {
            font-size: 1.4rem;
            font-weight: 700;
            color: #4ade80; /* Foto roheline */
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hero-desc {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cbd5e1;
            max-width: 90%;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-visual {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .hero-image-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* QR KOOD - NII NAGU FOTOL */
        .qr-overlay {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(10, 15, 20, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
        }

        .qr-text {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.2;
            color: #fff;
            text-align: right;
        }

        .qr-code-box {
            background: #fff;
            padding: 5px;
            border-radius: 4px;
        }

        /* TICKER / ALUMINE RIBA */
        .ticker-section {
            height: var(--ticker-h);
        }

        .ticker-title {
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 15px;
            letter-spacing: 1.5px;
        }

        .ticker-scroll {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        .ticker-scroll::-webkit-scrollbar { display: none; }

        .event-card {
            flex: 0 0 350px;
            height: 110px;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 10px;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .event-card.active {
            background: rgba(0, 90, 163, 0.15);
            border-color: var(--elva-azure);
            transform: scale(1.02);
        }

        .event-card-img {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
        }

        .event-card-info {
            flex: 1;
            overflow: hidden;
        }

        .event-card-date {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .event-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .event-card-loc {
            font-size: 0.8rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 100;
            font-size: 1.5rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div id="loader" class="loader">LAADIN KULTUURIKAVA...</div>

<header>
    <div class="logo-area">
        <svg class="elva-vapp" viewBox="0 0 100 120">
            <path fill="#005aa3" d="M10,0 h80 v70 c0,30 -40,50 -40,50 c0,0 -40,-20 -40,-50 Z" />
            <g fill="#ffffff">
                <path d="M50 20 L62 45 L53 45 L68 75 L55 75 L70 95 L30 95 L45 75 L32 75 L47 45 L38 45 Z" />
            </g>
        </svg>
        <h1>Elva Valla Kultuur</h1>
    </div>
    <div class="clock" id="clock">00:00</div>
</header>

<main class="app-content" id="app-main" style="display:none;">
    <section class="hero" id="hero">
        <div id="hero-inner">
            <!-- Dynamic Content -->
        </div>
    </section>

    <section class="ticker-section">
        <h2 class="ticker-title">Tulevased sündmused</h2>
        <div class="ticker-scroll" id="ticker-scroll">
            <!-- Dynamic Content -->
        </div>
    </section>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const ROTATE_INTERVAL = 15000;
    const PLACEHOLDER = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect width="100%" height="100%" fill="#111821"/><text x="50%" y="50%" font-family="Montserrat, sans-serif" font-size="40" fill="#005aa3" text-anchor="middle">Elva Kultuur</text></svg>')}`;

    let events = [];
    let currentIndex = 0;

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('et-EE', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function loadData() {
        try {
            // Lisame cache-busteri ja proovime laadida
            const response = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
            let data = await response.json();
            
            // Kui andmed on mähitud 'contents' sisse (AllOrigins vms proxy korral)
            if (data.contents) data = JSON.parse(data.contents);
            
            events = (Array.isArray(data) ? data : (data.events || data.data || []))
                .filter(e => e.title)
                .map(e => ({
                    title: e.title,
                    date: e.date || "Kuupäev täpsustamisel",
                    loc: e.loc || e.asutus || "Elva vald",
                    desc: e.desc || e.description || "Lisainfo Elva valla kultuurikavas.",
                    img: e.img || e.pilt || PLACEHOLDER,
                    url: e.url || "https://elvakultuur.ee"
                }));

            if (events.length > 0) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-main').style.display = 'flex';
                renderTicker();
                showEvent(0);
                setInterval(nextEvent, ROTATE_INTERVAL);
            } else {
                document.getElementById('loader').textContent = "Hetkel sündmusi ei leitud.";
            }
        } catch (err) {
            console.error(err);
            document.getElementById('loader').innerHTML = "<span style='color:#ef4444'>Andmete laadimine ebaõnnestus</span>";
        }
    }

    function renderTicker() {
        const container = document.getElementById('ticker-scroll');
        container.innerHTML = events.map((ev, i) => `
            <div class="event-card" id="card-${i}" onclick="showEvent(${i})">
                <img src="${ev.img}" class="event-card-img" onerror="this.src='${PLACEHOLDER}'">
                <div class="event-card-info">
                    <div class="event-card-date">${ev.date}</div>
                    <div class="event-card-title">${ev.title}</div>
                    <div class="event-card-loc">📍 ${ev.loc}</div>
                </div>
            </div>
        `).join('');
    }

    function showEvent(index) {
        currentIndex = index;
        const ev = events[index];
        const inner = document.getElementById('hero-inner');
        
        // Aktiivne kaart tickeris
        document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
        const activeCard = document.getElementById(`card-${index}`);
        if (activeCard) {
            activeCard.classList.add('active');
            activeCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        inner.style.opacity = 0;
        
        setTimeout(() => {
            inner.innerHTML = `
                <div class="hero-info">
                    <div class="hero-date">${ev.date}</div>
                    <h2 class="hero-title">${ev.title}</h2>
                    <div class="hero-loc">📍 ${ev.loc}</div>
                    <p class="hero-desc">${ev.desc}</p>
                </div>
                <div class="hero-visual">
                    <div class="hero-image-container">
                        <img src="${ev.img}" class="hero-image" onerror="this.src='${PLACEHOLDER}'">
                        <div class="qr-overlay">
                            <div class="qr-text">Info ja<br>piletid</div>
                            <div class="qr-code-box" id="qr-target"></div>
                        </div>
                    </div>
                </div>
            `;

            new QRCode(document.getElementById("qr-target"), {
                text: ev.url,
                width: 60,
                height: 60,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            inner.style.opacity = 1;
        }, 400);
    }

    function nextEvent() {
        currentIndex = (currentIndex + 1) % events.length;
        showEvent(currentIndex);
    }

    // Alusta
    window.onload = loadData;

    // Automaatne lehe värskendus iga 30 minuti järel
    setTimeout(() => window.location.reload(), 30 * 60 * 1000);
</script>

</body>
</html>

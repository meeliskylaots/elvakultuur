<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border-color: #30363d;
        }
        
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            overflow: hidden;
        }
        
        header {
            background-color: rgba(13, 17, 23, 0.98);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            position: fixed;
            top: 0; width: 100%; height: 90px;
            z-index: 100;
        }
        
        h1 { margin: 0; font-weight: 900; font-size: 2.2rem; text-transform: uppercase; color: #ffffff; }
        .clock { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
        
        .layout {
            display: flex;
            height: calc(100vh - 90px);
            margin-top: 90px;
            padding: 25px;
            gap: 25px;
        }
        
        .sidebar {
            width: 35%;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .sidebar-header {
            padding: 20px;
            background: #10141a;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
        }

        .scroll-container {
            flex: 1;
            overflow-y: hidden;
            position: relative;
        }

        .scroll-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            border-left: 5px solid transparent;
            transition: all 0.35s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .list-item.active {
            background: rgba(88, 166, 255, 0.15);
            border-left-color: var(--accent);
            transform: scale(1.02);
        }

        .list-thumb {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .list-text-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
        }

        .list-date { font-size: 0.85rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .list-title { font-size: 1.1rem; font-weight: 700; color: #fff; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-loc { font-size: 0.8rem; color: var(--text-muted); }

        .featured {
            width: 65%;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }
        
        .feat-bg-blur {
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: blur(50px) brightness(0.25);
            object-fit: cover;
            transform: scale(1.15);
            width: 100%; height: 100%;
        }

        .feat-poster-main {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 220px;
        }

        .feat-poster-main img {
            max-width: 92%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .feat-overlay {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            z-index: 3;
            padding: 40px 50px;
            background: linear-gradient(to top, rgba(13,17,23,1) 0%, rgba(13,17,23,0.95) 75%, rgba(13,17,23,0) 100%);
        }

        .feat-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 30px;
        }
        
        .feat-text-wrap { flex: 1; min-width: 0; }
        .feat-date { color: var(--accent); font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .feat-title { font-size: 2.8rem; margin: 0 0 12px 0; font-weight: 900; line-height: 1.1; color: #ffffff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .feat-loc { font-size: 1.4rem; color: #e6edf3; margin-bottom: 12px; font-weight: 600; }
        .feat-desc { font-size: 1.2rem; line-height: 1.4; opacity: 0.85; color: #c9d1d9; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .qr-card {
            background: rgba(33, 38, 45, 0.95);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }
        
        .qr-label { font-size: 0.75rem; font-weight: 900; color: white; text-transform: uppercase; text-align: center; }
        .qr-target { background: white; padding: 6px; border-radius: 6px; }

        .status-msg { font-size: 2rem; text-align: center; margin-top: 35vh; color: var(--text-muted); width: 100%; padding: 0 40px; }
        #featured-inner { width: 100%; height: 100%; opacity: 0; transition: opacity 0.45s ease; }
    </style>
</head>
<body>

    <header>
        <h1>Elva Valla Kultuur</h1>
        <div class="clock" id="clock">00:00</div>
    </header>

    <div id="loader" class="status-msg">Laen sündmusi...</div>

    <div class="layout" id="main-ui" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">Sündmuste voog</div>
            <div class="scroll-container" id="scroll-container">
                <div class="scroll-content" id="scroll-list"></div>
            </div>
        </div>

        <div class="featured">
            <div id="featured-inner"></div>
        </div>
    </div>

    <script>
        // Kasutame lihtsamat URL-i ilma liigsete filtriteta, et tagada andmete kättesaadavus
        const SOURCE_URL = "https://kultuuriaken.tartu.ee/et/syndmused?regions=788";
        const BASE_URL = "https://kultuuriaken.tartu.ee";
        
        let allEvents = [];
        let activeIdx = -1;
        let isScrolling = true;
        let scrollY = 0;
        let lastTs = 0;

        const PLACEHOLDER_IMG = "https://dummyimage.com/1200x800/161b22/58a6ff.png&text=Kultuuris%C3%BCndmus";

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('et-EE', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderList() {
            const list = document.getElementById('scroll-list');
            list.innerHTML = '';
            allEvents.forEach((ev, i) => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.id = `ev-${i}`;
                const thumb = ev.img || "https://dummyimage.com/150x150/161b22/58a6ff.png&text=+";
                
                item.innerHTML = `
                    <img src="${thumb}" class="list-thumb" onerror="this.src='https://dummyimage.com/150x150/161b22/58a6ff.png&text=+'">
                    <div class="list-text-content">
                        <div class="list-date">${ev.date}</div>
                        <div class="list-title">${ev.title}</div>
                        <div class="list-loc">📍 ${ev.loc}</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function switchFeatured(idx) {
            if (idx === activeIdx || !allEvents[idx]) return;
            activeIdx = idx;
            const ev = allEvents[idx];
            
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            const listEl = document.getElementById(`ev-${idx}`);
            if (listEl) listEl.classList.add('active');

            const inner = document.getElementById('featured-inner');
            inner.style.opacity = 0;

            setTimeout(() => {
                const poster = ev.img || PLACEHOLDER_IMG;
                const target = ev.url || BASE_URL;

                inner.innerHTML = `
                    <img src="${poster}" class="feat-bg-blur" onerror="this.src='${PLACEHOLDER_IMG}'">
                    <div class="feat-poster-main">
                        <img src="${poster}" alt="Plakat" onerror="this.src='${PLACEHOLDER_IMG}'">
                    </div>
                    <div class="feat-overlay">
                        <div class="feat-content">
                            <div class="feat-text-wrap">
                                <div class="feat-date">${ev.date}</div>
                                <h2 class="feat-title">${ev.title}</h2>
                                <div class="feat-loc">📍 ${ev.loc}</div>
                                <div class="feat-desc">${ev.desc || 'Vaata lisainfot QR-koodist.'}</div>
                            </div>
                            <div class="qr-card">
                                <div class="qr-label">INFO JA<br>PILETID</div>
                                <div class="qr-target" id="qr-box"></div>
                            </div>
                        </div>
                    </div>
                `;
                
                const qrelement = document.getElementById('qr-box');
                if (qrelement) {
                    qrelement.innerHTML = "";
                    new QRCode(qrelement, {
                        text: target, width: 120, height: 120, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M
                    });
                }

                inner.style.opacity = 1;
            }, 250);
        }

        async function fetchHtml() {
            const encoded = encodeURIComponent(SOURCE_URL);
            // Proovime erinevaid proxy teenuseid
            const proxies = [
                `https://api.allorigins.win/get?url=${encoded}`,
                `https://corsproxy.io/?${encoded}`,
                `https://api.codetabs.com/v1/proxy?quest=${encoded}`
            ];

            for (const p of proxies) {
                try {
                    const res = await fetch(p);
                    if (!res.ok) continue;
                    if (p.includes('allorigins')) {
                        const json = await res.json();
                        if (json.contents) return json.contents;
                    } else {
                        const text = await res.text();
                        if (text && text.length > 500) return text;
                    }
                } catch (e) {
                    console.warn(`Proxy fail: ${p}`);
                }
            }
            throw new Error("Andmete laadimine ebaõnnestus.");
        }

        function parse(html) {
            const doc = new DOMParser().parseFromString(html, "text/html");
            // Leiame kõik elemendid, mis näevad välja nagu sündmuse artiklid
            const nodes = Array.from(doc.querySelectorAll('.views-row, article, .node--type-syndmus, .event-item, .card, .grid-item'));
            
            const events = nodes.map(n => {
                const link = n.querySelector('a[href*="/syndmus/"]');
                if (!link) return null;

                const title = link.textContent.trim();
                if (title.length < 3) return null;

                let url = link.getAttribute('href');
                if (url.startsWith('/')) url = BASE_URL + url;

                // Pildituvastus
                let img = '';
                const imgEl = n.querySelector('img');
                if (imgEl) {
                    img = imgEl.getAttribute('srcset')?.split(',')[0].trim().split(' ')[0] || 
                          imgEl.getAttribute('data-src') || 
                          imgEl.getAttribute('src') || '';
                    if (img.startsWith('/')) img = BASE_URL + img;
                    if (img.includes('.svg') || img.length < 15) img = '';
                }

                // Kuupäev
                const dateEl = n.querySelector('.node__event-date, time, [class*="date"]');
                let date = dateEl ? dateEl.textContent.trim().replace(/\s+/g, ' ') : '';
                if (!date) {
                    const match = n.innerText.match(/\d{1,2}\.\s*[a-zA-ZäöüõÄÖÜÕ]+/);
                    date = match ? match[0] : 'Kuupäev täpsustamisel';
                }

                // Asukoht
                const locEl = n.querySelector('[class*="place"], [class*="location"], [class*="venue"]');
                const loc = locEl ? locEl.textContent.trim() : 'Elva vald';

                // Kirjeldus
                const descEl = n.querySelector('.node__body, .description, p');
                const desc = descEl ? descEl.textContent.trim().substring(0, 160) + '...' : '';

                return { title, date, loc, desc, img, url };
            }).filter(ev => ev && ev.title);

            // Kui midagi ei leitud, proovime veelgi vabamalt otsida kõiki linke
            if (events.length === 0) {
                const allLinks = Array.from(doc.querySelectorAll('a[href*="/syndmus/"]'));
                const seen = new Set();
                return allLinks.map(a => {
                    const title = a.textContent.trim();
                    const url = a.getAttribute('href').startsWith('/') ? BASE_URL + a.getAttribute('href') : a.getAttribute('href');
                    if (title.length > 5 && !seen.has(url)) {
                        seen.add(url);
                        return { title, date: 'Vaata lähemalt', loc: 'Elva vald', desc: '', img: '', url };
                    }
                    return null;
                }).filter(x => x !== null);
            }

            return events;
        }

        async function init() {
            const loader = document.getElementById('loader');
            try {
                const html = await fetchHtml();
                allEvents = parse(html);

                if (allEvents.length > 0) {
                    loader.style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                    renderList();
                    switchFeatured(0);
                    requestAnimationFrame(animateScroll);
                } else {
                    loader.innerHTML = "Hetkel sündmusi ei leitud.<br><small style='font-size:1rem; opacity:0.6'>Kontrolli Tartu Kultuuriakna lehte või proovi hiljem uuesti.</small>";
                }
            } catch (e) {
                console.error(e);
                loader.innerHTML = `<span style="color:#ff6b6b">Viga andmete pärimisel.</span><br><small style="font-size:1rem; opacity:0.6">${e.message}</small>`;
            }
        }

        function animateScroll(ts) {
            if (!isScrolling) return;
            const container = document.getElementById('scroll-container');
            if (!container) return;

            if (!lastTs) lastTs = ts;
            const dt = (ts - lastTs) / 1000;
            lastTs = ts;

            scrollY += 25 * dt;
            container.scrollTop = scrollY;

            const mid = container.scrollTop + (container.clientHeight / 2);
            const items = document.querySelectorAll('.list-item');
            let bestIdx = 0;
            let bestDist = Infinity;

            items.forEach((it, i) => {
                const center = it.offsetTop + it.offsetHeight / 2;
                const dist = Math.abs(center - mid);
                if (dist < bestDist) { bestDist = dist; bestIdx = i; }
            });

            switchFeatured(bestIdx);

            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 2) {
                isScrolling = false;
                setTimeout(() => {
                    container.scrollTo({ top: 0, behavior: 'smooth' });
                    scrollY = 0;
                    lastTs = 0;
                    setTimeout(() => { isScrolling = true; requestAnimationFrame(animateScroll); }, 2000);
                }, 3500);
                return;
            }
            requestAnimationFrame(animateScroll);
        }

        init();
        setInterval(() => window.location.reload(), 30 * 60 * 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border-color: #30363d;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        header {
            background-color: rgba(13, 17, 23, 0.98);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            position: fixed;
            top: 0;
            width: 100%;
            height: 90px;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-weight: 900;
            font-size: 2.2rem;
            text-transform: uppercase;
            color: #ffffff;
        }

        .clock {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .layout {
            display: flex;
            height: calc(100vh - 90px);
            margin-top: 90px;
            padding: 25px;
            gap: 25px;
        }

        .sidebar {
            width: 35%;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .sidebar-header {
            padding: 20px;
            background: #10141a;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
        }

        .scroll-container {
            flex: 1;
            overflow-y: hidden;
            position: relative;
        }

        .scroll-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            border-left: 5px solid transparent;
            transition: all 0.35s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .list-item.active {
            background: rgba(88, 166, 255, 0.15);
            border-left-color: var(--accent);
            transform: scale(1.02);
        }

        .list-thumb {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .list-text-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
            min-width: 0;
        }

        .list-date {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
        }

        .list-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-loc {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .featured {
            width: 65%;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }

        .feat-bg-blur {
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: blur(60px) brightness(0.2);
            object-fit: cover;
            transform: scale(1.2);
            width: 100%;
            height: 100%;
        }

        .feat-poster-main {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 220px;
        }

        .feat-poster-main img {
            max-width: 95%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0,0,0,1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .feat-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 3;
            padding: 40px 50px;
            background: linear-gradient(to top, rgba(13,17,23,1) 0%, rgba(13,17,23,0.95) 75%, rgba(13,17,23,0) 100%);
        }

        .feat-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 30px;
        }

        .feat-text-wrap {
            flex: 1;
            min-width: 0;
        }

        .feat-date {
            color: var(--accent);
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .feat-title {
            font-size: 2.8rem;
            margin: 0 0 12px 0;
            font-weight: 900;
            line-height: 1.1;
            color: #ffffff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .feat-loc {
            font-size: 1.4rem;
            color: #e6edf3;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .feat-desc {
            font-size: 1.2rem;
            line-height: 1.4;
            opacity: 0.85;
            color: #c9d1d9;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .qr-card {
            background: rgba(33, 38, 45, 0.95);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }

        .qr-label {
            font-size: 0.75rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            text-align: center;
        }

        .qr-target {
            background: white;
            padding: 6px;
            border-radius: 6px;
        }

        .status-msg {
            font-size: 2rem;
            text-align: center;
            margin-top: 35vh;
            color: var(--text-muted);
            width: 100%;
            padding: 0 40px;
        }

        #featured-inner {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.45s ease;
        }
    </style>
</head>
<body>

<header>
    <h1>Elva Valla Kultuur</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<div id="loader" class="status-msg">Laen Kultuuriakna sündmusi...</div>

<div class="layout" id="main-ui" style="display:none;">
    <div class="sidebar">
        <div class="sidebar-header">Selle kuu tulevased sündmused</div>
        <div class="scroll-container" id="scroll-container">
            <div class="scroll-content" id="scroll-list"></div>
        </div>
    </div>

    <div class="featured">
        <div id="featured-inner"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const DEFAULT_TARGET_URL = "https://kultuuriaken.tartu.ee/et/syndmused?regions=788";
    const SCROLL_SPEED = 25;

    let allEvents = [];
    let activeIdx = -1;
    let isScrolling = true;
    let scrollY = 0;
    let lastTs = 0;

    const PLACEHOLDER_IMG =
        "data:image/svg+xml;charset=UTF-8," +
        encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
                <rect width="100%" height="100%" fill="#161b22"/>
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
                      fill="#58a6ff" font-family="Arial, sans-serif"
                      font-size="56" font-weight="700">
                    Kultuurisündmus
                </text>
            </svg>
        `);

    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function normalizeText(value) {
        return String(value ?? "").replace(/\s+/g, " ").trim();
    }

    function truncate(text, max = 180) {
        const clean = normalizeText(text);
        if (!clean) return "";
        return clean.length > max ? clean.slice(0, max).trim() + "..." : clean;
    }

    function normalizeUrl(url) {
        const value = normalizeText(url);
        if (!value) return "";
        if (/^https?:\/\//i.test(value)) return value;
        if (value.startsWith("//")) return "https:" + value;
        if (value.startsWith("/")) return "https://kultuuriaken.tartu.ee" + value;
        return value;
    }

    function safeJsonParse(input) {
        if (input == null) return null;
        if (typeof input === "object") return input;

        const text = String(input).trim();
        if (!text) return null;

        try {
            return JSON.parse(text);
        } catch (err) {
            return null;
        }
    }

    function extractEventsArray(data) {
        if (Array.isArray(data)) return data;
        if (Array.isArray(data?.events)) return data.events;
        if (Array.isArray(data?.data)) return data.data;
        if (Array.isArray(data?.items)) return data.items;
        if (Array.isArray(data?.results)) return data.results;
        return [];
    }

    function normalizeEvent(raw) {
        if (!raw || typeof raw !== "object") return null;

        const title = normalizeText(raw.title);
        if (!title) return null;

        const date = normalizeText(raw.date || "Täpsustamisel");
        const loc = normalizeText(raw.loc || "Elva vald");
        const desc = truncate(raw.desc || "");
        const img = normalizeUrl(raw.img || "");
        const url = normalizeUrl(raw.url || DEFAULT_TARGET_URL);
        const startIso = normalizeText(raw.startIso || "");

        return { title, date, loc, desc, img, url, startIso };
    }

    async function fetchWithTimeout(url, timeout = 12000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeout);

        try {
            return await fetch(url, {
                method: "GET",
                cache: "no-store",
                signal: controller.signal
            });
        } finally {
            clearTimeout(timer);
        }
    }

    async function parseAttemptResponse(type, response) {
        if (type === "direct-json") {
            const text = await response.text();
            return safeJsonParse(text);
        }

        if (type === "allorigins") {
            const wrapper = await response.json();
            return safeJsonParse(wrapper?.contents);
        }

        const text = await response.text();
        return safeJsonParse(text);
    }

    async function fetchEventsRobustly() {
        const encodedUrl = encodeURIComponent(SCRIPT_URL);

        const attempts = [
            { type: "direct-json", url: SCRIPT_URL },
            { type: "allorigins", url: `https://api.allorigins.win/get?url=${encodedUrl}` },
            { type: "plain-text", url: `https://corsproxy.io/?${encodedUrl}` },
            { type: "plain-text", url: `https://api.codetabs.com/v1/proxy?quest=${encodedUrl}` }
        ];

        for (const attempt of attempts) {
            try {
                const res = await fetchWithTimeout(attempt.url, 12000);
                if (!res.ok) continue;

                const parsed = await parseAttemptResponse(attempt.type, res);
                const events = extractEventsArray(parsed)
                    .map(normalizeEvent)
                    .filter(Boolean)
                    .sort((a, b) => {
                        if (!a.startIso || !b.startIso) return 0;
                        return new Date(a.startIso) - new Date(b.startIso);
                    });

                if (events.length > 0) {
                    return events;
                }
            } catch (err) {
            }
        }

        throw new Error("Ükski andmeallikas ei vastanud sobiva JSON-iga.");
    }

    function updateClock() {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    setInterval(updateClock, 1000);
    updateClock();

    function createImageElement(src, className, altText = "") {
        const img = document.createElement("img");
        img.className = className;
        img.alt = altText;
        img.src = src || PLACEHOLDER_IMG;
        img.onerror = function () {
            this.onerror = null;
            this.src = PLACEHOLDER_IMG;
        };
        return img;
    }

    function renderList() {
        const list = document.getElementById("scroll-list");
        list.innerHTML = "";

        allEvents.forEach((ev, i) => {
            const item = document.createElement("div");
            item.className = "list-item";
            item.id = `ev-${i}`;

            const thumb = createImageElement(ev.img, "list-thumb", ev.title);

            const textWrap = document.createElement("div");
            textWrap.className = "list-text-content";

            const date = document.createElement("div");
            date.className = "list-date";
            date.textContent = ev.date || "Kuupäev puudub";

            const title = document.createElement("div");
            title.className = "list-title";
            title.textContent = ev.title || "Pealkiri";

            const loc = document.createElement("div");
            loc.className = "list-loc";
            loc.textContent = "📍 " + (ev.loc || "Elva vald");

            textWrap.appendChild(date);
            textWrap.appendChild(title);
            textWrap.appendChild(loc);

            item.appendChild(thumb);
            item.appendChild(textWrap);
            list.appendChild(item);
        });
    }

    function switchFeatured(idx) {
        if (idx === activeIdx || !allEvents[idx]) return;

        activeIdx = idx;
        const ev = allEvents[idx];

        document.querySelectorAll(".list-item").forEach(el => el.classList.remove("active"));
        document.getElementById(`ev-${idx}`)?.classList.add("active");

        const inner = document.getElementById("featured-inner");
        inner.style.opacity = 0;

        setTimeout(() => {
            const poster = escapeHtml(ev.img || PLACEHOLDER_IMG);
            const target = ev.url || DEFAULT_TARGET_URL;

            inner.innerHTML = `
                <img src="${poster}" class="feat-bg-blur" alt="">
                <div class="feat-poster-main">
                    <img src="${poster}" alt="${escapeHtml(ev.title)}">
                </div>
                <div class="feat-overlay">
                    <div class="feat-content">
                        <div class="feat-text-wrap">
                            <div class="feat-date">${escapeHtml(ev.date || "Täpsustamisel")}</div>
                            <h2 class="feat-title">${escapeHtml(ev.title || "")}</h2>
                            <div class="feat-loc">📍 ${escapeHtml(ev.loc || "Elva vald")}</div>
                            <div class="feat-desc">${escapeHtml(ev.desc || "Vaata lisainfot QR-koodist.")}</div>
                        </div>
                        <div class="qr-card">
                            <div class="qr-label">INFO JA<br>PILETID</div>
                            <div class="qr-target" id="qr-box"></div>
                        </div>
                    </div>
                </div>
            `;

            inner.querySelectorAll("img").forEach(img => {
                img.onerror = function () {
                    this.onerror = null;
                    this.src = PLACEHOLDER_IMG;
                };
            });

            const qrElement = document.getElementById("qr-box");
            qrElement.innerHTML = "";

            new QRCode(qrElement, {
                text: target,
                width: 120,
                height: 120,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });

            inner.style.opacity = 1;
        }, 250);
    }

    function animateScroll(ts) {
        if (!isScrolling) return;

        const container = document.getElementById("scroll-container");
        if (!container) return;

        const items = document.querySelectorAll(".list-item");
        if (!items.length) return;

        if (container.scrollHeight <= container.clientHeight + 4) {
            switchFeatured(0);
            return;
        }

        if (!lastTs) lastTs = ts;
        const dt = (ts - lastTs) / 1000;
        lastTs = ts;

        scrollY += SCROLL_SPEED * dt;
        container.scrollTop = scrollY;

        const mid = container.scrollTop + (container.clientHeight / 2);
        let bestIdx = 0;
        let bestDist = Infinity;

        items.forEach((it, i) => {
            const dist = Math.abs((it.offsetTop + it.offsetHeight / 2) - mid);
            if (dist < bestDist) {
                bestDist = dist;
                bestIdx = i;
            }
        });

        switchFeatured(bestIdx);

        if (container.scrollTop + container.clientHeight >= container.scrollHeight - 2) {
            isScrolling = false;

            setTimeout(() => {
                container.scrollTo({ top: 0, behavior: "smooth" });
                scrollY = 0;
                lastTs = 0;

                setTimeout(() => {
                    isScrolling = true;
                    requestAnimationFrame(animateScroll);
                }, 2000);
            }, 3000);

            return;
        }

        requestAnimationFrame(animateScroll);
    }

    async function init() {
        const loader = document.getElementById("loader");
        const mainUi = document.getElementById("main-ui");

        try {
            allEvents = await fetchEventsRobustly();

            if (allEvents.length > 0) {
                loader.style.display = "none";
                mainUi.style.display = "flex";
                renderList();
                switchFeatured(0);

                if (allEvents.length > 1) {
                    requestAnimationFrame(animateScroll);
                }
            } else {
                loader.textContent = "Selle kuu tulevasi sündmusi ei leitud.";
            }
        } catch (e) {
            console.error(e);
            loader.innerHTML = `<span style="color:#ff6b6b">Viga andmete laadimisel.</span><br><small style="font-size:1rem; opacity:0.6">${escapeHtml(e.message)}</small>`;
        }
    }

    init();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>

</body>
</html>

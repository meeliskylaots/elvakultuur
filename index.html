<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --elva-blue: #1d71d4;
            --bg-black: #000000;
            --card-black: #080808;
            --text-white: #ffffff;
            --accent-green: #22c55e;
            --muted: #94a3b8;
            --soft-text: #cbd5e1;
            --border: rgba(255, 255, 255, 0.15);
            --header-h: 12vh;
            --ticker-h: 15vh;
            --safe-area: 5vw;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-black);
            color: var(--text-white);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 var(--safe-area);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        #ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: brightness(0.15) blur(80px);
            transition: background-image 1.5s ease-in-out;
            transform: scale(1.2);
        }

        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 2vh;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5vw;
        }

        .elva-logo {
            width: 3.5vw;
            height: 3.5vw;
            background: var(--elva-blue);
            border-radius: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 2vw;
            line-height: 1;
        }

        .header-title {
            font-size: 1.6vw;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .clock-section {
            text-align: right;
        }

        .clock {
            font-size: 3.8vw;
            font-weight: 900;
            line-height: 1;
        }

        .date-today {
            font-size: 1.3vw;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 5px;
        }

        .app-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2vh 0;
            gap: 2vh;
            min-height: 0;
        }

        .hero {
            flex: 1;
            background: var(--card-black);
            border: 2px solid var(--border);
            border-radius: 2vw;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 80px rgba(0,0,0,0.8);
            min-height: 0;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 1vh;
            background: var(--elva-blue);
            width: 0;
            z-index: 10;
        }

        #hero-inner {
            display: flex;
            width: 100%;
            height: 100%;
            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;
        }

        .hero-info {
            flex: 1;
            padding: 4vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .hero-date-tag {
            background: var(--elva-blue);
            padding: 0.8vw 2vw;
            border-radius: 50px;
            font-size: 1.3vw;
            font-weight: 800;
            margin-bottom: 2.5vh;
            display: inline-block;
            align-self: flex-start;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .hero-title {
            font-size: 3.2vw;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 2vh;
            color: #ffffff;
            word-wrap: break-word;
        }

        .hero-loc {
            font-size: 1.8vw;
            font-weight: 800;
            color: var(--accent-green);
            margin-bottom: 2vh;
        }

        .hero-desc {
            font-size: 1.5vw;
            line-height: 1.5;
            color: var(--soft-text);
            font-weight: 600;
            max-width: 95%;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-visual {
            flex: 0 0 42%;
            padding: 4vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 1.8vw;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #050505;
        }

        .image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #07111f, #050505);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.25);
            font-size: 3vw;
            font-weight: 900;
            letter-spacing: 0.2vw;
        }

        .bottom-section {
            height: var(--ticker-h);
            display: flex;
            gap: 2vw;
            padding-bottom: 4vh;
            align-items: stretch;
            min-height: 0;
            flex-shrink: 0;
        }

        .ticker-scroll {
            flex: 1;
            display: flex;
            gap: 1.5vw;
            overflow-x: auto;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

        .ticker-scroll::-webkit-scrollbar {
            display: none;
        }

        .event-card {
            flex: 0 0 24vw;
            height: 100%;
            background: #0a0a0a;
            border: 2px solid var(--border);
            border-radius: 1.4vw;
            display: flex;
            align-items: center;
            padding: 1vw;
            gap: 1.2vw;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
        }

        .event-card.active {
            border: 4px solid var(--elva-blue);
            background: rgba(29, 113, 212, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(29, 113, 212, 0.3);
        }

        .event-card-img {
            width: 4.5vw;
            height: 4.5vw;
            border-radius: 0.8vw;
            object-fit: cover;
            background: #222;
            flex-shrink: 0;
        }

        .event-card-img.hidden {
            display: none;
        }

        .event-card-info {
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.3vw;
            flex: 1;
            min-width: 0;
        }

        .event-card-date {
            font-size: 0.85vw;
            color: var(--elva-blue);
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .event-card-title {
            font-size: 1.05vw;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .qr-area {
            width: 25vw;
            background: var(--card-black);
            border: 2px solid var(--border);
            border-radius: 2vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8vw 2vw;
            gap: 1.5vw;
            flex-shrink: 0;
        }

        .qr-text {
            font-size: 1vw;
            font-weight: 900;
            text-align: right;
            line-height: 1.2;
            color: #fff;
            flex: 1;
            letter-spacing: 0.5px;
        }

        .qr-box {
            background: #fff;
            padding: 0.5vw;
            border-radius: 1vw;
            height: 6vw;
            width: 6vw;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        #qr-target img,
        #qr-target canvas {
            max-width: 100%;
            max-height: 100%;
        }

        @keyframes progress {
            from { width: 0; }
            to { width: 100%; }
        }

        .loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3vw;
            font-weight: 900;
            color: var(--elva-blue);
            flex-direction: column;
            text-align: center;
            padding: 4vw;
        }

        .error-details {
            font-size: 1.2vw;
            color: #64748b;
            margin-top: 2vh;
            font-weight: 600;
            text-align: center;
            max-width: 60vw;
            line-height: 1.4;
        }

        @media (max-width: 900px) {
            :root {
                --safe-area: 4vw;
                --header-h: 12vh;
                --ticker-h: 18vh;
            }

            .hero-title {
                font-size: 5vw;
            }

            .hero-loc,
            .hero-desc {
                font-size: 2.4vw;
            }

            .hero-date-tag {
                font-size: 2vw;
            }

            .event-card {
                flex-basis: 42vw;
            }

            .qr-area {
                width: 30vw;
            }
        }
    </style>
</head>

<body>

<div id="ambient-bg"></div>

<div id="loader" class="loader">
    LAEN ANDMEID...
    <div id="loader-error" class="error-details">Ootan Kultuuriakna värskeid sündmusi</div>
</div>

<header>
    <div class="header-left">
        <div class="elva-logo">E</div>
        <h1 class="header-title">Kultuuriekraan</h1>
    </div>

    <div class="clock-section">
        <div class="clock" id="clock">00:00</div>
        <div class="date-today" id="today-date">...</div>
    </div>
</header>

<main class="app-content" id="app-main" style="visibility: hidden;">
    <section class="hero">
        <div class="progress-bar" id="progress-bar"></div>
        <div id="hero-inner"></div>
    </section>

    <div class="bottom-section">
        <div class="ticker-scroll" id="ticker-scroll"></div>

        <div class="qr-area">
            <div class="qr-text">LÄHEMALT<br>&amp; PILETID</div>
            <div class="qr-box" id="qr-target"></div>
        </div>
    </div>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";

    const ROTATE_INTERVAL = 15000;
    const RELOAD_INTERVAL = 1800000;
    const TIME_ZONE = "Europe/Tallinn";

    let events = [];
    let currentIndex = 0;
    let rotationTimer = null;
    let isLoading = false;

    function updateClock() {
        const now = new Date();

        document.getElementById('clock').textContent = new Intl.DateTimeFormat('et-EE', {
            hour: '2-digit',
            minute: '2-digit',
            timeZone: TIME_ZONE
        }).format(now);

        const dateText = new Intl.DateTimeFormat('et-EE', {
            weekday: 'long',
            day: 'numeric',
            month: 'long',
            timeZone: TIME_ZONE
        }).format(now);

        document.getElementById('today-date').textContent = capitalizeFirst(dateText);
    }

    setInterval(updateClock, 1000);
    updateClock();

    function formatIsoDate(startIso, endIso) {
        const start = parseDate(startIso);
        const end = parseDate(endIso);

        if (!start) {
            return "Kuupäev puudub";
        }

        if (end && isMultiDayEvent(start, end)) {
            const now = new Date();

            if (start <= now && end >= now) {
                return `Kestab kuni ${formatShortDate(end)}`;
            }

            return `${formatShortDate(start)} – ${formatShortDate(end)}`;
        }

        const weekday = new Intl.DateTimeFormat('et-EE', {
            weekday: 'long',
            timeZone: TIME_ZONE
        }).format(start);

        const day = new Intl.DateTimeFormat('et-EE', {
            day: 'numeric',
            timeZone: TIME_ZONE
        }).format(start);

        const month = new Intl.DateTimeFormat('et-EE', {
            month: 'long',
            timeZone: TIME_ZONE
        }).format(start);

        const time = new Intl.DateTimeFormat('et-EE', {
            hour: '2-digit',
            minute: '2-digit',
            timeZone: TIME_ZONE
        }).format(start);

        return `${capitalizeFirst(weekday)}, ${day}. ${month} | kell ${time}`;
    }

    function formatCardDate(startIso, endIso) {
        const start = parseDate(startIso);
        const end = parseDate(endIso);

        if (!start) {
            return "Aeg puudub";
        }

        if (end && isMultiDayEvent(start, end)) {
            const now = new Date();

            if (start <= now && end >= now) {
                return `Kuni ${formatShortDate(end)}`;
            }

            return `${formatShortDate(start)} – ${formatShortDate(end)}`;
        }

        const date = new Intl.DateTimeFormat('et-EE', {
            day: 'numeric',
            month: 'short',
            timeZone: TIME_ZONE
        }).format(start);

        const time = new Intl.DateTimeFormat('et-EE', {
            hour: '2-digit',
            minute: '2-digit',
            timeZone: TIME_ZONE
        }).format(start);

        return `${date} · ${time}`;
    }

    function isMultiDayEvent(start, end) {
        const diff = end.getTime() - start.getTime();
        return diff > 20 * 60 * 60 * 1000;
    }

    function formatShortDate(date) {
        const day = new Intl.DateTimeFormat('et-EE', {
            day: 'numeric',
            timeZone: TIME_ZONE
        }).format(date);

        const month = new Intl.DateTimeFormat('et-EE', {
            month: 'long',
            timeZone: TIME_ZONE
        }).format(date);

        return `${day}. ${month}`;
    }

    function parseDate(isoString) {
        if (!isoString) {
            return null;
        }

        const d = new Date(isoString);

        if (isNaN(d.getTime())) {
            return null;
        }

        return d;
    }

    async function loadData() {
        if (isLoading) {
            return;
        }

        isLoading = true;

        try {
            const res = await fetch(`${SCRIPT_URL}?format=json&t=${Date.now()}`, {
                method: 'GET',
                cache: 'no-store'
            });

            const text = await res.text();

            if (text.trim().startsWith('<')) {
                throw new Error("Google Script tagastas HTML-i, mitte JSON-i.");
            }

            const data = JSON.parse(text);

            if (data.ok && Array.isArray(data.events) && data.events.length > 0) {
                events = normalizeEvents(data.events);
                currentIndex = currentIndex % events.length;

                const loader = document.getElementById('loader');
                delete loader.dataset.customError;
            } else {
                events = [];
            }

        } catch (e) {
            console.error("Viga laadimisel:", e);
            events = [];
            showLoaderMessage(
                "ANDMEID EI ÕNNESTUNUD LAADIDA",
                "Kontrolli, kas Google Apps Scripti veebirakendus on avaldatud ja tagastab ?format=json päringule JSON-andmed."
            );
        } finally {
            isLoading = false;
        }

        processData();
    }

    function normalizeEvents(rawEvents) {
        return rawEvents
            .filter(ev => ev && ev.startIso)
            .map(ev => ({
                title: String(ev.title || "Üritus"),
                startIso: String(ev.startIso || ""),
                endIso: String(ev.endIso || ev.startIso || ""),
                loc: String(ev.loc || "Elva vald"),
                desc: String(ev.desc || ""),
                img: String(ev.img || ""),
                url: String(ev.url || "https://kultuuriaken.tartu.ee")
            }))
            .sort((a, b) => new Date(a.startIso) - new Date(b.startIso));
    }

    function processData() {
        const loader = document.getElementById('loader');
        const appMain = document.getElementById('app-main');

        if (events && events.length > 0) {
            loader.style.display = 'none';
            appMain.style.visibility = 'visible';

            renderTicker();
            showEvent(currentIndex || 0);
            startRotation();

        } else {
            appMain.style.visibility = 'hidden';

            if (!loader.dataset.customError) {
                showLoaderMessage(
                    "HETKEL ÜRITUSI EI OLE",
                    "Kultuuriaknas Elva valla eelseisvad sündmused hetkel puuduvad."
                );
            }

            loader.style.display = 'flex';
            stopRotation();
        }
    }

    function startRotation() {
        stopRotation();

        rotationTimer = setInterval(() => {
            if (!events || events.length === 0) {
                return;
            }

            currentIndex = (currentIndex + 1) % events.length;
            showEvent(currentIndex);
        }, ROTATE_INTERVAL);
    }

    function stopRotation() {
        if (rotationTimer) {
            clearInterval(rotationTimer);
            rotationTimer = null;
        }
    }

    function renderTicker() {
        const ticker = document.getElementById('ticker-scroll');

        ticker.innerHTML = events.map((ev, i) => {
            const img = escapeAttribute(ev.img);
            const title = escapeHtml(ev.title);
            const cardDate = escapeHtml(formatCardDate(ev.startIso, ev.endIso));

            return `
                <div class="event-card" id="card-${i}" data-index="${i}" role="button" tabindex="0">
                    ${img ? `<img src="${img}" class="event-card-img" alt="" onerror="this.classList.add('hidden')">` : ''}
                    <div class="event-card-info">
                        <div class="event-card-date">${cardDate}</div>
                        <div class="event-card-title">${title}</div>
                    </div>
                </div>
            `;
        }).join('');

        document.querySelectorAll('.event-card').forEach(card => {
            card.addEventListener('click', () => {
                const idx = Number(card.dataset.index);
                currentIndex = idx;
                showEvent(idx);
                startRotation();
            });

            card.addEventListener('keydown', event => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    const idx = Number(card.dataset.index);
                    currentIndex = idx;
                    showEvent(idx);
                    startRotation();
                }
            });
        });
    }

    function showEvent(idx) {
        if (!events || events.length === 0) {
            return;
        }

        if (idx < 0 || idx >= events.length) {
            idx = 0;
        }

        currentIndex = idx;

        const ev = events[idx];
        const inner = document.getElementById('hero-inner');
        const progressBar = document.getElementById('progress-bar');

        inner.style.opacity = 0;
        inner.style.transform = 'translateY(15px)';

        setTimeout(() => {
            document.querySelectorAll('.event-card').forEach(card => {
                card.classList.remove('active');
            });

            const activeCard = document.getElementById(`card-${idx}`);

            if (activeCard) {
                activeCard.classList.add('active');
                activeCard.scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest',
                    inline: 'center'
                });
            }

            progressBar.style.animation = 'none';
            void progressBar.offsetWidth;
            progressBar.style.animation = `progress ${ROTATE_INTERVAL}ms linear forwards`;

            if (ev.img) {
                document.getElementById('ambient-bg').style.backgroundImage = `url("${escapeCssUrl(ev.img)}")`;
            } else {
                document.getElementById('ambient-bg').style.backgroundImage = 'none';
            }

            const title = escapeHtml(ev.title || "Pealkiri puudub");
            const loc = escapeHtml(ev.loc || "Elva vald");
            const desc = escapeHtml(ev.desc || "");
            const img = escapeAttribute(ev.img || "");
            const date = escapeHtml(formatIsoDate(ev.startIso, ev.endIso));

            inner.innerHTML = `
                <div class="hero-info">
                    <div class="hero-date-tag">${date}</div>
                    <h2 class="hero-title">${title}</h2>
                    <div class="hero-loc">📍 ${loc}</div>
                    <div class="hero-desc">${desc}</div>
                </div>

                <div class="hero-visual">
                    <div class="image-wrapper">
                        ${
                            img
                                ? `<img src="${img}" class="hero-image" alt="" onerror="this.outerHTML='<div class=&quot;image-placeholder&quot;>ELVA</div>'">`
                                : `<div class="image-placeholder">ELVA</div>`
                        }
                    </div>
                </div>
            `;

            updateQrCode(ev.url);

            inner.style.opacity = 1;
            inner.style.transform = 'translateY(0)';
        }, 300);
    }

    function updateQrCode(url) {
        const qrTarget = document.getElementById("qr-target");

        if (!qrTarget || typeof QRCode === "undefined") {
            return;
        }

        qrTarget.innerHTML = "";

        new QRCode(qrTarget, {
            text: url || "https://kultuuriaken.tartu.ee",
            width: 220,
            height: 220,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
        });
    }

    function showLoaderMessage(title, detail) {
        const loader = document.getElementById('loader');

        loader.dataset.customError = "1";
        loader.innerHTML = `
            <div>${escapeHtml(title)}</div>
            <div class="error-details">${escapeHtml(detail)}</div>
        `;
        loader.style.display = 'flex';
    }

    function escapeHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value) {
        return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function escapeCssUrl(value) {
        return String(value || "")
            .replace(/"/g, "%22")
            .replace(/\)/g, "%29");
    }

    function capitalizeFirst(value) {
        value = String(value || "");

        if (!value) {
            return "";
        }

        return value.charAt(0).toUpperCase() + value.slice(1);
    }

    loadData();
    setInterval(loadData, RELOAD_INTERVAL);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --card-hover: #21262d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border-color: #30363d;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        header {
            background-color: rgba(13, 17, 23, 0.98);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            position: fixed;
            top: 0;
            width: 100%;
            height: 90px;
            box-sizing: border-box;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        h1 { margin: 0; font-weight: 900; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px; color: #ffffff; }
        .clock { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
        
        .layout {
            display: flex;
            height: calc(100vh - 90px);
            margin-top: 90px;
            padding: 30px;
            gap: 30px;
            box-sizing: border-box;
        }
        
        /* VASAK PANEEL */
        .sidebar {
            width: 35%;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #10141a;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
            z-index: 10;
        }

        .scroll-container {
            flex: 1;
            overflow-y: hidden; 
            position: relative;
        }

        .scroll-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .list-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
        }

        .list-item.active {
            background: rgba(88, 166, 255, 0.1);
            border-left-color: var(--accent);
            transform: scale(1.02);
        }

        .list-thumb {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
        }

        .list-text-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow: hidden;
        }

        .list-date { font-size: 0.9rem; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .list-title { font-size: 1.15rem; font-weight: 700; color: #fff; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-loc { font-size: 0.85rem; color: var(--text-muted); }

        /* PAREM PANEEL - PLAKAT FOOKUSES */
        .featured {
            width: 65%;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: opacity 0.4s ease;
            position: relative;
        }
        
        /* Bluritud taustapilt täitmiseks */
        .feat-bg-blur {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: blur(30px) brightness(0.4);
            object-fit: cover;
            transform: scale(1.1);
        }

        /* Terav plakat keskel */
        .feat-poster-main {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%);
        }

        .feat-poster-main img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Hoiab plakati proportsioonid õigena */
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Alumine info kiht */
        .feat-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 3;
            padding: 60px 50px 40px;
            background: linear-gradient(to top, rgba(13,17,23,1) 0%, rgba(13,17,23,0.9) 60%, rgba(13,17,23,0) 100%);
            box-sizing: border-box;
        }

        .feat-content-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 40px;
        }
        
        .feat-text { flex: 1; }
        .feat-date { color: var(--accent); font-size: 2rem; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; }
        .feat-title { font-size: 3.2rem; margin: 0 0 15px 0; font-weight: 900; line-height: 1.1; color: #ffffff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .feat-loc { font-size: 1.6rem; color: #e6edf3; margin-bottom: 15px; display: flex; align-items: center; font-weight: 600; }
        .feat-desc { font-size: 1.3rem; line-height: 1.5; opacity: 0.85; color: #c9d1d9; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .qr-container {
            background: rgba(33, 38, 45, 0.95);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .qr-label { font-size: 0.9rem; font-weight: 800; color: white; text-transform: uppercase; text-align: center; line-height: 1.1; }
        .qr-code-box { background: white; padding: 8px; border-radius: 8px; }

        .status-message { font-size: 2rem; text-align: center; margin-top: 20vh; color: var(--text-muted); width: 100%; }
        #featured-content { width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s ease; }
    </style>
</head>
<body>

    <header>
        <h1>Elva Valla Kultuur</h1>
        <div class="clock" id="clock">00:00</div>
    </header>

    <div id="status-container" class="status-message">Laen andmeid Kultuuriaknast...</div>

    <div class="layout" id="main-layout" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">Sündmuste voog</div>
            <div class="scroll-container" id="scroll-container">
                <div class="scroll-content" id="scroll-content"></div>
            </div>
        </div>

        <div class="featured" id="featured-box">
            <div id="featured-content"></div>
        </div>
    </div>

    <script>
        const KULTUURIAKEN_URL = "https://kultuuriaken.tartu.ee/et/syndmused?regions=788&categories=1%7C2%7C3%7C4%7C5%7C6%7C7%7C8%7C9%7C10%7C11%7C12%7C13%7C14%7C15%7C16%7C59%7C60%7C61%7C62%7C63%7C64%7C65%7C17%7C18%7C19%7C20%7C21%7C22%7C85%7C23%7C35%7C87%7C88%7C24&starting_time=5";
        
        let globalEvents = [];
        let currentFeaturedIndex = 0;

        async function fetchWithProxy(url) {
            const encodedUrl = encodeURIComponent(url);
            const proxies = [
                `https://corsproxy.io/?${encodedUrl}`,
                `https://api.allorigins.win/raw?url=${encodedUrl}`
            ];
            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy);
                    if (response.ok) return await response.text();
                } catch (e) {}
            }
            throw new Error("Proxy viga.");
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('et-EE', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderSidebar() {
            const scrollContent = document.getElementById('scroll-content');
            scrollContent.innerHTML = ''; 
            globalEvents.forEach((row, index) => {
                const item = document.createElement('div');
                item.className = `list-item ${index === 0 ? 'active' : ''}`;
                item.id = `list-item-${index}`;
                const fallbackImg = 'https://dummyimage.com/150x150/161b22/58a6ff.png&text=+';
                const imageUrl = row['Plakat (URL)'] || fallbackImg;
                item.innerHTML = `
                    <img src="${imageUrl}" class="list-thumb" onerror="this.src='${fallbackImg}';">
                    <div class="list-text-content">
                        <div class="list-date">${row['Kuupäev']}</div>
                        <div class="list-title">${row.Nimi}</div>
                        <div class="list-loc">📍 ${row.Koht}</div>
                    </div>
                `;
                scrollContent.appendChild(item);
            });
        }

        function updateFeaturedEvent() {
            const event = globalEvents[currentFeaturedIndex];
            if (!event) return;

            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.getElementById(`list-item-${currentFeaturedIndex}`);
            if (activeItem) activeItem.classList.add('active');

            const contentEl = document.getElementById('featured-content');
            contentEl.style.opacity = 0;
            
            setTimeout(() => {
                const fallbackImg = 'https://dummyimage.com/1200x800/161b22/58a6ff.png&text=Kultuuris%C3%BCndmus';
                const imageUrl = event['Plakat (URL)'] || fallbackImg;
                const qrUrl = event.EventUrl || 'https://kultuuriaken.tartu.ee';

                contentEl.innerHTML = `
                    <img src="${imageUrl}" class="feat-bg-blur" onerror="this.src='${fallbackImg}';">
                    <div class="feat-poster-main">
                        <img src="${imageUrl}" alt="Plakat" onerror="this.src='${fallbackImg}';">
                    </div>
                    <div class="feat-overlay">
                        <div class="feat-content-wrapper">
                            <div class="feat-text">
                                <div class="feat-date">${event['Kuupäev']}</div>
                                <h2 class="feat-title">${event.Nimi}</h2>
                                <div class="feat-loc">📍 ${event.Koht}</div>
                                <div class="feat-desc">${event.Kirjeldus}</div>
                            </div>
                            <div class="qr-container">
                                <div class="qr-label">INFO JA<br>PILETID</div>
                                <div class="qr-code-box" id="qr-feat"></div>
                            </div>
                        </div>
                    </div>
                `;
                
                new QRCode(document.getElementById(`qr-feat`), {
                    text: qrUrl, width: 110, height: 110, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M
                });

                contentEl.style.opacity = 1;
            }, 400); 
        }

        async function loadEvents() {
            try {
                const htmlText = await fetchWithProxy(KULTUURIAKEN_URL);
                const doc = new DOMParser().parseFromString(htmlText, "text/html");
                const rows = doc.querySelectorAll('.views-row, article, .event-item');
                
                globalEvents = Array.from(rows).map(row => {
                    const titleNode = row.querySelector('h2 a, h3 a, .title a, a[href*="/syndmus/"]');
                    if (!titleNode) return null;

                    const title = titleNode.innerText.trim();
                    let eventUrl = titleNode.getAttribute('href');
                    if (eventUrl && eventUrl.startsWith('/')) eventUrl = 'https://kultuuriaken.tartu.ee' + eventUrl;

                    const imgNode = row.querySelector('img');
                    let imgUrl = imgNode ? (imgNode.getAttribute('data-src') || imgNode.getAttribute('src')) : '';
                    if (imgUrl && imgUrl.startsWith('/')) imgUrl = 'https://kultuuriaken.tartu.ee' + imgUrl;

                    const dateNode = row.querySelector('.views-field-field-event-date, .date, time');
                    const dateText = dateNode ? dateNode.innerText.trim() : 'Kuupäev täpsustamisel';

                    const locNode = row.querySelector('.views-field-field-place, .location');
                    const locText = locNode ? locNode.innerText.trim() : 'Elva vald';

                    const descNode = row.querySelector('.views-field-body, .description, p');
                    const descText = descNode ? descNode.innerText.trim() : '';

                    return { Nimi: title, Kuupäev: dateText, Koht: locText, Kirjeldus: descText, 'Plakat (URL)': imgUrl, EventUrl: eventUrl };
                }).filter(i => i && i.Nimi);

                if (globalEvents.length > 0) {
                    document.getElementById('status-container').style.display = 'none';
                    document.getElementById('main-layout').style.display = 'flex';
                    renderSidebar();
                    updateFeaturedEvent();
                    startAutoScroll();
                }
            } catch (e) {
                document.getElementById('status-container').innerText = "Viga andmete laadimisel.";
            }
        }

        let scrollPos = 0;
        let isScrolling = true;

        function scrollLoop() {
            if (!isScrolling) return;
            const container = document.getElementById('scroll-container');
            scrollPos += 0.5;
            container.scrollTop = scrollPos;

            const triggerY = container.scrollTop + (container.clientHeight * 0.5);
            const items = document.querySelectorAll('.list-item');
            let closestIdx = currentFeaturedIndex;
            let minDist = Infinity;

            items.forEach((item, idx) => {
                const dist = Math.abs((item.offsetTop + item.offsetHeight/2) - triggerY);
                if (dist < minDist) { minDist = dist; closestIdx = idx; }
            });

            if (closestIdx !== currentFeaturedIndex) {
                currentFeaturedIndex = closestIdx;
                updateFeaturedEvent();
            }

            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 2) {
                isScrolling = false;
                setTimeout(() => {
                    container.scrollTo({ top: 0, behavior: 'smooth' });
                    currentFeaturedIndex = 0;
                    updateFeaturedEvent();
                    setTimeout(() => { scrollPos = 0; isScrolling = true; requestAnimationFrame(scrollLoop); }, 2000);
                }, 3000);
                return;
            }
            requestAnimationFrame(scrollLoop);
        }

        function startAutoScroll() { requestAnimationFrame(scrollLoop); }

        loadEvents();
        setInterval(() => window.location.reload(), 30 * 60 * 1000);
    </script>
</body>
</html>

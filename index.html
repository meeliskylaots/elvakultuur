<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const ROTATE_INTERVAL = 30000;
    const RELOAD_INTERVAL = 30 * 60 * 1000;
    const DEFAULT_URL = "https://kultuuriaken.tartu.ee/et/syndmused";
    const PLACEHOLDER = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect width="100%" height="100%" fill="#05080a"/><text x="50%" y="50%" font-family="Arial" font-size="40" fill="#1d71d4" text-anchor="middle">ELVA</text></svg>')}`;

    let events = [];
    let currentIndex = 0;
    let rotateHandle = null;

    function updateClock() {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('et-EE', {
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    setInterval(updateClock, 1000);
    updateClock();

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatEstonianDate(iso, fallback) {
        if (!iso) return fallback || '';

        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return fallback || '';

        const days = ['Pühapäev', 'Esmaspäev', 'Teisipäev', 'Kolmapäev', 'Neljapäev', 'Reede', 'Laupäev'];
        const months = ['jaanuar', 'veebruar', 'märts', 'aprill', 'mai', 'juuni', 'juuli', 'august', 'september', 'oktoober', 'november', 'detsember'];

        return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()} | kell ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    function cleanLocation(value) {
        if (!value) return "Elva vald";

        const cleaned = String(value)
            .replace(/Elva vald|Elva|Tartu maakond/gi, "")
            .replace(/,?\s*,/g, ",")
            .trim()
            .replace(/^,|,$/g, "")
            .trim();

        return cleaned || "Elva vald";
    }

    function safeUrl(value) {
        const url = String(value || '').trim();
        return /^https?:\/\//i.test(url) ? url : DEFAULT_URL;
    }

    function resetRotation() {
        if (rotateHandle) clearInterval(rotateHandle);
        rotateHandle = setInterval(nextEvent, ROTATE_INTERVAL);
    }

    async function loadData() {
        const loader = document.getElementById('loader');
        const appMain = document.getElementById('app-main');

        try {
            const res = await fetch(`${SCRIPT_URL}?t=${Date.now()}`, {
                cache: 'no-store'
            });

            if (!res.ok) {
                throw new Error(`HTTP ${res.status}`);
            }

            const data = await res.json();

            if (!data || data.ok !== true) {
                throw new Error(data?.error || 'Backend error');
            }

            const raw = Array.isArray(data.events) ? data.events : [];

            events = raw
                .filter(e => e && e.title)
                .map(e => ({
                    title: e.title || 'Pealkiri puudub',
                    date: formatEstonianDate(e.startIso, e.date || ''),
                    loc: cleanLocation(e.loc || e.asutus || 'Elva vald'),
                    desc: e.desc || 'Täpsem info Elva valla sündmustekalendris.',
                    img: e.img || PLACEHOLDER,
                    url: safeUrl(e.url)
                }));

            if (events.length === 0) {
                loader.textContent = 'SÜNDMUSI EI LEITUD';
                return;
            }

            loader.style.display = 'none';
            appMain.style.display = 'flex';

            renderTicker();
            showEvent(0, true);
            resetRotation();
        } catch (err) {
            console.error(err);
            loader.textContent = 'VIGA LAADIMISEL';
        }
    }

    function renderTicker() {
        document.getElementById('ticker-scroll').innerHTML = events.map((ev, i) => `
            <div class="event-card" id="card-${i}" onclick="showEvent(${i})">
                <img src="${escapeHtml(ev.img)}" class="event-card-img" onerror="this.src='${PLACEHOLDER}'" alt="">
                <div class="event-card-info">
                    <div class="event-card-date">${escapeHtml((ev.date || '').split('|')[0].trim())}</div>
                    <div class="event-card-title">${escapeHtml(ev.title)}</div>
                    <div class="event-card-loc">${escapeHtml(ev.loc)}</div>
                </div>
            </div>
        `).join('');
    }

    function startProgressBar() {
        const progressBar = document.getElementById('progress-bar');
        progressBar.style.animation = 'none';
        progressBar.offsetHeight;
        progressBar.style.animation = `progress ${ROTATE_INTERVAL}ms linear forwards`;
    }

    function showEvent(index, keepExistingRotation = false) {
        if (!events.length) return;

        currentIndex = index;
        const ev = events[index];
        const inner = document.getElementById('hero-inner');

        if (!keepExistingRotation) {
            resetRotation();
        }

        document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));

        const card = document.getElementById(`card-${index}`);
        if (card) {
            card.classList.add('active');
            const ticker = document.getElementById('ticker-scroll');
            ticker.scrollTo({
                left: card.offsetLeft - (ticker.clientWidth / 2) + (card.clientWidth / 2),
                behavior: 'smooth'
            });
        }

        startProgressBar();

        inner.style.opacity = 0;
        setTimeout(() => {
            inner.innerHTML = `
                <div class="hero-info">
                    <div class="hero-meta-top">
                        <div class="hero-date">${escapeHtml(ev.date)}</div>
                        <h2 class="hero-title">${escapeHtml(ev.title)}</h2>
                        <div class="hero-loc">${escapeHtml(ev.loc)}</div>
                        <div class="hero-desc-container">
                            <div class="hero-desc" id="hero-desc">${escapeHtml(ev.desc)}</div>
                        </div>
                    </div>
                </div>
                <div class="hero-visual">
                    <img src="${escapeHtml(ev.img)}" class="hero-image" onerror="this.src='${PLACEHOLDER}'" alt="">
                </div>
            `;

            const qr = document.getElementById("qr-target");
            qr.innerHTML = "";
            new QRCode(qr, {
                text: ev.url,
                width: 65,
                height: 65,
                colorDark: "#000",
                colorLight: "#fff",
                correctLevel: QRCode.CorrectLevel.H
            });

            setTimeout(() => {
                const d = document.getElementById('hero-desc');
                if (!d || !d.parentElement) return;

                d.style.animation = 'none';
                d.style.transform = 'translateY(0)';

                const dist = d.parentElement.clientHeight - d.scrollHeight;
                if (dist < 0) {
                    d.style.setProperty('--scroll-dist', `${dist}px`);
                    d.style.animation = `scrollDescription ${ROTATE_INTERVAL}ms linear forwards`;
                }
            }, 300);

            inner.style.opacity = 1;
        }, 300);
    }

    function nextEvent() {
        if (!events.length) return;
        currentIndex = (currentIndex + 1) % events.length;
        showEvent(currentIndex, true);
    }

    loadData();
    setInterval(() => window.location.reload(), RELOAD_INTERVAL);
</script>

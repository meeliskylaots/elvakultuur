<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan - Portree</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --elva-blue: #1d71d4;
            --bg: #010204;
            --text: #ffffff;
            --border: rgba(255,255,255,0.06);
            --header-h: 100px;
            --ticker-h: 180px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(29, 113, 212, 0.1), transparent 50%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-title { font-size: 1.4rem; font-weight: 300; text-transform: uppercase; letter-spacing: 5px; }
        .clock { font-size: 2.2rem; font-weight: 700; opacity: 0.9; }

        .app-content { flex: 1; display: flex; flex-direction: column; min-height: 0; }

        .hero { flex: 1; display: flex; flex-direction: column; position: relative; min-height: 0; }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background: var(--elva-blue);
            width: 0;
            z-index: 100;
        }

        #hero-inner { 
            display: flex; 
            flex-direction: column;
            width: 100%; 
            height: 100%; 
            transition: opacity 0.6s ease; 
            opacity: 0; 
        }

        /* PÜSTINE: Pilt võtab ülemise osa */
        .hero-visual { 
            height: 45%; 
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 2px solid var(--elva-blue);
        }

        .hero-image { width: 100%; height: 100%; object-fit: cover; }

        /* Info osa */
        .hero-info { 
            flex: 1;
            padding: 50px; 
            display: flex; 
            flex-direction: column; 
            min-height: 0;
        }

        .hero-date { 
            font-size: 1.2rem; 
            font-weight: 800; 
            color: var(--elva-blue); 
            text-transform: uppercase; 
            margin-bottom: 15px;
        }

        .hero-title { 
            font-size: 3.5rem; 
            font-weight: 900; 
            line-height: 1.1; 
            margin-bottom: 20px;
        }
        
        .hero-loc { 
            font-size: 1.6rem; 
            font-weight: 700; 
            color: #4ade80; 
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .hero-loc::before { content: "📍"; }

        .hero-desc-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        .hero-desc {
            font-size: 1.4rem;
            line-height: 1.6;
            color: #cbd5e1;
            position: absolute;
            top: 0;
            width: 100%;
            padding-bottom: 100px;
            white-space: pre-wrap;
            will-change: transform;
        }

        /* Alumine sündmuste riba */
        .bottom-section { 
            height: var(--ticker-h); 
            display: flex; 
            padding: 30px 50px; 
            background: rgba(255,255,255,0.02);
            border-top: 1px solid var(--border);
            align-items: center; 
            gap: 40px;
        }

        .ticker-area { flex: 1; min-width: 0; }
        .ticker-scroll { 
            display: flex; 
            gap: 25px; 
            overflow-x: auto; 
            scrollbar-width: none; 
            height: 120px; 
            align-items: center; 
            scroll-behavior: smooth;
        }
        .ticker-scroll::-webkit-scrollbar { display: none; }

        .event-card { 
            flex: 0 0 380px; 
            height: 110px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            gap: 20px; 
        }
        .event-card.active { border-color: var(--elva-blue); background: rgba(29, 113, 212, 0.1); }
        .event-card-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .event-card-info { flex: 1; overflow: hidden; }
        .event-card-date { font-size: 0.8rem; font-weight: 800; color: var(--elva-blue); text-transform: uppercase; }
        .event-card-title { font-size: 1.1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

        .qr-area { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 25px;
        }
        .qr-text { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; text-align: right; line-height: 1.2; }
        .qr-code-box { background: #fff; padding: 6px; border-radius: 10px; display: flex; }

        .loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 200; font-weight: 300; letter-spacing: 8px; font-size: 1.5rem; text-align: center; }

        @keyframes scrollDescription {
            0% { transform: translateY(0); }
            10% { transform: translateY(0); }
            90% { transform: translateY(var(--scroll-dist)); }
            100% { transform: translateY(var(--scroll-dist)); }
        }

        @keyframes progress { 0% { width: 0; } 100% { width: 100%; } }
    </style>
</head>
<body>

<div id="loader" class="loader">ELVA KULTUURIEKRAAN</div>

<header>
    <h1 class="header-title">Sündmused Elva vallas</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<main class="app-content" id="app-main" style="display:none;">
    <section class="hero">
        <div class="progress-bar" id="progress-bar"></div>
        <div id="hero-inner"></div>
    </section>

    <div class="bottom-section">
        <div class="ticker-area">
            <div class="ticker-scroll" id="ticker-scroll"></div>
        </div>
        <div class="qr-area">
            <div class="qr-text">Loe lähemalt<br>ja osta pilet</div>
            <div class="qr-code-box" id="qr-target"></div>
        </div>
    </div>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const ROTATE_INTERVAL = 30000;
    const PLACEHOLDER = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect width="100%" height="100%" fill="#05080a"/><text x="50%" y="50%" font-family="Arial" font-size="40" fill="#1d71d4" text-anchor="middle">ELVA</text></svg>')}`;

    let events = [];
    let currentIndex = 0;
    let rotateHandle = null;

    function updateClock() {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('et-EE', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000); updateClock();

    function escapeHtml(t) { return String(t ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function formatEstonianDate(iso, fallback) {
        if (!iso) return fallback;
        try {
            const d = new Date(iso);
            const days = ['Pühapäev', 'Esmaspäev', 'Teisipäev', 'Kolmapäev', 'Neljapäev', 'Reede', 'Laupäev'];
            const months = ['jaanuar', 'veebruar', 'märts', 'aprill', 'mai', 'juuni', 'juuli', 'august', 'september', 'oktoober', 'november', 'detsember'];
            return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]} | kell ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        } catch (e) { return fallback; }
    }

    function cleanLocation(t) {
        if (!t) return "Elva vald";
        let loc = t.replace(/Elva vald|Elva|Tartu maakond/gi, "").replace(/,?\s*,/g, ",").trim();
        return loc.replace(/^,|,$/g, "").trim() || "Elva vald";
    }

    async function loadData() {
        const loader = document.getElementById('loader');
        try {
            const ts = Date.now();
            const res = await fetch(`${SCRIPT_URL}?refresh=1&t=${ts}`, { cache: 'no-store' });
            const data = await res.json();
            const raw = data.events || [];

            if (raw.length > 0) {
                events = raw.filter(e => e && e.title).map(e => ({
                    title: e.title, 
                    date: formatEstonianDate(e.startIso, e.date),
                    loc: cleanLocation(e.loc || e.asutus),
                    desc: e.desc || "Täpsem info Elva valla sündmustekalendris.",
                    img: e.img || PLACEHOLDER, 
                    url: e.url || "https://elva.ee"
                }));

                loader.style.display = 'none';
                document.getElementById('app-main').style.display = 'flex';
                renderTicker();
                showEvent(0);
                if (rotateHandle) clearInterval(rotateHandle);
                rotateHandle = setInterval(nextEvent, ROTATE_INTERVAL);
            } else {
                loader.innerHTML = `SÜNDMUSI EI LEITUD`;
            }
        } catch (err) { 
            loader.textContent = "VIGA LAADIMISEL"; 
        }
    }

    function renderTicker() {
        document.getElementById('ticker-scroll').innerHTML = events.map((ev, i) => `
            <div class="event-card" id="card-${i}" onclick="showEvent(${i})">
                <img src="${escapeHtml(ev.img)}" class="event-card-img" onerror="this.src='${PLACEHOLDER}'">
                <div class="event-card-info">
                    <div class="event-card-date">${escapeHtml((ev.date || '').split('|')[0])}</div>
                    <div class="event-card-title">${escapeHtml(ev.title)}</div>
                </div>
            </div>
        `).join('');
    }

    function showEvent(index) {
        currentIndex = index;
        const ev = events[index];
        const inner = document.getElementById('hero-inner');
        const progressBar = document.getElementById('progress-bar');

        document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
        const card = document.getElementById(`card-${index}`);
        if (card) { 
            card.classList.add('active');
            const ticker = document.getElementById('ticker-scroll');
            ticker.scrollTo({ left: card.offsetLeft - (ticker.clientWidth / 2) + (card.clientWidth / 2), behavior: 'smooth' });
        }

        progressBar.style.animation = 'none';
        progressBar.offsetHeight; 
        progressBar.style.animation = `progress ${ROTATE_INTERVAL}ms linear forwards`;

        inner.style.opacity = 0;
        setTimeout(() => {
            inner.innerHTML = `
                <div class="hero-visual">
                    <img src="${escapeHtml(ev.img)}" class="hero-image" onerror="this.src='${PLACEHOLDER}'">
                </div>
                <div class="hero-info">
                    <div class="hero-date">${escapeHtml(ev.date)}</div>
                    <h2 class="hero-title">${escapeHtml(ev.title)}</h2>
                    <div class="hero-loc">${escapeHtml(ev.loc)}</div>
                    <div class="hero-desc-container"><div class="hero-desc" id="hero-desc">${escapeHtml(ev.desc)}</div></div>
                </div>
            `;
            
            const qr = document.getElementById("qr-target");
            qr.innerHTML = "";
            new QRCode(qr, { text: ev.url, width: 90, height: 90, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.H });

            setTimeout(() => {
                const d = document.getElementById('hero-desc');
                const dist = d.parentElement.clientHeight - d.scrollHeight;
                if (dist < 0) {
                    d.style.setProperty('--scroll-dist', `${dist}px`);
                    d.style.animation = `scrollDescription ${ROTATE_INTERVAL}ms linear forwards`;
                }
            }, 500);
            inner.style.opacity = 1;
        }, 400);
    }

    function nextEvent() { if (events.length > 0) { currentIndex = (currentIndex + 1) % events.length; showEvent(currentIndex); } }

    loadData();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

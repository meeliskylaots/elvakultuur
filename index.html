<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --elva-blue: #1d71d4;
            --bg: #010204;
            --text: #ffffff;
            --muted: #64748b;
            --border: rgba(255,255,255,0.06);
            --header-h: 60px;
            --ticker-h: 110px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 0%, rgba(29, 113, 212, 0.05), transparent 40%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-title { font-size: 1rem; font-weight: 300; text-transform: uppercase; letter-spacing: 3px; }
        .clock { font-size: 1.4rem; font-weight: 700; opacity: 0.9; }

        .app-content { flex: 1; padding: 15px 30px; display: flex; flex-direction: column; gap: 15px; min-height: 0; }

        .hero {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            min-height: 0;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--elva-blue);
            width: 0;
            z-index: 10;
        }

        #hero-inner { display: flex; width: 100%; height: 100%; transition: opacity 0.4s ease; opacity: 0; }

        .hero-info { flex: 1.2; padding: 30px; display: flex; flex-direction: column; min-width: 0; }
        .hero-meta-top { display: flex; flex-direction: column; gap: 8px; height: 100%; }
        .hero-date { font-size: 0.85rem; font-weight: 800; color: var(--elva-blue); text-transform: uppercase; letter-spacing: 1.5px; }
        .hero-title { font-size: 1.8rem; font-weight: 900; line-height: 1.1; margin-bottom: 2px; }
        .hero-loc { font-size: 1.1rem; font-weight: 700; color: #4ade80; margin-bottom: 12px; }

        .hero-desc-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
        }

        .hero-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: #cbd5e1;
            position: absolute;
            top: 0;
            width: 100%;
            padding-bottom: 80px;
            white-space: pre-wrap;
            will-change: transform;
        }

        .hero-visual { flex: 0.8; padding: 15px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); }
        .hero-image { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }

        .bottom-section { height: var(--ticker-h); display: flex; gap: 15px; padding: 0 30px 10px 30px; align-items: center; flex-shrink: 0; }
        .ticker-area { flex: 1; min-width: 0; height: 100%; display: flex; align-items: center; }
        .ticker-scroll { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; height: 90px; align-items: center; scroll-behavior: smooth; width: 100%; }
        .ticker-scroll::-webkit-scrollbar { display: none; }

        .event-card { flex: 0 0 280px; height: 85px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; padding: 8px; gap: 12px; transition: all 0.35s ease; cursor: pointer; }
        .event-card.active { border-color: var(--elva-blue); background: rgba(29, 113, 212, 0.1); }
        .event-card-img { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .event-card-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 2px; }
        .event-card-date { font-size: 0.55rem; font-weight: 800; color: var(--elva-blue); text-transform: uppercase; }
        .event-card-title { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .event-card-loc { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .qr-area { width: 200px; height: 85px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; padding: 10px; gap: 10px; flex-shrink: 0; }
        .qr-text { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; line-height: 1.2; color: #fff; text-align: right; flex: 1; }
        .qr-code-box { background: #fff; padding: 4px; border-radius: 5px; display: flex; min-width: 65px; min-height: 65px; align-items: center; justify-content: center; }

        .loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 200; font-weight: 300; letter-spacing: 4px; font-size: 0.9rem; }

        @keyframes scrollDescription {
            0% { transform: translateY(0); }
            10% { transform: translateY(0); }
            90% { transform: translateY(var(--scroll-dist)); }
            100% { transform: translateY(var(--scroll-dist)); }
        }

        @keyframes progress { 0% { width: 0; } 100% { width: 100%; } }
    </style>
</head>
<body>

<div id="loader" class="loader">ELVA VALLA SÜNDMUSED</div>

<header>
    <h1 class="header-title">Elva valla sündmused</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<main class="app-content" id="app-main" style="display:none;">
    <section class="hero">
        <div class="progress-bar" id="progress-bar"></div>
        <div id="hero-inner"></div>
    </section>

    <div class="bottom-section">
        <div class="ticker-area">
            <div class="ticker-scroll" id="ticker-scroll"></div>
        </div>
        <div class="qr-area">
            <div class="qr-text">Loe lähemalt<br>ja osta pilet</div>
            <div class="qr-code-box" id="qr-target"></div>
        </div>
    </div>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const ROTATE_INTERVAL = 30000;
    const PLACEHOLDER = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect width="100%" height="100%" fill="#05080a"/><text x="50%" y="50%" font-family="Arial" font-size="40" fill="#1d71d4" text-anchor="middle">ELVA</text></svg>')}`;

    let events = [];
    let currentIndex = 0;
    let rotateHandle = null;

    function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('et-EE', { hour: '2-digit', minute: '2-digit' }); }
    setInterval(updateClock, 1000); updateClock();

    function escapeHtml(t) { return String(t ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function formatEstonianDate(iso, fallback) {
        if (!iso) return fallback;
        try {
            const d = new Date(iso);
            const days = ['Pühapäev', 'Esmaspäev', 'Teisipäev', 'Kolmapäev', 'Neljapäev', 'Reede', 'Laupäev'];
            const months = ['jaanuar', 'veebruar', 'märts', 'aprill', 'mai', 'juuni', 'juuli', 'august', 'september', 'oktoober', 'november', 'detsember'];
            return `${days[d.getDay()]}, ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()} | kell ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        } catch (e) { return fallback; }
    }

    function cleanLocation(t) {
        if (!t) return "Elva vald";
        return t.replace(/Elva vald|Elva|Tartu maakond/gi, "").replace(/,?\s*,/g, ",").trim().replace(/^,|,$/g, "") || "Elva vald";
    }

    async function loadData() {
        const loader = document.getElementById('loader');
        try {
            const ts = Date.now();
            const res = await fetch(`${SCRIPT_URL}?refresh=1&t=${ts}`, { cache: 'no-store' });
            const data = await res.json();
            const raw = data.events || [];

            events = raw.filter(e => e && e.title).map(e => ({
                title: e.title, 
                date: formatEstonianDate(e.startIso, e.date),
                loc: cleanLocation(e.loc || e.asutus),
                desc: e.desc || "Täpsem info Elva valla sündmustekalendris.",
                img: e.img || PLACEHOLDER, 
                url: e.url || "https://elva.ee"
            }));

            if (events.length > 0) {
                loader.style.display = 'none';
                document.getElementById('app-main').style.display = 'flex';
                renderTicker();
                showEvent(0);
                if (rotateHandle) clearInterval(rotateHandle);
                rotateHandle = setInterval(nextEvent, ROTATE_INTERVAL);
            } else { loader.textContent = "SÜNDMUSI EI LEITUD"; }
        } catch (err) { loader.textContent = "VIGA LAADIMISEL"; }
    }

    function renderTicker() {
        document.getElementById('ticker-scroll').innerHTML = events.map((ev, i) => `
            <div class="event-card" id="card-${i}" onclick="showEvent(${i})">
                <img src="${escapeHtml(ev.img)}" class="event-card-img" onerror="this.src='${PLACEHOLDER}'">
                <div class="event-card-info">
                    <div class="event-card-date">${escapeHtml(ev.date.split('|')[0])}</div>
                    <div class="event-card-title">${escapeHtml(ev.title)}</div>
                    <div class="event-card-loc">${escapeHtml(ev.loc)}</div>
                </div>
            </div>
        `).join('');
    }

    function showEvent(index) {
        currentIndex = index;
        const ev = events[index];
        const inner = document.getElementById('hero-inner');
        const progressBar = document.getElementById('progress-bar');

        document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
        const card = document.getElementById(`card-${index}`);
        if (card) { 
            card.classList.add('active');
            const ticker = document.getElementById('ticker-scroll');
            ticker.scrollTo({ left: card.offsetLeft - (ticker.clientWidth / 2) + (card.clientWidth / 2), behavior: 'smooth' });
        }

        progressBar.style.animation = 'none';
        progressBar.offsetHeight; 
        progressBar.style.animation = `progress ${ROTATE_INTERVAL}ms linear forwards`;

        inner.style.opacity = 0;
        setTimeout(() => {
            inner.innerHTML = `
                <div class="hero-info">
                    <div class="hero-meta-top">
                        <div class="hero-date">${escapeHtml(ev.date)}</div>
                        <h2 class="hero-title">${escapeHtml(ev.title)}</h2>
                        <div class="hero-loc">${escapeHtml(ev.loc)}</div>
                        <div class="hero-desc-container"><div class="hero-desc" id="hero-desc">${escapeHtml(ev.desc)}</div></div>
                    </div>
                </div>
                <div class="hero-visual"><img src="${escapeHtml(ev.img)}" class="hero-image" onerror="this.src='${PLACEHOLDER}'"></div>
            `;
            const qr = document.getElementById("qr-target");
            qr.innerHTML = "";
            new QRCode(qr, { text: ev.url, width: 65, height: 65, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.H });

            setTimeout(() => {
                const d = document.getElementById('hero-desc');
                const dist = d.parentElement.clientHeight - d.scrollHeight;
                if (dist < 0) {
                    d.style.setProperty('--scroll-dist', `${dist}px`);
                    d.style.animation = `scrollDescription ${ROTATE_INTERVAL}ms linear forwards`;
                }
            }, 300);
            inner.style.opacity = 1;
        }, 300);
    }

    function nextEvent() { if (events.length > 0) { currentIndex = (currentIndex + 1) % events.length; showEvent(currentIndex); } }
    loadData();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

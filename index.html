<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elva Valla Kultuuriekraan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border-color: #30363d;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        header {
            background-color: rgba(13, 17, 23, 0.98);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            position: fixed;
            top: 0;
            width: 100%;
            height: 90px;
            box-sizing: border-box;
            z-index: 100;
        }
        
        h1 { margin: 0; font-weight: 900; font-size: 2.2rem; text-transform: uppercase; color: #ffffff; }
        .clock { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
        
        .layout {
            display: flex;
            height: calc(100vh - 90px);
            margin-top: 90px;
            padding: 25px;
            gap: 25px;
            box-sizing: border-box;
        }
        
        /* VASAK PANEEL */
        .sidebar {
            width: 35%;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .sidebar-header {
            padding: 20px;
            background: #10141a;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
        }

        .scroll-container {
            flex: 1;
            overflow-y: hidden;
            position: relative;
        }

        .scroll-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 12px;
            border-left: 5px solid transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
        }

        .list-item.active {
            background: rgba(88, 166, 255, 0.15);
            border-left-color: var(--accent);
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .list-thumb {
            width: 75px;
            height: 75px;
            border-radius: 10px;
            object-fit: cover;
            background-color: #000;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .list-text-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
        }

        .list-date { font-size: 0.85rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .list-title { font-size: 1.1rem; font-weight: 700; color: #fff; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-loc { font-size: 0.8rem; color: var(--text-muted); }

        /* PAREM PANEEL - TÄISALA PLAKAT */
        .featured {
            width: 65%;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }
        
        .feat-bg-blur {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: blur(50px) brightness(0.3);
            object-fit: cover;
            transform: scale(1.2);
        }

        .feat-poster-main {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 200px; /* Jätab ruumi alumisele infole */
            box-sizing: border-box;
        }

        .feat-poster-main img {
            max-width: 95%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }

        .feat-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 3;
            padding: 40px 50px;
            background: linear-gradient(to top, rgba(13,17,23,1) 0%, rgba(13,17,23,0.95) 70%, rgba(13,17,23,0) 100%);
            box-sizing: border-box;
        }

        .feat-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 30px;
        }
        
        .feat-text-wrap { flex: 1; }
        .feat-date { color: var(--accent); font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; }
        .feat-title { font-size: 2.8rem; margin: 0 0 10px 0; font-weight: 900; line-height: 1.1; color: #ffffff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .feat-loc { font-size: 1.3rem; color: #e6edf3; margin-bottom: 10px; display: flex; align-items: center; font-weight: 600; }
        .feat-desc { font-size: 1.15rem; line-height: 1.4; opacity: 0.8; color: #c9d1d9; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .qr-card {
            background: rgba(33, 38, 45, 0.95);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }
        
        .qr-label { font-size: 0.75rem; font-weight: 900; color: white; text-transform: uppercase; text-align: center; }
        .qr-target { background: white; padding: 6px; border-radius: 6px; }

        .status-msg { font-size: 2rem; text-align: center; margin-top: 35vh; color: var(--text-muted); width: 100%; padding: 0 40px;}
        #featured-inner { width: 100%; height: 100%; opacity: 0; transition: opacity 0.6s ease; }
    </style>
</head>
<body>

    <header>
        <h1>Elva Valla Kultuur</h1>
        <div class="clock" id="clock">00:00</div>
    </header>

    <div id="loader" class="status-msg">Laen andmeid Kultuuriaknast...</div>

    <div class="layout" id="main-ui" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">Sündmuste voog</div>
            <div class="scroll-container" id="scroll-container">
                <div class="scroll-content" id="scroll-list"></div>
            </div>
        </div>

        <div class="featured">
            <div id="featured-inner"></div>
        </div>
    </div>

    <script>
        // Sinu uus Kultuuriakna URL koos uuenenud filtritega (starting_time=4)
        const KULTUURIAKEN_URL = "https://kultuuriaken.tartu.ee/et/syndmused?categories=1%7C2%7C3%7C4%7C5%7C6%7C7%7C8%7C9%7C10%7C11%7C12%7C13%7C14%7C15%7C16%7C59%7C60%7C61%7C62%7C63%7C64%7C65%7C17%7C18%7C19%7C20%7C21%7C22%7C85%7C23%7C35%7C87%7C88%7C24&starting_time=4&regions=788";
        
        let allEvents = [];
        let activeIdx = -1;
        let isScrolling = true;
        let scrollY = 0;

        async function getHtml(url) {
            const encoded = encodeURIComponent(url);
            // Proovime mitut proxy-t sisu kättesaamiseks
            const proxies = [
                `https://corsproxy.io/?${encoded}`,
                `https://api.allorigins.win/get?url=${encoded}`,
                `https://api.codetabs.com/v1/proxy?quest=${encoded}`
            ];

            for (let p of proxies) {
                try {
                    console.log(`Proovin laadida läbi: ${p}`);
                    const res = await fetch(p);
                    if (!res.ok) continue;

                    if (p.includes('allorigins')) {
                        const json = await res.json();
                        if (json.contents) return json.contents;
                    } else {
                        const text = await res.text();
                        if (text && text.length > 500) return text;
                    }
                } catch (e) {
                    console.warn(`Proxy ebaõnnestus: ${p}`);
                }
            }
            throw new Error("Ükski proxy ei andnud vastust.");
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('et-EE', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderList() {
            const list = document.getElementById('scroll-list');
            list.innerHTML = '';
            allEvents.forEach((ev, i) => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.id = `ev-${i}`;
                const thumbFallback = 'https://dummyimage.com/150x150/161b22/58a6ff.png&text=+';
                const thumb = ev.img || thumbFallback;
                
                item.innerHTML = `
                    <img src="${thumb}" class="list-thumb" onerror="this.src='${thumbFallback}';">
                    <div class="list-text-content">
                        <div class="list-date">${ev.date}</div>
                        <div class="list-title">${ev.title}</div>
                        <div class="list-loc">📍 ${ev.loc}</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function switchFeatured(idx) {
            if (idx === activeIdx) return;
            activeIdx = idx;
            const ev = allEvents[idx];
            
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`ev-${idx}`)?.classList.add('active');

            const inner = document.getElementById('featured-inner');
            inner.style.opacity = 0;

            setTimeout(() => {
                const posterFallback = 'https://dummyimage.com/1200x800/161b22/58a6ff.png&text=Kultuuri%C3%BCritus';
                const poster = ev.img || posterFallback;
                const target = ev.url || 'https://kultuuriaken.tartu.ee';

                inner.innerHTML = `
                    <img src="${poster}" class="feat-bg-blur" onerror="this.src='${posterFallback}';">
                    <div class="feat-poster-main">
                        <img src="${poster}" alt="Plakat" onerror="this.src='${posterFallback}';">
                    </div>
                    <div class="feat-overlay">
                        <div class="feat-content">
                            <div class="feat-text-wrap">
                                <div class="feat-date">${ev.date}</div>
                                <h2 class="feat-title">${ev.title}</h2>
                                <div class="feat-loc">📍 ${ev.loc}</div>
                                <div class="feat-desc">${ev.desc}</div>
                            </div>
                            <div class="qr-card">
                                <div class="qr-label">INFO JA<br>PILETID</div>
                                <div class="qr-target" id="qr-box"></div>
                            </div>
                        </div>
                    </div>
                `;
                
                new QRCode(document.getElementById('qr-box'), {
                    text: target, width: 120, height: 120, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M
                });

                inner.style.opacity = 1;
            }, 400);
        }

        async function init() {
            try {
                const html = await getHtml(KULTUURIAKEN_URL);
                const doc = new DOMParser().parseFromString(html, "text/html");
                
                if (html.includes('Cloudflare') || html.includes('bot verification')) {
                    throw new Error("Sisu blokeeritud (bot verification).");
                }

                let nodes = Array.from(doc.querySelectorAll('.views-row, article, .event-item, .node--type-event'));
                
                if (nodes.length === 0) {
                    const links = Array.from(doc.querySelectorAll('a[href*="/syndmus/"]'));
                    const seen = new Set();
                    nodes = links.map(a => {
                        const container = a.closest('div, li, article');
                        if (container && !seen.has(container)) {
                            seen.add(container);
                            return container;
                        }
                        return null;
                    }).filter(n => n !== null);
                }

                allEvents = nodes.map(n => {
                    const tNode = n.querySelector('h2 a, h3 a, .title a, a[href*="/syndmus/"]');
                    if (!tNode) return null;

                    const title = tNode.innerText.trim();
                    let url = tNode.getAttribute('href');
                    if (url && url.startsWith('/')) url = 'https://kultuuriaken.tartu.ee' + url;

                    let img = '';
                    const imgNode = n.querySelector('img');
                    if (imgNode) {
                        img = imgNode.getAttribute('data-src') || 
                              imgNode.getAttribute('srcset')?.split(' ')[0] || 
                              imgNode.getAttribute('src') || '';
                        
                        if (img.startsWith('/')) img = 'https://kultuuriaken.tartu.ee' + img;
                        if (img.includes('.svg') || img.length < 15) img = '';
                    }

                    const dNode = n.querySelector('.views-field-field-event-date, .date, time, [class*="date"]');
                    const date = dNode ? dNode.innerText.trim().replace(/\s+/g, ' ') : 'Kuupäev puudub';

                    const lNode = n.querySelector('.views-field-field-place, .location, [class*="place"], [class*="location"]');
                    const loc = lNode ? lNode.innerText.trim() : 'Elva vald';

                    const bNode = n.querySelector('.views-field-body, .description, p, [class*="body"]');
                    const desc = bNode ? bNode.innerText.trim().substring(0, 200) + '...' : '';

                    return { title, date, loc, desc, img, url };
                }).filter(x => x && x.title && x.title.length > 3);

                if (allEvents.length > 0) {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                    renderList();
                    switchFeatured(0);
                    requestAnimationFrame(animateScroll);
                } else {
                    document.getElementById('loader').innerHTML = "Hetkel valitud filtritega sündmusi ei leitud.<br><span style='font-size:1.2rem; opacity:0.6;'>Proovi hiljem uuesti või muuda Kultuuriakna URL-i.</span>";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = `<span style="color: #ff6b6b;">Viga andmete laadimisel Kultuuriaknast.</span><br><span style="font-size:1rem; opacity:0.7;">${e.message}</span>`;
            }
        }

        function animateScroll() {
            if (!isScrolling) return;
            const container = document.getElementById('scroll-container');
            if (!container) return;

            scrollY += 0.5;
            container.scrollTop = scrollY;

            const mid = container.scrollTop + (container.clientHeight / 2);
            const items = document.querySelectorAll('.list-item');
            let bestIdx = 0;
            let bestDist = Infinity;

            items.forEach((it, i) => {
                const dist = Math.abs((it.offsetTop + it.offsetHeight / 2) - mid);
                if (dist < bestDist) { bestDist = dist; bestIdx = i; }
            });

            switchFeatured(bestIdx);

            if (container.scrollTop + container.clientHeight >= container.scrollHeight - 2) {
                isScrolling = false;
                setTimeout(() => {
                    container.scrollTo({ top: 0, behavior: 'smooth' });
                    scrollY = 0;
                    setTimeout(() => { isScrolling = true; requestAnimationFrame(animateScroll); }, 2000);
                }, 4000);
                return;
            }
            requestAnimationFrame(animateScroll);
        }

        init();
        setInterval(() => window.location.reload(), 30 * 60 * 1000);
    </script>
</body>
</html>

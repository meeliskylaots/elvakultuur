<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuur</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b1016;
            --panel: #131922;
            --panel-soft: rgba(19, 25, 34, 0.82);
            --text: #e8eef5;
            --muted: #9aa6b2;
            --accent: #69aefc;
            --border: rgba(255,255,255,0.06);
            --header-h: 60px;
            --ticker-h: 170px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(11, 16, 22, 0.94);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(105, 174, 252, 0.18);
            z-index: 50;
        }

        h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            color: #fff;
        }

        .clock {
            font-size: 1.45rem;
            font-weight: 800;
            color: var(--accent);
        }

        .app {
            height: calc(100vh - var(--header-h));
            margin-top: var(--header-h);
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 14px;
        }

        .hero {
            position: relative;
            flex: 1;
            min-height: 0;
            border-radius: 22px;
            overflow: hidden;
            background: #0f141b;
            border: 1px solid var(--border);
        }

        #hero-inner {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(10px) brightness(0.18);
            transform: scale(1.04);
            opacity: 0.18;
        }

        .hero-surface {
            position: absolute;
            inset: 0;
            display: flex;
            gap: 34px;
            align-items: center;
            padding: 34px 38px;
            background: linear-gradient(180deg, rgba(11,16,22,0.78) 0%, rgba(11,16,22,0.94) 100%);
        }

        .hero-text {
            flex: 1;
            min-width: 0;
            max-width: 58%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-date {
            color: var(--accent);
            font-size: 1.05rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .hero-title {
            margin: 0 0 14px 0;
            font-size: 2.5rem;
            line-height: 1.02;
            font-weight: 900;
            letter-spacing: -0.04em;
            color: #fff;
            text-wrap: balance;
        }

        .hero-loc {
            font-size: 1.08rem;
            font-weight: 600;
            color: #eef3f8;
            margin-bottom: 16px;
        }

        .hero-desc {
            font-size: 1.04rem;
            line-height: 1.6;
            color: #dce4ec;
            max-width: 95%;
            display: -webkit-box;
            -webkit-line-clamp: 10;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-side {
            width: 34%;
            min-width: 280px;
            max-width: 390px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .hero-poster {
            width: 100%;
            max-width: 360px;
            max-height: 460px;
            object-fit: contain;
            border-radius: 14px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.42);
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
        }

        .qr-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 6px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .qr-label {
            font-size: 0.5rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #d9e2eb;
            opacity: 0.85;
            line-height: 1.1;
        }

        .qr-canvas {
            background: #fff;
            padding: 3px;
            border-radius: 4px;
            line-height: 0;
        }

        .ticker {
            height: var(--ticker-h);
            border-radius: 18px;
            background: var(--panel-soft);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .ticker-header {
            padding: 10px 14px;
            font-size: 0.74rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .ticker-track {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

        .ticker-track::-webkit-scrollbar {
            display: none;
        }

        .ticker-row {
            display: flex;
            gap: 12px;
            padding: 12px;
            width: max-content;
            min-width: 100%;
        }

        .event-card {
            width: 300px;
            min-width: 300px;
            height: 112px;
            border-radius: 14px;
            background: rgba(255,255,255,0.025);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            transition: all 0.25s ease;
        }

        .event-card.active {
            background: rgba(105, 174, 252, 0.10);
            border-color: rgba(105, 174, 252, 0.24);
        }

        .event-thumb {
            width: 86px;
            height: 86px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            background: #000;
        }

        .event-meta {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .event-date {
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent);
            line-height: 1.2;
        }

        .event-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .event-loc {
            font-size: 0.72rem;
            color: var(--muted);
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .status-msg {
            font-size: 1.6rem;
            text-align: center;
            margin-top: 35vh;
            color: var(--muted);
        }

        @media (max-width: 1200px) {
            .hero-surface {
                padding: 24px 26px;
                gap: 22px;
            }

            .hero-title {
                font-size: 2rem;
            }

            .hero-desc {
                font-size: 0.95rem;
                -webkit-line-clamp: 8;
            }

            .hero-side {
                min-width: 220px;
            }

            .hero-poster {
                max-width: 280px;
                max-height: 360px;
            }

            .event-card {
                width: 270px;
                min-width: 270px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Elva Valla Kultuur</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<div id="loader" class="status-msg">Laen sündmusi...</div>

<div class="app" id="main-ui" style="display:none;">
    <section class="hero">
        <div id="hero-inner"></div>
    </section>

    <section class="ticker">
        <div class="ticker-header">Tulevased sündmused</div>
        <div class="ticker-track" id="ticker-track">
            <div class="ticker-row" id="ticker-row"></div>
        </div>
    </section>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const DISPLAY_MS = 20000;

    let allEvents = [];
    let activeIdx = -1;
    let autoAdvanceTimer = null;

    const PLACEHOLDER =
        "data:image/svg+xml;charset=UTF-8," +
        encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">' +
            '<rect width="100%" height="100%" fill="#131922"/>' +
            '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#69aefc" font-family="Arial" font-size="60" font-weight="700">Elva Kultuur</text>' +
            '</svg>'
        );

    function escapeHtml(v) {
        return String(v ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    async function fetchEvents() {
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(SCRIPT_URL)}&cache=${Date.now()}`;
        const res = await fetch(url);
        const json = await res.json();
        const data = JSON.parse(json.contents);
        return (Array.isArray(data) ? data : data.events || []).filter(e => e.title);
    }

    function updateClock() {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    setInterval(updateClock, 1000);
    updateClock();

    function renderTicker() {
        const row = document.getElementById("ticker-row");
        row.innerHTML = allEvents.map((ev, i) => `
            <div class="event-card" id="ev-${i}">
                <img src="${ev.img || PLACEHOLDER}" class="event-thumb" onerror="this.src='${PLACEHOLDER}'">
                <div class="event-meta">
                    <div class="event-date">${escapeHtml(ev.date)}</div>
                    <div class="event-title">${escapeHtml(ev.title)}</div>
                    <div class="event-loc">📍 ${escapeHtml(ev.loc || "Elva vald")}</div>
                </div>
            </div>
        `).join('');
    }

    function switchFeatured(idx) {
        if (idx === activeIdx || !allEvents[idx]) return;

        activeIdx = idx;
        const ev = allEvents[idx];

        document.querySelectorAll(".event-card").forEach(el => el.classList.remove("active"));
        document.getElementById(`ev-${idx}`)?.classList.add("active");

        const inner = document.getElementById("hero-inner");
        inner.style.opacity = 0;

        setTimeout(() => {
            const posterSrc = ev.img || PLACEHOLDER;

            inner.innerHTML = `
                <img src="${posterSrc}" class="hero-bg" onerror="this.src='${PLACEHOLDER}'">
                <div class="hero-surface">
                    <div class="hero-text">
                        <div class="hero-date">${escapeHtml(ev.date)}</div>
                        <h2 class="hero-title">${escapeHtml(ev.title)}</h2>
                        <div class="hero-loc">📍 ${escapeHtml(ev.loc || "Elva vald")}</div>
                        <div class="hero-desc">${escapeHtml(ev.desc || "Lisainfo saamiseks skaneeri QR-kood.")}</div>
                    </div>

                    <div class="hero-side">
                        <img src="${posterSrc}" class="hero-poster" onerror="this.src='${PLACEHOLDER}'">
                        <div class="qr-box">
                            <div class="qr-label">Info</div>
                            <div class="qr-canvas" id="qr-code"></div>
                        </div>
                    </div>
                </div>
            `;

            const qrEl = document.getElementById("qr-code");
            qrEl.innerHTML = "";

            new QRCode(qrEl, {
                text: ev.url || "https://elvakultuur.ee",
                width: 56,
                height: 56,
                colorDark: "#000",
                colorLight: "#fff",
                correctLevel: QRCode.CorrectLevel.M
            });

            inner.style.opacity = 1;
        }, 180);
    }

    function centerActiveCard(idx) {
        const track = document.getElementById("ticker-track");
        const card = document.getElementById(`ev-${idx}`);
        if (!track || !card) return;

        const targetLeft = card.offsetLeft - (track.clientWidth / 2) + (card.clientWidth / 2);
        track.scrollTo({
            left: Math.max(0, targetLeft),
            behavior: "smooth"
        });
    }

    function autoCycle() {
        const next = (activeIdx + 1) % allEvents.length;
        switchFeatured(next);
        centerActiveCard(next);
    }

    async function init() {
        try {
            allEvents = await fetchEvents();

            if (allEvents.length > 0) {
                document.getElementById("loader").style.display = "none";
                document.getElementById("main-ui").style.display = "flex";
                renderTicker();
                switchFeatured(0);
                centerActiveCard(0);
                autoAdvanceTimer = setInterval(autoCycle, DISPLAY_MS);
            } else {
                document.getElementById("loader").textContent = "Sündmusi ei leitud.";
            }
        } catch (e) {
            document.getElementById("loader").innerHTML = `<span style="color:#f87171">Viga andmete laadimisel.</span>`;
        }
    }

    init();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

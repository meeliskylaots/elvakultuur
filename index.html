<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* ELVA VALD AMETLIKUD VÄRVID */
            --elva-azure: #005aa3;   /* Vapi sinine */
            --elva-green: #009640;   /* Lipu roheline */
            --elva-white: #ffffff;
            
            --bg: #080b0f;
            --panel: #131922;
            --panel-soft: rgba(19, 25, 34, 0.82);
            --text: #e8eef5;
            --muted: #9aa6b2;
            --accent: #69aefc;
            --border: rgba(255,255,255,0.06);
            --header-h: 60px;
            --ticker-h: 170px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 90, 163, 0.12), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 150, 64, 0.06), transparent 40%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(11, 16, 22, 0.94);
            backdrop-filter: blur(8px);
            z-index: 50;
        }

        header::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(to right, 
                var(--elva-white) 33.3%, 
                var(--elva-azure) 33.3%, 
                var(--elva-azure) 66.6%, 
                var(--elva-green) 66.6%);
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .elva-vapp { width: 35px; height: 42px; }
        
        h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .clock {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 15px rgba(0, 90, 163, 0.4);
        }

        .app {
            height: calc(100vh - var(--header-h));
            margin-top: var(--header-h);
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 14px;
        }

        .hero {
            position: relative;
            flex: 1;
            min-height: 0;
            border-radius: 22px;
            overflow: hidden;
            background: #0f141b;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        #hero-inner {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .hero-surface {
            position: absolute;
            inset: 0;
            display: flex;
            gap: 40px;
            align-items: center;
            padding: 40px;
            background: linear-gradient(135deg, rgba(8, 11, 15, 0.3) 0%, rgba(8, 11, 15, 0.95) 100%);
        }

        .hero-text {
            flex: 1.2;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-date {
            color: var(--elva-azure);
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .hero-title {
            margin: 0 0 14px 0;
            font-size: 3rem;
            line-height: 1.05;
            font-weight: 900;
            letter-spacing: -0.04em;
            color: #fff;
        }

        .hero-loc {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--elva-green);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hero-desc {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #dce4ec;
            max-width: 95%;
            display: -webkit-box;
            -webkit-line-clamp: 10;
            -webkit-box-orient: vertical;
            overflow: hidden;
            opacity: 0.9;
        }

        .hero-side {
            flex: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .hero-poster {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.85);
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.01);
        }

        .ticker {
            height: var(--ticker-h);
            border-radius: 20px;
            background: var(--panel-soft);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .ticker-header {
            padding: 10px 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            letter-spacing: 1px;
            background: rgba(255,255,255,0.02);
        }

        .ticker-track {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }

        .ticker-track::-webkit-scrollbar { display: none; }

        .ticker-row {
            display: flex;
            gap: 15px;
            padding: 15px;
            width: max-content;
            min-width: 100%;
        }

        .event-card {
            width: 320px;
            min-width: 320px;
            height: 100px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .event-card.active {
            background: rgba(0, 90, 163, 0.15);
            border-color: var(--elva-azure);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .event-thumb {
            width: 75px;
            height: 75px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #000;
            border: 1px solid var(--border);
        }

        .event-meta {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .event-date {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--elva-azure);
        }

        .event-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-loc {
            font-size: 0.75rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-msg {
            font-size: 1.6rem;
            text-align: center;
            margin-top: 35vh;
            color: var(--muted);
            font-weight: 700;
        }

        @media (max-width: 1200px) {
            .hero-title { font-size: 2.2rem; }
            .hero-desc { -webkit-line-clamp: 8; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <svg class="elva-vapp" viewBox="0 0 100 120">
            <path fill="#005aa3" d="M10,0 h80 v70 c0,30 -40,50 -40,50 c0,0 -40,-20 -40,-50 Z" />
            <g fill="#ffffff">
                <path d="M50 20 L62 45 L53 45 L68 75 L55 75 L70 95 L30 95 L45 75 L32 75 L47 45 L38 45 Z" />
                <path transform="translate(-25, 15) scale(0.75)" d="M50 20 L62 45 L53 45 L68 75 L55 75 L70 95 L30 95 L45 75 L32 75 L47 45 L38 45 Z" opacity="0.9" />
                <path transform="translate(25, 15) scale(0.75)" d="M50 20 L62 45 L53 45 L68 75 L55 75 L70 95 L30 95 L45 75 L32 75 L47 45 L38 45 Z" opacity="0.9" />
            </g>
        </svg>
        <h1>Elva Valla Kultuur</h1>
    </div>
    <div class="clock" id="clock">00:00</div>
</header>

<div id="loader" class="status-msg">Uuendan Elva sündmusi...</div>

<div class="app" id="main-ui" style="display:none;">
    <section class="hero">
        <div id="hero-inner"></div>
    </section>

    <section class="ticker">
        <div class="ticker-header">Tulevased sündmused</div>
        <div class="ticker-track" id="ticker-track">
            <div class="ticker-row" id="ticker-row"></div>
        </div>
    </section>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const DISPLAY_MS = 20000;

    let allEvents = [];
    let activeIdx = -1;
    let autoAdvanceTimer = null;

    const PLACEHOLDER =
        "data:image/svg+xml;charset=UTF-8," +
        encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">' +
            '<rect width="100%" height="100%" fill="#11161d"/>' +
            '<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#005aa3" font-family="Arial" font-size="60" font-weight="700">Elva vald</text>' +
            '</svg>'
        );

    function escapeHtml(v) {
        return String(v ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    /**
     * TÖÖKINDEL ANDMETE LAADIMINE
     * Proovib mitut erinevat proksit, et vältida "Failed to fetch" vigu.
     */
    async function fetchEvents() {
        const encodedUrl = encodeURIComponent(SCRIPT_URL);
        const proxies = [
            `https://api.allorigins.win/get?url=${encodedUrl}&cache=${Date.now()}`,
            `https://corsproxy.io/?${encodedUrl}`,
            SCRIPT_URL
        ];

        for (const url of proxies) {
            try {
                console.log(`Proovin laadida: ${url}`);
                const res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) continue;

                let data;
                if (url.includes('allorigins')) {
                    const wrapper = await res.json();
                    data = JSON.parse(wrapper.contents);
                } else {
                    data = await res.json();
                }

                const list = (Array.isArray(data) ? data : (data.events || data.data || []))
                    .filter(e => e && e.title);

                if (list.length > 0) {
                    console.log("Andmed edukalt käes!");
                    return list;
                }
            } catch (e) {
                console.warn(`Allikas ${url} ei vastanud õigesti:`, e);
            }
        }
        throw new Error("Ükski proksi teenus ei suutnud andmeid laadida.");
    }

    function updateClock() {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", {
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    setInterval(updateClock, 1000);
    updateClock();

    function renderTicker() {
        const row = document.getElementById("ticker-row");
        row.innerHTML = allEvents.map((ev, i) => `
            <div class="event-card" id="ev-${i}">
                <img src="${ev.img || PLACEHOLDER}" class="event-thumb" onerror="this.src='${PLACEHOLDER}'">
                <div class="event-meta">
                    <div class="event-date">${escapeHtml(ev.date)}</div>
                    <div class="event-title">${escapeHtml(ev.title)}</div>
                    <div class="event-loc">📍 ${escapeHtml(ev.loc || "Elva vald")}</div>
                </div>
            </div>
        `).join('');
    }

    function switchFeatured(idx) {
        if (idx === activeIdx || !allEvents[idx]) return;

        activeIdx = idx;
        const ev = allEvents[idx];

        document.querySelectorAll(".event-card").forEach(el => el.classList.remove("active"));
        const listEl = document.getElementById(`ev-${idx}`);
        if (listEl) {
            listEl.classList.add('active');
            listEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        const inner = document.getElementById("hero-inner");
        inner.style.opacity = 0;

        setTimeout(() => {
            const posterSrc = ev.img || PLACEHOLDER;

            inner.innerHTML = `
                <div class="hero-surface">
                    <div class="hero-text">
                        <div class="hero-date">${escapeHtml(ev.date)}</div>
                        <h2 class="hero-title">${escapeHtml(ev.title)}</h2>
                        <div class="hero-loc">📍 ${escapeHtml(ev.loc || "Elva vald")}</div>
                        <div class="hero-desc">${escapeHtml(ev.desc || "Sündmuse lisainfo leiate Elva valla kultuurikavast.")}</div>
                    </div>

                    <div class="hero-side">
                        <img src="${posterSrc}" class="hero-poster" onerror="this.src='${PLACEHOLDER}'">
                    </div>
                </div>
            `;

            inner.style.opacity = 1;
        }, 180);
    }

    function autoCycle() {
        if (!allEvents.length) return;
        const next = (activeIdx + 1) % allEvents.length;
        switchFeatured(next);
    }

    async function init() {
        const loader = document.getElementById("loader");
        try {
            allEvents = await fetchEvents();

            if (allEvents.length > 0) {
                loader.style.display = "none";
                document.getElementById("main-ui").style.display = "flex";
                renderTicker();
                switchFeatured(0);
                autoAdvanceTimer = setInterval(autoCycle, DISPLAY_MS);
            } else {
                loader.textContent = "Sündmusi ei leitud.";
            }
        } catch (e) {
            console.error("Kriitiline laadimise viga:", e);
            loader.innerHTML = `<span style="color:#f87171">Viga laadimisel.</span><br><small style="font-size:0.8rem; opacity:0.6">${e.message}</small>`;
        }
    }

    init();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

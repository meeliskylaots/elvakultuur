<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --elva-blue: #1d71d4;
            --bg: #010204;
            --text: #ffffff;
            --muted: #64748b;
            --border: rgba(255,255,255,0.06);
            --header-h: 70px;
            --ticker-h: 140px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 0%, rgba(29, 113, 212, 0.05), transparent 40%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .clock {
            font-size: 1.6rem;
            font-weight: 700;
            opacity: 0.9;
        }

        .app-content {
            flex: 1;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        /* HERO SEKTSIOON */
        .hero {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            min-height: 0;
        }

        #hero-inner {
            display: flex;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease;
        }

        .hero-info {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .hero-meta-top {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
        }

        .hero-date {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--elva-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero-title {
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 5px;
        }

        .hero-loc {
            font-size: 1.1rem;
            font-weight: 700;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .hero-loc::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--elva-blue);
            border-radius: 50%;
        }

        .hero-desc-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        .hero-desc {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #cbd5e1;
            position: absolute;
            top: 0;
            width: 100%;
        }

        /* VISUAAL-ALA - FIX: CONTAIN */
        .hero-visual {
            flex: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* NÄITAB TERVET PILTI */
            border-radius: 10px;
        }

        /* ALUMINE RIDA KOOS QR-KOODIGA */
        .bottom-section {
            height: var(--ticker-h);
            display: flex;
            gap: 20px;
            padding: 0 40px 20px 40px;
        }

        .ticker-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .ticker-title {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .ticker-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scrollbar-width: none;
            height: 100%;
        }
        .ticker-scroll::-webkit-scrollbar { display: none; }

        .event-card {
            flex: 0 0 280px;
            height: 85px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 8px;
            gap: 12px;
        }

        .event-card.active {
            border-color: var(--elva-blue);
            background: rgba(29, 113, 212, 0.1);
        }

        .event-card-img {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
        }

        .event-card-info {
            flex: 1;
            overflow: hidden;
        }

        .event-card-date { font-size: 0.6rem; font-weight: 800; color: var(--elva-blue); }
        .event-card-title { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* QR-KOOD ALUMISEL RIBAL */
        .qr-area {
            width: 240px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 15px;
            gap: 15px;
            flex-shrink: 0;
        }

        .qr-text {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.2;
            color: #fff;
            text-align: right;
        }

        .qr-code-box {
            background: #fff;
            padding: 5px;
            border-radius: 6px;
            display: flex;
        }

        .loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 200;
            font-weight: 200;
            letter-spacing: 8px;
        }

        @keyframes scrollDescription {
            0% { transform: translateY(0); }
            15% { transform: translateY(0); }
            85% { transform: translateY(var(--scroll-dist)); }
            100% { transform: translateY(var(--scroll-dist)); }
        }
    </style>
</head>
<body>

<div id="loader" class="loader">ELVA VALLA SÜNDMUSED</div>

<header>
    <h1 class="header-title">Elva valla sündmused</h1>
    <div class="clock" id="clock">00:00</div>
</header>

<main class="app-content" id="app-main" style="display:none;">
    <section class="hero" id="hero">
        <div id="hero-inner"></div>
    </section>

    <div class="bottom-section">
        <div class="ticker-area">
            <h2 class="ticker-title">Sündmused vallas</h2>
            <div class="ticker-scroll" id="ticker-scroll"></div>
        </div>
        
        <div class="qr-area">
            <div class="qr-text">Loe lähemalt<br>ja osta pilet</div>
            <div class="qr-code-box" id="qr-target"></div>
        </div>
    </div>
</main>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const ROTATE_INTERVAL = 18000;
    const PLACEHOLDER = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect width="100%" height="100%" fill="#05080a"/><text x="50%" y="50%" font-family="Arial" font-size="40" fill="#1d71d4" text-anchor="middle">ELVA</text></svg>')}`;

    let events = [];
    let currentIndex = 0;

    function updateClock() {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('et-EE', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000); updateClock();

    async function loadData() {
        try {
            const response = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
            let data = await response.json();
            if (data.contents) data = JSON.parse(data.contents);
            
            events = (Array.isArray(data) ? data : (data.events || data.data || []))
                .filter(e => e.title)
                .map(e => ({
                    title: e.title,
                    date: e.date || "KUUPÄEV TÄPSUSTAMISEL",
                    loc: e.loc || e.asutus || "ELVA VALD",
                    desc: e.desc || e.description || "Täpsem info sündmuse kohta on saadaval Elva valla veebilehel ja kultuurikavas.",
                    img: e.img || e.pilt || PLACEHOLDER,
                    url: e.url || "https://elva.ee"
                }));

            if (events.length > 0) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-main').style.display = 'flex';
                renderTicker();
                showEvent(0);
                setInterval(nextEvent, ROTATE_INTERVAL);
            }
        } catch (err) {
            document.getElementById('loader').textContent = "VIGA LAADIMISEL";
        }
    }

    function renderTicker() {
        document.getElementById('ticker-scroll').innerHTML = events.map((ev, i) => `
            <div class="event-card" id="card-${i}" onclick="showEvent(${i})">
                <img src="${ev.img}" class="event-card-img" onerror="this.src='${PLACEHOLDER}'">
                <div class="event-card-info">
                    <div class="event-card-date">${ev.date}</div>
                    <div class="event-card-title">${ev.title}</div>
                </div>
            </div>
        `).join('');
    }

    function showEvent(index) {
        currentIndex = index;
        const ev = events[index];
        const inner = document.getElementById('hero-inner');
        
        document.querySelectorAll('.event-card').forEach(c => c.classList.remove('active'));
        const card = document.getElementById(`card-${index}`);
        if (card) {
            card.classList.add('active');
            card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        inner.style.opacity = 0;
        setTimeout(() => {
            inner.innerHTML = `
                <div class="hero-info">
                    <div class="hero-meta-top">
                        <div class="hero-date">${ev.date}</div>
                        <h2 class="hero-title">${ev.title}</h2>
                        <div class="hero-loc">${ev.loc}</div>
                        <div class="hero-desc-container">
                            <div class="hero-desc" id="hero-desc">${ev.desc}</div>
                        </div>
                    </div>
                </div>
                <div class="hero-visual">
                    <img src="${ev.img}" class="hero-image" onerror="this.src='${PLACEHOLDER}'">
                </div>
            `;
            
            // Uuenda QR koodi alumisel ribal
            const qrTarget = document.getElementById("qr-target");
            qrTarget.innerHTML = "";
            new QRCode(qrTarget, {
                text: ev.url, width: 75, height: 75, colorDark : "#000", colorLight : "#fff", correctLevel : QRCode.CorrectLevel.H
            });

            // Arvuta kerimine
            const desc = document.getElementById('hero-desc');
            const container = desc.parentElement;
            const scrollDist = container.clientHeight - desc.scrollHeight;
            
            if (scrollDist < 0) {
                desc.style.setProperty('--scroll-dist', `${scrollDist}px`);
                desc.style.animation = `scrollDescription ${ROTATE_INTERVAL}ms linear infinite`;
            }

            inner.style.opacity = 1;
        }, 300);
    }

    function nextEvent() {
        currentIndex = (currentIndex + 1) % events.length;
        showEvent(currentIndex);
    }

    loadData();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>

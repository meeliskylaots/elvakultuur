<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elva Valla Kultuuriekraan</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            /* ELVA VALD AMETLIKUD VÄRVID */
            --elva-azure: #005aa3;
            --elva-green: #009640;
            --elva-white: #ffffff;
            
            --bg: #080b0f;
            --panel: #131922;
            --text: #e8eef5;
            --muted: #9aa6b2;
            --accent: #69aefc;
            --border: rgba(255,255,255,0.06);
            --header-h: 50px; /* MADALAM ÜLEMINE RIBA */
            --ticker-h: 140px; /* KOMPAKTSEM ALUMINE RIDA */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 90, 163, 0.1), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(0, 150, 64, 0.05), transparent 40%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(11, 16, 22, 0.96);
            backdrop-filter: blur(10px);
            z-index: 50;
        }

        header::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, 
                var(--elva-white) 33.3%, 
                var(--elva-azure) 33.3%, 
                var(--elva-azure) 66.6%, 
                var(--elva-green) 66.6%);
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .elva-vapp { width: 28px; height: 34px; }
        
        h1 {
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }

        .clock {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .app {
            height: calc(100vh - var(--header-h));
            margin-top: var(--header-h);
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
        }

        /* HERO - SUUREMAD PILDID, VÄIKSEM FONT */
        .hero {
            position: relative;
            flex: 1;
            min-height: 0;
            border-radius: 16px;
            overflow: hidden;
            background: #0c1015;
            border: 1px solid var(--border);
        }

        #hero-inner {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .hero-surface {
            position: absolute;
            inset: 0;
            display: flex;
            gap: 30px;
            align-items: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(8, 11, 15, 0.4) 0%, rgba(8, 11, 15, 0.95) 100%);
        }

        .hero-text {
            flex: 0.9; /* VÄIKSEM TEKSTIALA */
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-date {
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hero-title {
            margin: 0 0 10px 0;
            font-size: 2rem; /* VÄIKSEM PEALKIRI */
            line-height: 1.1;
            font-weight: 900;
            color: #fff;
        }

        .hero-loc {
            font-size: 1rem;
            font-weight: 700;
            color: var(--elva-green);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hero-desc {
            font-size: 0.9rem; /* VÄIKSEM KIRJELDUS */
            line-height: 1.5;
            color: #cbd5e1;
            display: -webkit-box;
            -webkit-line-clamp: 8;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-side {
            flex: 1.1; /* SUUREM PILDIALA */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 15px;
        }

        .hero-poster {
            max-width: 100%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* QR KOOD - VÄIKSEM JA DISKREETSEM */
        .qr-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--elva-azure);
        }

        .qr-label {
            font-size: 0.55rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #fff;
            text-align: right;
            line-height: 1.2;
        }

        .qr-box {
            background: #fff;
            padding: 2px;
            border-radius: 4px;
            display: flex;
        }

        /* TICKER - VÄIKSEM FONT */
        .ticker {
            height: var(--ticker-h);
            border-radius: 16px;
            background: rgba(19, 25, 34, 0.6);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .ticker-header {
            padding: 8px 16px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }

        .ticker-track {
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .ticker-track::-webkit-scrollbar { display: none; }

        .ticker-row {
            display: flex;
            gap: 12px;
            padding: 12px;
            width: max-content;
        }

        .event-card {
            width: 280px; /* KITSAMAD KAARDID */
            height: 85px;
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            transition: all 0.4s ease;
            border: 1px solid transparent;
        }

        .event-card.active {
            background: rgba(0, 90, 163, 0.1);
            border-color: var(--elva-azure);
            transform: translateY(-2px);
        }

        .event-thumb {
            width: 65px;
            height: 65px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .event-meta { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        .event-date { font-size: 0.6rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .event-title { font-size: 0.8rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .event-loc { font-size: 0.65rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .status-msg { font-size: 1.4rem; text-align: center; margin-top: 40vh; color: var(--muted); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <svg class="elva-vapp" viewBox="0 0 100 120">
            <path fill="#005aa3" d="M10,0 h80 v70 c0,30 -40,50 -40,50 c0,0 -40,-20 -40,-50 Z" />
            <g fill="#ffffff">
                <path d="M50 20 L62 45 L53 45 L68 75 L55 75 L70 95 L30 95 L45 75 L32 75 L47 45 L38 45 Z" />
            </g>
        </svg>
        <h1>Elva Valla Kultuur</h1>
    </div>
    <div class="clock" id="clock">00:00</div>
</header>

<div id="loader" class="status-msg">Uuendan sündmusi...</div>

<div class="app" id="main-ui" style="display:none;">
    <section class="hero">
        <div id="hero-inner"></div>
    </section>

    <section class="ticker">
        <div class="ticker-header">Tulevased sündmused</div>
        <div class="ticker-track" id="ticker-track">
            <div class="ticker-row" id="ticker-row"></div>
        </div>
    </section>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaYCMKGMsPR9cUHjhmj-MjSM2GilGQU0SZbetueLa7RxGr-ZAC8U6gCe1gf5VTqNDt/exec";
    const DISPLAY_MS = 20000;

    let allEvents = [];
    let activeIdx = -1;

    const PLACEHOLDER = "data:image/svg+xml;charset=UTF-8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect width="100%" height="100%" fill="#11161d"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#005aa3" font-family="Arial" font-size="60" font-weight="700">Elva vald</text></svg>');

    function escapeHtml(v) {
        return String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // ASUTUSE JA ASUKOHA PUHASTAMINE
    function cleanLoc(loc) {
        if (!loc) return "Elva vald";
        let l = String(loc).trim();
        // Eemaldame ilmainfo
        if (l.toLowerCase().includes("weather") || l.toLowerCase().includes("tõravere")) {
            l = l.split('|')[0].split('weather')[0].trim();
        }
        return l.length > 2 ? l : "Elva vald";
    }

    async function fetchEvents() {
        const encodedUrl = encodeURIComponent(SCRIPT_URL);
        const proxies = [
            `https://api.allorigins.win/get?url=${encodedUrl}&cache=${Date.now()}`,
            SCRIPT_URL
        ];

        for (const url of proxies) {
            try {
                const res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) continue;
                let data = await res.json();
                if (url.includes('allorigins')) data = JSON.parse(data.contents);

                const list = (Array.isArray(data) ? data : (data.events || data.data || []))
                    .filter(e => e && e.title)
                    .map(e => ({
                        ...e,
                        loc: cleanLoc(e.loc || e.asutus)
                    }));

                if (list.length > 0) return list;
            } catch (e) { console.warn("Viga laadimisel:", e); }
        }
        throw new Error("Andmeid ei leitud.");
    }

    function updateClock() {
        document.getElementById("clock").textContent = new Date().toLocaleTimeString("et-EE", { hour: "2-digit", minute: "2-digit" });
    }
    setInterval(updateClock, 1000); updateClock();

    function renderTicker() {
        const row = document.getElementById("ticker-row");
        row.innerHTML = allEvents.map((ev, i) => `
            <div class="event-card" id="ev-${i}">
                <img src="${ev.img || PLACEHOLDER}" class="event-thumb" onerror="this.src='${PLACEHOLDER}'">
                <div class="event-meta">
                    <div class="event-date">${escapeHtml(ev.date)}</div>
                    <div class="event-title">${escapeHtml(ev.title)}</div>
                    <div class="event-loc">📍 ${escapeHtml(ev.loc)}</div>
                </div>
            </div>
        `).join('');
    }

    function switchFeatured(idx) {
        if (idx === activeIdx || !allEvents[idx]) return;
        activeIdx = idx;
        const ev = allEvents[idx];

        document.querySelectorAll(".event-card").forEach(el => el.classList.remove("active"));
        const card = document.getElementById(`ev-${idx}`);
        if (card) {
            card.classList.add('active');
            card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        const inner = document.getElementById("hero-inner");
        inner.style.opacity = 0;

        setTimeout(() => {
            inner.innerHTML = `
                <div class="hero-surface">
                    <div class="hero-text">
                        <div class="hero-date">${escapeHtml(ev.date)}</div>
                        <h2 class="hero-title">${escapeHtml(ev.title)}</h2>
                        <div class="hero-loc">📍 ${escapeHtml(ev.loc)}</div>
                        <div class="hero-desc">${escapeHtml(ev.desc || "Lisainfo leiate Elva valla kultuurikavast.")}</div>
                    </div>
                    <div class="hero-side">
                        <img src="${ev.img || PLACEHOLDER}" class="hero-poster" onerror="this.src='${PLACEHOLDER}'">
                        <div class="qr-area">
                            <div class="qr-label">INFO JA<br>PILETID</div>
                            <div class="qr-box" id="qr-box"></div>
                        </div>
                    </div>
                </div>
            `;
            
            new QRCode(document.getElementById("qr-box"), {
                text: ev.url || "https://elvakultuur.ee",
                width: 50, height: 50, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M
            });

            inner.style.opacity = 1;
        }, 200);
    }

    function autoAdvance() {
        const next = (activeIdx + 1) % allEvents.length;
        switchFeatured(next);
    }

    async function init() {
        const loader = document.getElementById("loader");
        try {
            allEvents = await fetchEvents();
            if (allEvents.length > 0) {
                loader.style.display = "none";
                document.getElementById("main-ui").style.display = "flex";
                renderTicker();
                switchFeatured(0);
                setInterval(autoAdvance, DISPLAY_MS);
            } else {
                loader.textContent = "Sündmusi ei leitud.";
            }
        } catch (e) {
            loader.innerHTML = `<span style="color:#f87171">Viga laadimisel.</span>`;
        }
    }

    init();
    setInterval(() => window.location.reload(), 30 * 60 * 1000);
</script>
</body>
</html>
